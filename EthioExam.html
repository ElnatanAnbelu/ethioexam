  {"i":"chem-g9-0077","g":9,"u":"Measurements and Scientific Methods","d":"medium","t":"calculation","q":"Chaltu pours a liquid into a graduated cylinder and finds its volume is 35.1 mL and its mass is 30.5 g. What is the density of the liquid?","o":["1.15 g/mL","0.869 g/mL","0.785 g/mL","1.114 g/mL"],"c":1,"e":"d = m/V = 30.5 g / 35.1 mL = 0.869 g/mL (Example 2.1), which matches the density of toluene.","tr":2,"ci":"Unit 2 — MEASUREMENTS AND SCIENTIFIC METHODS §2.1 Measurements and Units in Chemistry","av":1,"pv":1},
  {"i":"chem-g9-0078","g":9,"u":"Measurements and Scientific Methods","d":"hard","t":"calculation","q":"A metal wire has a volume of 20.2 cm³ and a mass of 159 g. Given densities of manganese 7.21, iron 7.87, and nickel 8.90 g/cm³, which metal is the wire?","o":["Manganese","Iron","Nickel","Cannot be determined"],"c":1,"e":"d = 159 g / 20.2 cm³ = 7.87 g/cm³ (Exercise 2.1), which matches iron.","tr":2,"ci":"Unit 2 — MEASUREMENTS AND SCIENTIFIC METHODS §2.1 Measurements and Units in Chemistry","av":1,"pv":1},
  {"i":"chem-g9-0079","g":9,"u":"Measurements and Scientific Methods","d":"medium","t":"definition","q":"According to the text, the SI derived unit of force, mass times acceleration, is given the special name:","o":["Pascal (Pa)","Joule (J)","Newton (N)","Watt (W)"],"c":2,"e":"Table 2.2 lists force as kg·m/s², given the special name newton (N). Pascal is pressure and joule is energy.","tr":2,"ci":"Unit 2 — MEASUREMENTS AND SCIENTIFIC METHODS §2.1 Measurements and Units in Chemistry","av":1,"pv":1},
  {"i":"chem-g9-0080","g":9,"u":"Measurements and Scientific Methods","d":"medium","t":"calculation","q":"Using the relationship K = °C + 273.15, the boiling point of water at 100 °C is approximately:","o":["373 K","173 K","273 K","100 K"],"c":0,"e":"K = °C + 273.15, so 100 °C + 273.15 = 373.15 K ≈ 373 K.","tr":2,"ci":"Unit 2 — MEASUREMENTS AND SCIENTIFIC METHODS §2.1 Measurements and Units in Chemistry","av":1,"pv":1},
  {"i":"chem-g9-0081","g":9,"u":"Measurements and Scientific Methods","d":"hard","t":"calculation","q":"Using °C = (1.0 °C / 1.8 °F)(°F − 32), a shade temperature of 100. °F equals approximately:","o":["32 °C","38 °C","56 °C","72 °C"],"c":1,"e":"°C = (100 − 32)/1.8 = 68/1.8 = 38 °C, exactly as in Example 2.2.","tr":2,"ci":"Unit 2 — MEASUREMENTS AND SCIENTIFIC METHODS §2.1 Measurements and Units in Chemistry","av":1,"pv":1},
  {"i":"chem-g9-0082","g":9,"u":"Measurements and Scientific Methods","d":"easy","t":"definition","q":"In the SI prefix table, the prefix that represents a factor of 10⁻³ is:","o":["centi","milli","micro","kilo"],"c":1,"e":"Table 2.4 lists milli (m) as the prefix for 10⁻³ (0.001); centi is 10⁻², micro is 10⁻⁶, and kilo is 10³.","tr":2,"ci":"Unit 2 — MEASUREMENTS AND SCIENTIFIC METHODS §2.1 Measurements and Units in Chemistry","av":1,"pv":1},
  {"i":"chem-g9-0083","g":9,"u":"Measurements and Scientific Methods","d":"medium","t":"conceptual","q":"The text classifies measurement uncertainty into two categories. Which pair is correct?","o":["Absolute and relative","Systematic and random","Precise and accurate","Exact and estimated"],"c":1,"e":"Section 2.1.4 states there are two categories of uncertainty: systematic and random.","tr":2,"ci":"Unit 2 — MEASUREMENTS AND SCIENTIFIC METHODS §2.1 Measurements and Units in Chemistry","av":1,"pv":1},
  {"i":"chem-g9-0084","g":9,"u":"Measurements and Scientific Methods","d":"medium","t":"conceptual","q":"According to the text, which statement about random uncertainties is correct?","o":["They consistently make a value too large or too small","They can be reduced but never eliminated","They are caused by miscalibrated balances","They can always be eliminated if known"],"c":1,"e":"The text says random uncertainties occur without a predictable pattern and can be reduced but never eliminated, whereas systematic uncertainties (e.g., miscalibrated balances) can in principle be eliminated.","tr":2,"ci":"Unit 2 — MEASUREMENTS AND SCIENTIFIC METHODS §2.1 Measurements and Units in Chemistry","av":1,"pv":1},
  {"i":"chem-g9-0085","g":9,"u":"Measurements and Scientific Methods","d":"hard","t":"calculation","q":"A student records canister diameters of 66, 65, and 61 mm (mean 64 mm). Using the half-range method, the uncertainty in the mean is:","o":["±5 mm","±2.5 mm","±3 mm","±0.5 mm"],"c":1,"e":"Half the range = (66 mm − 61 mm)/2 = 5/2 = 2.5 mm (Example 2.3), so diameter = 64 mm ± 2.5 mm.","tr":2,"ci":"Unit 2 — MEASUREMENTS AND SCIENTIFIC METHODS §2.1 Measurements and Units in Chemistry","av":1,"pv":1},
  {"i":"chem-g9-0086","g":9,"u":"Measurements and Scientific Methods","d":"hard","t":"calculation","q":"A mass of 23.25 g is weighed on a top loading balance with an absolute uncertainty of 0.05 g. What is the percent uncertainty?","o":["0.05%","0.2%","2.0%","5.0%"],"c":1,"e":"% uncertainty = (absolute uncertainty / measurement) × 100 = (0.05/23.25) × 100 ≈ 0.2%.","tr":2,"ci":"Unit 2 — MEASUREMENTS AND SCIENTIFIC METHODS §2.1 Measurements and Units in Chemistry","av":1,"pv":1},
  {"i":"chem-g9-0087","g":9,"u":"Measurements and Scientific Methods","d":"medium","t":"definition","q":"In the text, the term that refers to the closeness of a single measurement to its true value is:","o":["Precision","Accuracy","Resolution","Reproducibility"],"c":1,"e":"The text defines accuracy as the closeness of a single measurement to its true value, while precision is the closeness of repeated measurements to one another.","tr":2,"ci":"Unit 2 — MEASUREMENTS AND SCIENTIFIC METHODS §2.1 Measurements and Units in Chemistry","av":1,"pv":1},
  {"i":"chem-g9-0088","g":9,"u":"Measurements and Scientific Methods","d":"medium","t":"application","q":"How many significant figures does the measurement 0.0000349 g contain, per the textbook rules?","o":["Three","Four","Seven","Five"],"c":0,"e":"Zeros to the left of the first nonzero digit are not significant; only 3, 4, 9 count, giving three significant figures.","tr":2,"ci":"Unit 2 — MEASUREMENTS AND SCIENTIFIC METHODS §2.1 Measurements and Units in Chemistry","av":1,"pv":1},
  {"i":"chem-g9-0089","g":9,"u":"Measurements and Scientific Methods","d":"medium","t":"application","q":"According to the significant-figure rules, how many significant figures are in 40,501 kg?","o":["Three","Four","Five","Two"],"c":2,"e":"Every digit is nonzero except the zeros between nonzero digits, which are significant; 4-0-5-0-1 gives five significant figures.","tr":2,"ci":"Unit 2 — MEASUREMENTS AND SCIENTIFIC METHODS §2.1 Measurements and Units in Chemistry","av":1,"pv":1},
  {"i":"chem-g9-0090","g":9,"u":"Measurements and Scientific Methods","d":"hard","t":"calculation","q":"A rectangle is 1.23 cm wide and 12.34 cm long. Reported to the correct number of significant figures, its area is:","o":["15.1782 cm²","15.18 cm²","15.2 cm²","15 cm²"],"c":2,"e":"1.23 × 12.34 = 15.1782; in multiplication the result keeps the smallest count of significant figures (three, from 1.23), giving 15.2 cm².","tr":2,"ci":"Unit 2 — MEASUREMENTS AND SCIENTIFIC METHODS §2.1 Measurements and Units in Chemistry","av":1,"pv":1},
  {"i":"chem-g9-0091","g":9,"u":"Measurements and Scientific Methods","d":"easy","t":"conceptual","q":"In scientific notation, the text writes 602,000,000,000,000,000,000,000 as:","o":["6.02 × 10²³","60.2 × 10²²","6.02 × 10²²","0.602 × 10²⁴"],"c":0,"e":"In scientific notation one nonzero digit is placed left of the decimal; the number equals 6.02 × 10²³.","tr":2,"ci":"Unit 2 — MEASUREMENTS AND SCIENTIFIC METHODS §2.1 Measurements and Units in Chemistry","av":1,"pv":1},
  {"i":"chem-g9-0092","g":9,"u":"Measurements and Scientific Methods","d":"medium","t":"conceptual","q":"According to Section 2.2, what is the first step of the scientific method?","o":["Testing the hypothesis","Observation and formulation of a question","Analysis and conclusion","Data collection and hypothesis"],"c":1,"e":"The text lists the steps starting with 'Observation and formulation of a Question' (e.g., 'Why is the sky black at night?'), followed by data collection/hypothesis, testing, and analysis/conclusion.","tr":2,"ci":"Unit 2 — MEASUREMENTS AND SCIENTIFIC METHODS §2.2 Chemistry as Experimental Science","av":1,"pv":1},
  {"i":"chem-g9-0093","g":9,"u":"Structure of the Atom","d":"easy","t":"definition","q":"According to the textbook, the word 'atom' comes from the Greek word 'atomos'. What does this word mean?","o":["Indivisible / uncuttable","Heavy particle","Empty space","Building block of fire"],"c":0,"e":"The text states that in Greek the prefix 'a' means 'not' and 'tomos' means 'cut', so 'atomos' means uncuttable or indivisible, which is how Democritus described atoms.","tr":2,"ci":"Unit 3 — STRUCTURE OF THE ATOM §3.1 Historical Development of the Atomic Theories of Matter","av":1,"pv":1},
  {"i":"chem-g9-0094","g":9,"u":"Structure of the Atom","d":"medium","t":"conceptual","q":"The textbook lists a main drawback of the early Greek philosophers' approach to understanding matter. What was it?","o":["They relied on reason and logic but did not use experiment and observation","They performed too many dangerous experiments","They borrowed all their ideas from John Dalton","They measured the mass of every reaction"],"c":0,"e":"The text says the early Greek philosophers tried to understand nature through reason and logic but not through experiment and observation, so they missed or rejected discoveries they could otherwise have made.","tr":2,"ci":"Unit 3 — STRUCTURE OF THE ATOM §3.1 Historical Development of the Atomic Theories of Matter","av":1,"pv":1},
  {"i":"chem-g9-0095","g":9,"u":"Structure of the Atom","d":"easy","t":"definition","q":"In the textbook, who is credited with the 1789 discovery that mass is neither created nor destroyed in chemical reactions (the Law of Conservation of Mass)?","o":["Antoine Lavoisier","Joseph Louis Proust","John Dalton","Democritus"],"c":0,"e":"The text states the Law of Conservation of Mass dates from Antoine Lavoisier's 1789 discovery that mass is neither created nor destroyed in chemical reactions.","tr":2,"ci":"Unit 3 — STRUCTURE OF THE ATOM §3.2 Fundamental Laws of Chemical Reactions","av":1,"pv":1},
  {"i":"chem-g9-0096","g":9,"u":"Structure of the Atom","d":"hard","t":"calculation","q":"Using the textbook's Law of Conservation of Mass, KOH reacts with CO2 to give K2CO3 and water: when 224.4 g of KOH reacts with 88.0 g of CO2 and 36.0 g of water is produced, how many grams of potassium carbonate (K2CO3) form?","o":["276.4 g","312.4 g","348.4 g","188.4 g"],"c":0,"e":"By conservation of mass, total reactant mass (224.4 + 88.0 = 312.4 g) equals total product mass. Subtracting the 36.0 g of water gives 312.4 − 36.0 = 276.4 g of K2CO3.","tr":2,"ci":"Unit 3 — STRUCTURE OF THE ATOM §3.2 Fundamental Laws of Chemical Reactions","av":1,"pv":1},
  {"i":"chem-g9-0097","g":9,"u":"Structure of the Atom","d":"medium","t":"conceptual","q":"The textbook notes that one of Dalton's ideas was later proven wrong because some elements have atoms of different masses (isotopes). Which example does the text give of an element with isotopes of mass numbers 35 and 37?","o":["Chlorine","Argon","Calcium","Carbon"],"c":0,"e":"In the drawbacks of Dalton's theory the text states that chlorine has two isotopes with mass numbers 35 and 37, showing that atoms of the same element can vary in mass.","tr":2,"ci":"Unit 3 — STRUCTURE OF THE ATOM §3.3 Atomic Theory","av":1,"pv":1},
  {"i":"chem-g9-0098","g":9,"u":"Structure of the Atom","d":"easy","t":"definition","q":"According to the textbook, which scientist discovered the neutron, and in what year?","o":["James Chadwick, in 1932","J.J. Thomson, in 1897","Robert Millikan, in 1909","Eugene Goldstein, in 1886"],"c":0,"e":"The chronological list in the text states that in 1932 James Chadwick discovered the neutron, another sub-atomic particle.","tr":2,"ci":"Unit 3 — STRUCTURE OF THE ATOM §3.4 Discoveries of Fundamental Subatomic Particles and the Atomic Nucleus","av":1,"pv":1},
  {"i":"chem-g9-0099","g":9,"u":"Structure of the Atom","d":"medium","t":"calculation","q":"Using the textbook's method, an atom of potassium (K) has an atomic number of 19 and a mass number of 40. How many neutrons does it contain?","o":["21","19","40","59"],"c":0,"e":"Number of neutrons = mass number − number of protons (atomic number) = 40 − 19 = 21, exactly as in the text's worked Example 3.6.","tr":2,"ci":"Unit 3 — STRUCTURE OF THE ATOM §3.5 Composition of an Atom and the Isotopes","av":1,"pv":1},
  {"i":"chem-g9-0100","g":9,"u":"Structure of the Atom","d":"hard","t":"calculation","q":"Boron has two isotopes: 20% are B-10 (mass 10 amu) and 80% are B-11 (mass 11 amu). Using the textbook's average atomic mass equation, what is the atomic mass of boron?","o":["10.8 amu","10.2 amu","10.5 amu","11.0 amu"],"c":0,"e":"Average atomic mass = (10×20)/100 + (11×80)/100 = 2 + 8.8 = 10.8 amu, matching the text's worked Problem 3 for boron.","tr":2,"ci":"Unit 3 — STRUCTURE OF THE ATOM §3.5 Composition of an Atom and the Isotopes","av":1,"pv":1},
  {"i":"chem-g9-0101","g":9,"u":"Structure of the Atom","d":"easy","t":"definition","q":"The English word 'atom' is derived from the Greek word 'atomos'. According to the text, what does this Greek word mean?","o":["Indivisible or uncuttable","Heavy or dense","Charged particle","Empty space"],"c":0,"e":"The text states the word atom comes from the Greek 'atomos', where the prefix 'a' means 'not' and 'tomos' means 'cut', giving the meaning indivisible or uncuttable.","tr":2,"ci":"Unit 3 — STRUCTURE OF THE ATOM §3.1 Historical Development of the Atomic Theories of Matter","av":1,"pv":1},
  {"i":"chem-g9-0102","g":9,"u":"Structure of the Atom","d":"easy","t":"conceptual","q":"According to the ancient Greek philosopher Empedocles, all materials are made up of which four 'elements'?","o":["Earth, air, water, and fire","Hydrogen, oxygen, carbon, and nitrogen","Solid, liquid, gas, and plasma","Proton, neutron, electron, and nucleus"],"c":0,"e":"The text states that Empedocles thought all materials are made up of four things called elements: earth, air, water, and fire, a concept later adopted by Plato and Aristotle.","tr":2,"ci":"Unit 3 — STRUCTURE OF THE ATOM §3.1 Historical Development of the Atomic Theories of Matter","av":1,"pv":1},
  {"i":"chem-g9-0121","g":9,"u":"Structure of the Atom","d":"easy","t":"definition","q":"The word 'atom' is derived from the Greek word 'atomos'. According to the textbook, what does 'atomos' mean?","o":["Uncuttable / indivisible","Smallest sphere","Empty space","Building block"],"c":0,"e":"The text states the prefix 'a' means 'not' and 'tomos' means 'cut', so 'atomos' is a Greek word meaning uncuttable or indivisible.","tr":2,"ci":"Unit 3 — STRUCTURE OF THE ATOM §3.1 Historical Development of the Atomic Theories of Matter","av":1,"pv":1},
  {"i":"chem-g9-0122","g":9,"u":"Structure of the Atom","d":"easy","t":"conceptual","q":"According to the Greek philosopher Empedocles, all materials are made up of four elements. Which set is correct?","o":["Earth, air, water, and fire","Earth, metal, wood, and fire","Air, fire, salt, and sulfur","Water, oil, earth, and light"],"c":0,"e":"The text says Empedocles thought all materials are made up of four things called elements: earth, air, water, and fire.","tr":2,"ci":"Unit 3 — STRUCTURE OF THE ATOM §3.1 Historical Development of the Atomic Theories of Matter","av":1,"pv":1},
  {"i":"chem-g9-0141","g":9,"u":"Periodic Classification of Elements","d":"easy","t":"definition","q":"According to Dobereiner's classification, what was true about the atomic weight of the middle element in a triad of three elements with similar properties?","o":["It equals the sum of the atomic weights of the other two elements","It is the arithmetic mean of the atomic weights of the other two elements","It is always the smallest of the three atomic weights","It equals the product of the other two atomic weights"],"c":1,"e":"The text states Dobereiner observed that in a triad, the atomic weight of the middle element is the arithmetic mean of the atomic weights of the other two. For example, for Li(7), Na(23), K(39): (7+39)/2 = 23.","tr":2,"ci":"Unit 4 — PERIODIC CLASSIFICATION OF ELEMENTS §4.1 Historical Development of Periodic Classification of the Elements","av":1,"pv":1},
  {"i":"chem-g9-0142","g":9,"u":"Periodic Classification of Elements","d":"medium","t":"calculation","q":"Newlands arranged the known elements by increasing atomic weight. In his Law of Octaves, the properties of an element repeat at which position relative to a given element?","o":["Every second element","Every fourth element","Every eighth element","Every sixteenth element"],"c":2,"e":"Newlands observed that 'the properties of every eighth element are similar to that of the first one,' comparing this to the first octave in music with eight notes.","tr":2,"ci":"Unit 4 — PERIODIC CLASSIFICATION OF ELEMENTS §4.1 Historical Development of Periodic Classification of the Elements","av":1,"pv":1},
  {"i":"chem-g9-0143","g":9,"u":"Periodic Classification of Elements","d":"easy","t":"definition","q":"What did Mendeleev's periodic law state?","o":["The properties of elements are periodic functions of their atomic numbers","The properties of elements are periodic functions of their atomic weights","Every eighth element has similar properties","Elements with similar properties form triads"],"c":1,"e":"The text states Mendeleev's periodic law: the physical and chemical properties of elements are the periodic function of their atomic weights. (The atomic-number version belongs to the modern periodic law.)","tr":2,"ci":"Unit 4 — PERIODIC CLASSIFICATION OF ELEMENTS §4.2 Mendleev’s Classification of the Elements","av":1,"pv":1},
  {"i":"chem-g9-0144","g":9,"u":"Periodic Classification of Elements","d":"medium","t":"application","q":"The electron configuration of chlorine (Z=17) is 1s²2s²2p⁶3s²3p⁵ (2,8,7). To which period and group does chlorine belong in the modern periodic table?","o":["Period 2, Group VIIA","Period 3, Group VIIA","Period 3, Group VA","Period 7, Group IIIA"],"c":1,"e":"Chlorine has 3 main shells, so it is in period 3. It has 7 valence electrons, so for a main-group element the group number equals the valence electrons: Group VIIA.","tr":2,"ci":"Unit 4 — PERIODIC CLASSIFICATION OF ELEMENTS §4.3 The Modern Periodic Table","av":1,"pv":1},
  {"i":"chem-g9-0145","g":9,"u":"Periodic Classification of Elements","d":"easy","t":"definition","q":"In the modern periodic table, how many periods and how many columns (groups) are there?","o":["8 periods and 18 columns","7 periods and 8 columns","7 periods and 18 columns","18 periods and 7 columns"],"c":2,"e":"The text states there are 7 periods in the modern periodic table and 18 columns or groups.","tr":2,"ci":"Unit 4 — PERIODIC CLASSIFICATION OF ELEMENTS §4.3 The Modern Periodic Table","av":1,"pv":1},
  {"i":"chem-g9-0146","g":9,"u":"Periodic Classification of Elements","d":"medium","t":"application","q":"Using periodic trends, arrange the atoms N, P, and Si in order of increasing atomic radius.","o":["Si < P < N","N < P < Si","P < Si < N","N < Si < P"],"c":1,"e":"N and P are both in Group VA, so radius of N < P (radius increases down a group). Si and P are both in period 3 with Si left of P, so P < Si (radius decreases across a period). Therefore N < P < Si.","tr":2,"ci":"Unit 4 — PERIODIC CLASSIFICATION OF ELEMENTS §4.4 The Major Trends in the Periodic Table","av":1,"pv":1},
  {"i":"chem-g9-0147","g":9,"u":"Periodic Classification of Elements","d":"hard","t":"conceptual","q":"The first ionization energies of period 2 elements show an exception at boron, where B (800 kJ/mol) is lower than Be (899 kJ/mol). What general reason does the text give for Group IIA elements having a higher ionization energy than the adjacent Group IIIA elements?","o":["Group IIA elements have a half-filled p subshell","Group IIA elements have a completely filled (s) electronic configuration, requiring more energy to remove an electron","Group IIIA elements have a larger nuclear charge than Group IIA","Group IIA elements have a larger atomic radius than Group IIIA"],"c":1,"e":"The text notes Group IIA elements have a completely filled electronic configuration, so it requires more energy to remove an electron from a completely filled orbital than from an incompletely filled one — making their ionization energy greater than Group IIIA.","tr":2,"ci":"Unit 4 — PERIODIC CLASSIFICATION OF ELEMENTS §4.4 The Major Trends in the Periodic Table","av":1,"pv":1},
  {"i":"chem-g9-0187","g":9,"u":"Chemical Bonding","d":"easy","t":"definition","q":"According to the textbook, the octet rule (proposed by Gilbert Lewis) states that atoms tend to form compounds in ways that give them:","o":["two valence electrons, like helium","eight valence electrons, the configuration of a noble gas (except helium)","an equal number of protons and neutrons","the maximum number of unpaired electrons"],"c":1,"e":"The text states the octet rule says atoms form compounds to gain eight valence electrons, attaining the electron configuration of a noble gas (except helium), which makes the atom stable.","tr":2,"ci":"Unit 5 — CHEMICAL BONDING §5.1 Chemical Bonding","av":1,"pv":1},
  {"i":"chem-g9-0188","g":9,"u":"Chemical Bonding","d":"easy","t":"conceptual","q":"The textbook lists three ways atoms can satisfy the octet rule. Which of the following is NOT one of them?","o":["By losing valence electrons from an atom","By gaining valence electrons from other elements","By sharing valence electrons with other atoms","By splitting the nucleus to release protons"],"c":3,"e":"The text gives exactly three ways to satisfy the octet rule: losing, gaining, or sharing valence electrons. Splitting the nucleus is not mentioned and is not a bonding process.","tr":2,"ci":"Unit 5 — CHEMICAL BONDING §5.1 Chemical Bonding","av":1,"pv":1},
  {"i":"chem-g9-0189","g":9,"u":"Chemical Bonding","d":"easy","t":"definition","q":"Based on the textbook, an anion is best described as:","o":["an atom or group of atoms with more electrons than protons, giving a net negative charge","an atom or group of atoms with more protons than electrons, giving a net positive charge","a neutral atom with equal protons and electrons","an atom that has lost all of its neutrons"],"c":0,"e":"The text defines anions as atoms or groups of atoms that have more electrons than protons and so carry a net negative charge, e.g. Cl⁻, I⁻, SO4²⁻, NO3⁻.","tr":2,"ci":"Unit 5 — CHEMICAL BONDING §5.2 Ionic Bonding","av":1,"pv":1},
  {"i":"chem-g9-0190","g":9,"u":"Chemical Bonding","d":"medium","t":"application","q":"Calcium (atomic number 20, configuration 2,8,8,2) reacts with chlorine to form an ionic compound. Using the reasoning in the textbook, what is the correct formula and why?","o":["CaCl, because calcium loses one electron to one chlorine","CaCl2, because calcium loses two electrons which are received by two chlorine atoms","Ca2Cl, because two calcium atoms share one chlorine","CaCl3, because calcium gains three electrons from chlorine"],"c":1,"e":"The text states calcium loses its two valence electrons to become Ca²⁺, and these two electrons are received by two chlorine atoms (2Cl⁻); the Ca²⁺ is attracted to the two chloride ions, giving CaCl2.","tr":2,"ci":"Unit 5 — CHEMICAL BONDING §5.2 Ionic Bonding","av":1,"pv":1},
  {"i":"chem-g9-0191","g":9,"u":"Chemical Bonding","d":"medium","t":"conceptual","q":"The textbook gives ~800°C as the melting point of sodium chloride and notes a much higher temperature (1465°C) is needed to boil it. According to the text, these high melting and boiling points are due to:","o":["weak van der Waals forces between molecules","covalent sharing of electron pairs between Na and Cl","the strong electrostatic attraction between the positive and negative ions that requires large energy to break","the delocalized sea of electrons surrounding the ions"],"c":2,"e":"The text explains ionic compounds have high melting and boiling points because considerable heat energy is required to overcome the strong electrostatic attraction between the positive and negative ions in the crystal.","tr":2,"ci":"Unit 5 — CHEMICAL BONDING §5.2 Ionic Bonding","av":1,"pv":1},
  {"i":"chem-g9-0192","g":9,"u":"Chemical Bonding","d":"medium","t":"conceptual","q":"In the chlorine molecule (Cl2), each chlorine atom has seven valence electrons and shares one pair. According to the textbook, the remaining six valence electrons on each chlorine atom that are not involved in bonding are called:","o":["bonding electrons","lone pair (non-bonding / unshared) electrons","delocalized electrons","free electrons"],"c":1,"e":"The text states the remaining six valence electrons of each chlorine atom, not involved in bond formation, are commonly known as non-bonding electrons, lone pair electrons, or unshared electron pairs.","tr":2,"ci":"Unit 5 — CHEMICAL BONDING §5.3 Covalent Bonding","av":1,"pv":1},
  {"i":"chem-g9-0193","g":9,"u":"Chemical Bonding","d":"hard","t":"conceptual","q":"The textbook describes forces present during covalent bond formation in H2. Which statement matches the text's explanation of why the molecule is stable?","o":["Only attractive forces exist between the nuclei and electrons, with no repulsion","There are attractions between nuclei and bonding electrons plus repulsions between the two nuclei and between the two electrons, and the net result is that the molecule's energy becomes less than the separate atomic energies","The two nuclei attract each other directly, pulling the atoms together","The electrons are transferred completely from one hydrogen atom to the other"],"c":1,"e":"The text describes both attractive forces (nuclei–bonding electrons) and repulsive forces (nucleus–nucleus and electron–electron); the net result is that the energy of the molecule becomes less than the atomic energies when the bond forms, which is why it is stable.","tr":2,"ci":"Unit 5 — CHEMICAL BONDING §5.3 Covalent Bonding","av":1,"pv":1},
  {"i":"chem-g9-0194","g":9,"u":"Chemical Bonding","d":"hard","t":"application","q":"Using the 'sea of electrons' model in the textbook, why does magnesium (config 2,8,2) have a higher melting point (650°C) than sodium (config 2,8,1, 97.8°C)?","o":["Magnesium atoms are larger, so the electrons are held more loosely","Magnesium contributes more delocalized electrons and forms higher-charged ions (2+ vs 1+) with a smaller radius and more near-neighbours, giving stronger attraction between ions and the electron sea","Sodium forms covalent bonds while magnesium forms ionic bonds","Magnesium has fewer protons in its nucleus than sodium, increasing attraction"],"c":1,"e":"The text's worked solution states magnesium delocalizes two valence electrons (denser sea), forms 2+ ions, has a smaller radius and twelve near-neighbours (vs eight for sodium), and a 12-proton nucleus, all giving stronger attraction between ions and the electron sea, hence a higher melting point.","tr":2,"ci":"Unit 5 — CHEMICAL BONDING §5.4 Metallic Bonding","av":1,"pv":1},
  {"i":"chem-g11-0671","g":11,"u":"Chemical Equilibrium","d":"easy","t":"definition","q":"The law of mass action, used to write the equilibrium constant expression, was proposed by which scientists according to the textbook?","o":["Fritz Haber and Carl Bosch","Cato Maximilian Guldberg and Peter Waage","Le Chatelier and Bosch","Guldberg and Haber"],"c":1,"e":"The text states the equilibrium constant is written based on the law of mass action proposed by Cato Maximilian Guldberg and Peter Waage in 1864.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0672","g":11,"u":"Chemical Equilibrium","d":"medium","t":"definition","q":"When writing an equilibrium constant expression for a heterogeneous reaction such as CaCO3(s) ⇌ CaO(s) + CO2(g), what does the textbook say about pure solids and pure liquids?","o":["Their concentrations are placed in the numerator","Their concentrations are placed in the denominator","They are not included in the expression","They are included only if they are reactants"],"c":2,"e":"The text states we do not include the concentration of pure solids or pure liquids, because their molar concentrations are constant and the equilibrium position does not depend on their amounts. So Kc = [CO2].","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0673","g":11,"u":"Chemical Equilibrium","d":"medium","t":"calculation","q":"For 2NO(g) + Br2(g) ⇌ 2NOBr(g), with all concentrations in mol L⁻¹, what is the unit of Kc as derived in the textbook?","o":["mol L⁻¹","L mol⁻¹","mol² L⁻²","dimensionless (no unit)"],"c":1,"e":"Kc = [NOBr]²/([NO]²[Br2]). The power difference is (2)−(2+1) = −1, giving (mol L⁻¹)⁻¹ = L mol⁻¹, exactly as shown in the text.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0674","g":11,"u":"Chemical Equilibrium","d":"medium","t":"calculation","q":"For H2(g) + F2(g) ⇌ 2HF(g) at 425 °C, an equilibrium mixture has [H2] = [F2] = 4.79 × 10⁻⁴ mol/L and [HF] = 3.53 × 10⁻³ mol/L. What is Kc?","o":["About 5.4","About 54","About 0.018","About 7.4 × 10⁻³"],"c":1,"e":"Kc = [HF]²/([H2][F2]) = (3.53×10⁻³)²/((4.79×10⁻⁴)(4.79×10⁻⁴)) = 1.246×10⁻⁵/2.294×10⁻⁷ ≈ 54.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0675","g":11,"u":"Chemical Equilibrium","d":"hard","t":"calculation","q":"For 2NO(g) + Cl2(g) ⇌ 2NOCl(g) at 25 °C, the equilibrium partial pressures are PNOCl = 1.2 atm, PNO = 5.0 × 10⁻² atm, PCl2 = 3.0 × 10⁻¹ atm. What is Kp?","o":["About 1.6 atm⁻¹","About 1920 atm⁻¹","About 0.52 atm⁻¹","About 80 atm⁻¹"],"c":1,"e":"Kp = (PNOCl)²/((PNO)²·PCl2) = (1.2)²/((5.0×10⁻²)²(3.0×10⁻¹)) = 1.44/(2.5×10⁻³×0.3) = 1.44/7.5×10⁻⁴ = 1920 atm⁻¹.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0676","g":11,"u":"Chemical Equilibrium","d":"medium","t":"calculation","q":"The relationship between Kp and Kc is Kp = Kc(RT)^Δn. For H2(g) + I2(g) ⇌ 2HI(g), what is the relationship between Kp and Kc?","o":["Kp = Kc(RT)²","Kp = Kc/(RT)","Kp = Kc","Kp = Kc(RT)"],"c":2,"e":"Δn = 2 − (1+1) = 0, so (RT)^0 = 1 and Kp = Kc, exactly as worked in Example 5.4 where Kp = Kc = 64.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0677","g":11,"u":"Chemical Equilibrium","d":"hard","t":"calculation","q":"In the textbook's Kp = Kc(RT)^Δn relationship, Δn for a gaseous reaction is defined as which of the following?","o":["(moles of reactant gases) − (moles of product gases)","(c + d) − (a + b), i.e. product gas moles minus reactant gas moles","total moles of all gases","the coefficient of the limiting reactant"],"c":1,"e":"The text defines Δn = (c + d) − (a + b) for gaseous species in the general reaction aA + bB ⇌ cC + dD. When Δn = 0, Kp = Kc.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0678","g":11,"u":"Chemical Equilibrium","d":"medium","t":"application","q":"The textbook states a reaction goes essentially to completion if Kc or Kp exceeds which value?","o":["10⁻¹⁰","1","10¹⁰","10²"],"c":2,"e":"The text notes a reaction goes essentially to completion if Kc or Kp > 10¹⁰, and not at all if Kc or Kp < 10⁻¹⁰.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0679","g":11,"u":"Chemical Equilibrium","d":"hard","t":"application","q":"For CO(g) + Cl2(g) ⇌ COCl2(g) with Kc = 13.8, a mixture has [CO] = 2.5, [Cl2] = 1.2 and [COCl2] = 5.0 mol L⁻¹. Using the reaction quotient Qc, which direction does the reaction proceed?","o":["It is already at equilibrium","Forward (to the right), forming more products","Backward (to the left), forming more reactants","Cannot be determined without temperature"],"c":1,"e":"Qc = [COCl2]/([CO][Cl2]) = 5.0/(2.5×1.2) = 1.67. Since Qc (1.67) < Kc (13.8), the reaction proceeds forward to form more products.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0680","g":11,"u":"Chemical Equilibrium","d":"medium","t":"conceptual","q":"According to Le Chatelier's principle as stated in the textbook, when a change is imposed on a system at equilibrium, the equilibrium position shifts in a direction that does what?","o":["Increases the imposed change","Tends to reduce that change","Stops the reaction entirely","Always favours the forward reaction"],"c":1,"e":"The text states Le Chatelier's principle: if a change is imposed on a system at equilibrium, the position of the equilibrium will shift in a direction that tends to reduce that change.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0681","g":11,"u":"Chemical Equilibrium","d":"medium","t":"application","q":"For N2(g) + 3H2(g) ⇌ 2NH3(g), increasing the pressure (by decreasing volume) at constant temperature has what effect, according to the textbook?","o":["Shifts equilibrium to the left (toward reactants)","Has no effect because Δn = 0","Shifts equilibrium to the right (forward, toward NH3)","Decreases the rate of both reactions"],"c":2,"e":"Δn = 2 − (1+3) = −2. An increase in pressure shifts equilibrium toward fewer gaseous moles, i.e. the forward direction producing NH3, as the text states.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0682","g":11,"u":"Chemical Equilibrium","d":"easy","t":"conceptual","q":"What does the textbook say is the effect of adding a catalyst to a system at equilibrium?","o":["It shifts the equilibrium toward products","It increases the value of the equilibrium constant","It does not shift the equilibrium position, only speeds up reaching it","It shifts the equilibrium toward reactants"],"c":2,"e":"The text states a catalyst increases the rates of both forward and reverse reactions by the same factor, so it speeds up reaching equilibrium but does not change Kc or the equilibrium concentrations.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0683","g":11,"u":"Chemical Equilibrium","d":"medium","t":"application","q":"In the Haber process for ammonia N2(g) + 3H2(g) ⇌ 2NH3(g), ΔH = −92 kJ. Why is a high temperature (around 500 °C) used industrially even though the textbook says low temperature favours higher yield?","o":["High temperature increases the equilibrium constant","High temperature is needed to make the reaction rate fast enough, despite lowering yield","High temperature shifts equilibrium toward more NH3","High temperature removes the need for a catalyst"],"c":1,"e":"The text explains the forward reaction is exothermic, so low temperature favours higher yield, but the rate at low temperature is extremely slow; a higher temperature is used to speed up the reaction at the cost of a lower yield.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0684","g":11,"u":"Chemical Equilibrium","d":"hard","t":"application","q":"In the Contact process step 2SO2(g) + O2(g) ⇌ 2SO3(g) (ΔH = −196 kJ), the textbook explains 450 °C is used as a 'compromise'. What is being compromised?","o":["Between catalyst cost and pressure","Between a faster reaction rate and a slightly lower yield of SO3","Between SO2 purity and water content","Between forward and reverse rate constants only"],"c":1,"e":"The text states higher temperature shifts the exothermic equilibrium toward SO2 (lower SO3 yield), but the rate at low temperature is too slow; about 450 °C is a compromise giving a faster rate with only a slightly lower yield.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0692","g":11,"u":"Chemical Equilibrium","d":"hard","t":"application","q":"When NO2 is sealed in an evacuated glass vessel (2NO2(g) ⇌ N2O4(g)), the dark brown colour first fades and then becomes constant. According to the text, the colour becomes constant because:","o":["All the NO2 has been completely converted to N2O4","Equilibrium is reached and the forward and reverse rates become equal","The vessel has cooled to room temperature","Light can no longer pass through the gas"],"c":1,"e":"The brown colour becomes constant once equilibrium is established: the rate of dimerization equals the rate of decomposition, so the NO2 concentration (and hence colour intensity) stops changing.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.1 Introduction","av":1,"pv":1},
  {"i":"chem-g11-0693","g":11,"u":"Chemical Equilibrium","d":"easy","t":"definition","q":"The law of mass action, on which the equilibrium constant expression is based, was proposed by:","o":["Le Chatelier","Cato Maximilian Guldberg and Peter Waage","Fritz Haber","Svante Arrhenius"],"c":1,"e":"The text states the equilibrium constant is written based on the law of mass action proposed by Cato Maximilian Guldberg and Peter Waage in 1864.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0694","g":11,"u":"Chemical Equilibrium","d":"medium","t":"conceptual","q":"For the general reaction aA + bB ⇌ cC + dD, the equilibrium constant KC is correctly written as:","o":["[A]^a[B]^b / [C]^c[D]^d","[C]^c[D]^d / [A]^a[B]^b","[C][D] / [A][B]","[A]^a[B]^b × [C]^c[D]^d"],"c":1,"e":"By the rules given, product concentrations go in the numerator and reactant concentrations in the denominator, each raised to its stoichiometric coefficient: KC = [C]^c[D]^d / [A]^a[B]^b.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0695","g":11,"u":"Chemical Equilibrium","d":"medium","t":"conceptual","q":"When equilibrium concentrations are expressed in molarities, the equilibrium constant is denoted KC. When the species are gases and partial pressures are used, it is denoted:","o":["KC","KP","Keq","Qc"],"c":1,"e":"The text states that when concentrations are in molarities the constant is KC, and when reactants and products are gaseous and expressed as partial pressures it is denoted KP.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0696","g":11,"u":"Chemical Equilibrium","d":"hard","t":"calculation","q":"For 2NO(g) + Cl2(g) ⇌ 2NOCl(g) at 25 °C, the equilibrium partial pressures are PNOCl = 1.2 atm, PNO = 5.0×10⁻² atm and PCl2 = 3.0×10⁻¹ atm. The value of KP is approximately:","o":["1.2 atm⁻¹","19 atm⁻¹","1920 atm⁻¹","7.5×10⁻⁴ atm⁻¹"],"c":2,"e":"KP = (PNOCl)²/[(PNO)²·PCl2] = (1.2)²/[(5.0×10⁻²)²(3.0×10⁻¹)] = 1.44/(7.5×10⁻⁴) = 1.92×10³ atm⁻¹.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0697","g":11,"u":"Chemical Equilibrium","d":"medium","t":"calculation","q":"For the reaction H2(g) + F2(g) ⇌ 2HF(g), an equilibrium mixture contains [H2] = [F2] = 4.79×10⁻⁴ mol/L and [HF] = 3.53×10⁻³ mol/L. The equilibrium constant KC is approximately:","o":["0.018","5.4","54","540"],"c":2,"e":"KC = [HF]²/([H2][F2]) = (3.53×10⁻³)²/[(4.79×10⁻⁴)(4.79×10⁻⁴)] = 1.246×10⁻⁵/2.294×10⁻⁷ ≈ 54.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0698","g":11,"u":"Chemical Equilibrium","d":"medium","t":"conceptual","q":"When writing the equilibrium constant expression for a heterogeneous reaction such as CaCO3(s) ⇌ CaO(s) + CO2(g), which species are NOT included?","o":["The gaseous species CO2","Pure solids and pure liquids","All products","Only the reactants"],"c":1,"e":"The text states that pure solids and pure liquids are not included in the expression because their molar concentrations are constant at a given temperature; thus KC = [CO2].","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0699","g":11,"u":"Chemical Equilibrium","d":"hard","t":"calculation","q":"For a gaseous equilibrium, the relationship between KP and KC is KP = KC(RT)^Δn, where Δn = (c+d) − (a+b). For H2(g) + I2(g) ⇌ 2HI(g), what is the relationship between KP and KC?","o":["KP = KC because Δn = 0","KP = KC(RT) because Δn = 1","KP = KC/(RT) because Δn = −1","KP = KC(RT)² because Δn = 2"],"c":0,"e":"Δn = 2 − (1+1) = 0, so (RT)^Δn = (RT)⁰ = 1, giving KP = KC, as shown in the worked example where KP = KC = 64.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0700","g":11,"u":"Chemical Equilibrium","d":"medium","t":"calculation","q":"For CaCO3(s) ⇌ CaO(s) + CO2(g), Δn = +1. If the equilibrium pressure of CO2 is 3.87 atm at 1273 K (R = 0.082 L·atm·K⁻¹·mol⁻¹), KC is approximately:","o":["3.87 M","0.037 M","0.082 M","12.7 M"],"c":1,"e":"KP = PCO2 = 3.87 atm; KC = KP/(RT)^Δn = 3.87/(0.082×1273) = 3.87/104.4 ≈ 0.037 M.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0701","g":11,"u":"Chemical Equilibrium","d":"easy","t":"definition","q":"The reaction quotient QC has the same form as KC but:","o":["It uses only reactant concentrations","It involves concentrations that are not necessarily equilibrium concentrations","It is always larger than KC","It applies only to solids"],"c":1,"e":"The text defines QC with the same form as KC but using concentrations at any stage of the reaction, which are not necessarily the equilibrium concentrations.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0702","g":11,"u":"Chemical Equilibrium","d":"hard","t":"application","q":"For CO(g) + Cl2(g) ⇌ COCl2(g), KC = 13.8. A mixture has [CO] = 2.5, [Cl2] = 1.2 and [COCl2] = 5.0 mol/L. Computing QC and comparing to KC tells us:","o":["QC = 1.67 < KC, so the reaction proceeds forward (to the right)","QC = 1.67 > KC, so the reaction proceeds backward","QC = 13.8 = KC, so it is already at equilibrium","QC = 5.0 > KC, so the reaction proceeds to the left"],"c":0,"e":"QC = [COCl2]/([CO][Cl2]) = 5.0/(2.5×1.2) = 1.67. Since QC (1.67) < KC (13.8), the reaction proceeds to the right (forward) to form more product.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0703","g":11,"u":"Chemical Equilibrium","d":"medium","t":"conceptual","q":"According to the text, a very large value of KC or KP (e.g. greater than 10¹⁰) indicates that:","o":["The equilibrium mixture is mainly reactants and lies to the left","The equilibrium lies to the right and the reaction goes nearly to completion","The reaction does not occur at all","Reactants and products are present in exactly equal amounts"],"c":1,"e":"The text states that very large KC or KP values mean the equilibrium lies to the right (mainly products), and a reaction goes essentially to completion if KC or KP > 10¹⁰.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},
  {"i":"chem-g11-0704","g":11,"u":"Chemical Equilibrium","d":"hard","t":"application","q":"If a reaction is the sum of two or more reactions, the text states that the equilibrium constant of the overall reaction equals:","o":["The sum of the individual equilibrium constants","The product of the individual equilibrium constants","The average of the individual equilibrium constants","The difference of the individual equilibrium constants"],"c":1,"e":"The text states K_overall = K1 × K2 × K3 …; when reactions are added, the overall equilibrium constant is the product of the individual equilibrium constants.","tr":2,"ci":"Unit 5 — Chemical Equilibrium §5.2 Chemical Equilibrium","av":1,"pv":1},

  {"i":"chem-g11-0729","g":11,"u":"Some Important Oxygen-Containing Organic Compounds","d":"medium","t":"definition","q":"In the IUPAC system, how is a monohydric alcohol named from its parent alkane?","o":["By adding the prefix 'hydroxy-' to the alkane name","By replacing the final 'e' of the alkane name with 'ol'","By replacing the final 'e' of the alkane name with 'al'","By adding the word 'alcohol' after the alkane name"],"c":1,"e":"The text states that in the IUPAC system an alcohol is named by replacing the 'e' of the corresponding alkane name with 'ol' (e.g., ethane → ethanol).","tr":2,"ci":"Unit 6 — Some Important Oxygen-Containing Organic Compounds §6.2 Alcohols and Ethers","av":1,"pv":1},

  {"i":"biol-g9-0098","g":9,"u":"Cells","d":"medium","t":"conceptual","q":"Which scientist established the idea that cells arise only by the division of existing cells?","o":["Theodor Schwann","Matthias Schleiden","Rudolf Virchow","Anton van Leeuwenhoek"],"c":2,"e":"The text says German pathologist Rudolf Virchow (1856) established the idea that cells arise only by the division of existing cells, which became part of the cell theory.","tr":2,"ci":"Unit 3 — Cells §3.2. Cell theory","av":1,"pv":1},
  {"i":"biol-g9-0099","g":9,"u":"Cells","d":"hard","t":"conceptual","q":"Based on the text, which of the following is NOT one of the three stated principles of the cell theory?","o":["Living organisms are composed of one or more cells","Cells are the smallest unit of life","Cells arise only by the division of a pre-existing cell","All cells contain a membrane-bound nucleus"],"c":3,"e":"The text lists exactly three principles of cell theory: organisms are composed of one or more cells, cells are the smallest unit of life, and cells arise from pre-existing cells. A nucleus is not part of these principles (prokaryotes lack one).","tr":2,"ci":"Unit 3 — Cells §3.2. Cell theory","av":1,"pv":1},
  {"i":"biol-g9-0100","g":9,"u":"Cells","d":"easy","t":"definition","q":"According to the text, which organelle is described as the 'powerhouse' of the cell and is the site of respiration?","o":["Ribosome","Mitochondria","Golgi apparatus","Lysosome"],"c":1,"e":"The text describes mitochondria as often being called the 'powerhouse' of the cell since they are the sites of respiration and the synthesis of much energy.","tr":2,"ci":"Unit 3 — Cells §3.3. Cell structure and function","av":1,"pv":1},
  {"i":"biol-g9-0101","g":9,"u":"Cells","d":"medium","t":"conceptual","q":"According to the text, what is the function of the smooth endoplasmic reticulum, which differs from the rough endoplasmic reticulum?","o":["Synthesis of proteins","Manufacturing of lipids","Production of energy","Packaging and distribution of molecules"],"c":1,"e":"The text states the smooth endoplasmic reticulum is endoplasmic reticulum without ribosomes and is important in the manufacturing of lipids, while the rough ER (with ribosomes) makes proteins.","tr":2,"ci":"Unit 3 — Cells §3.3. Cell structure and function","av":1,"pv":1},
  {"i":"biol-g9-0102","g":9,"u":"Cells","d":"medium","t":"definition","q":"According to the text, the nucleolus is a darker area within the nucleus. What is made there?","o":["Lipids","New ribosomes","Digestive enzymes","Chromosomes"],"c":1,"e":"The text states that within a nucleus there is a darker area called the nucleolus, which is the site where new ribosomes are made.","tr":2,"ci":"Unit 3 — Cells §3.3. Cell structure and function","av":1,"pv":1},
  {"i":"biol-g9-0103","g":9,"u":"Cells","d":"hard","t":"application","q":"A cell needs to break down a harmful bacterium that has been taken into a food vacuole. According to the text, which organelle fuses with the vacuole to digest it?","o":["Lysosome","Chloroplast","Ribosome","Vesicle"],"c":0,"e":"The text explains lysosomes are membrane-bound packages of digestive enzymes; harmful bacteria taken into vacuoles are broken down by digestive enzymes when lysosomes fuse with the vacuole.","tr":2,"ci":"Unit 3 — Cells §3.3. Cell structure and function","av":1,"pv":1},
  {"i":"biol-g9-0104","g":9,"u":"Cells","d":"medium","t":"conceptual","q":"According to the text, what proportion of the fluid material of the cytoplasm is water?","o":["10 to 20 percent","40 to 50 percent","70 to 80 percent","90 to 100 percent"],"c":2,"e":"The text states the fluid material of the cytoplasm consists of 70 to 80 percent water with various organic and inorganic molecules dissolved in it.","tr":2,"ci":"Unit 3 — Cells §3.3. Cell structure and function","av":1,"pv":1},

  {"i":"biol-g9-0106","g":9,"u":"Cells","d":"easy","t":"definition","q":"According to the text, what is the key feature that distinguishes prokaryotic cells from eukaryotic cells?","o":["Prokaryotic cells lack a cell membrane","Prokaryotic cells lack a nucleus and other membrane-bound organelles","Prokaryotic cells lack cytoplasm","Prokaryotic cells lack DNA"],"c":1,"e":"The text states prokaryotes differ from eukaryotic cells because of the absence of a nucleus and other membrane-bound organelles.","tr":2,"ci":"Unit 3 — Cells §3.4 Types of cells","av":1,"pv":1},
  {"i":"biol-g9-0107","g":9,"u":"Cells","d":"medium","t":"conceptual","q":"According to Table 3.1, the cell wall of prokaryotic cells is primarily made of which material?","o":["Cellulose","Peptidoglycan","Chitin","Chlorophyll"],"c":1,"e":"Table 3.1 states the prokaryotic cell wall is always present and primarily made of peptidoglycan, whereas the plant (eukaryotic) cell wall is made of cellulose.","tr":2,"ci":"Unit 3 — Cells §3.4 Types of cells","av":1,"pv":1},
  {"i":"biol-g9-0108","g":9,"u":"Cells","d":"hard","t":"application","q":"According to the text's 'Attention' note, eukaryotic cells are usually between 10 and 100 micrometers wide. What is the stated size range of prokaryotes?","o":["1 to 10 micrometers","100 to 1000 micrometers","0.1 to 1 micrometer","10 to 50 micrometers"],"c":0,"e":"The text states eukaryotic cells are usually between 10 and 100 micrometers wide, while prokaryotes are between 1 and 10 micrometers in size.","tr":2,"ci":"Unit 3 — Cells §3.4 Types of cells","av":1,"pv":1},

  {"i":"biol-g9-0110","g":9,"u":"Cells","d":"medium","t":"conceptual","q":"According to the text, which two structures are found only in animal cells?","o":["Cell wall and chloroplast","Centriole and lysosome","Nucleus and mitochondria","Vacuole and ribosome"],"c":1,"e":"The text states centriole and lysosome are found only in animal cells, while cell wall, chloroplast and large permanent vacuoles are found in plant cells.","tr":2,"ci":"Unit 3 — Cells §3.5. Animal and plant cells","av":1,"pv":1},
  {"i":"biol-g9-0111","g":9,"u":"Cells","d":"medium","t":"application","q":"In the laboratory activity for observing onion (plant) cells, which solution is added to the tissue for staining?","o":["Methylene blue dye","Iodine solution","Absolute alcohol","Salt solution"],"c":1,"e":"In the onion cell activity, the text instructs adding two to three drops of iodine solution for staining; methylene blue is used for the animal (cheek) cell activity.","tr":2,"ci":"Unit 3 — Cells §3.6 Observing cells under a microscope","av":1,"pv":1},
  {"i":"biol-g9-0112","g":9,"u":"Cells","d":"hard","t":"application","q":"In the cheek (animal) cell laboratory activity, which dye is used to stain the cells, and which part is NOT labeled because it is absent in animal cells?","o":["Iodine; the chloroplast","Methylene blue; the cell wall","Iodine; the nucleus","Methylene blue; the cytoplasm"],"c":1,"e":"The text uses methylene blue dye for cheek cells and instructs labeling only cell membrane, cytoplasm and nucleus (no cell wall), since animal cells lack a cell wall.","tr":2,"ci":"Unit 3 — Cells §3.6 Observing cells under a microscope","av":1,"pv":1},
  {"i":"biol-g9-0113","g":9,"u":"Cells","d":"easy","t":"definition","q":"According to the Key Terms, osmosis is defined as the diffusion of which molecules?","o":["Oxygen molecules","Water molecules","Glucose molecules","Carbon dioxide molecules"],"c":1,"e":"The text's Key Terms define osmosis as the diffusion of water molecules from a region of their higher concentration (dilute solution) to a region of their lower concentration (concentrated solution).","tr":2,"ci":"Unit 3 — Cells §3.7.1 Passive transport","av":1,"pv":1},
  {"i":"biol-g9-0114","g":9,"u":"Cells","d":"hard","t":"conceptual","q":"According to the text, which factor does NOT increase the rate of diffusion?","o":["A greater concentration gradient","An increase in temperature","A heavier (larger mass) molecule","A greater surface area"],"c":2,"e":"The text states heavier molecules move more slowly and therefore diffuse more slowly, so greater mass decreases diffusion rate, while greater concentration gradient, higher temperature, and greater surface area all increase it.","tr":2,"ci":"Unit 3 — Cells §3.7.1 Passive transport","av":1,"pv":1},
  {"i":"biol-g9-0115","g":9,"u":"Cells","d":"medium","t":"definition","q":"According to the text, active transport moves particles across the cell membrane against the concentration gradient using energy released during which process?","o":["Photosynthesis","Respiration","Osmosis","Diffusion"],"c":1,"e":"The text defines active transport as movement of particles from lower to higher concentration against the concentration gradient, using the energy released during respiration.","tr":2,"ci":"Unit 3 — Cells §3.7.2 Active transport","av":1,"pv":1},
  {"i":"biol-g9-0116","g":9,"u":"Cells","d":"medium","t":"definition","q":"According to the text, what is the most basic level of organization in complex multicellular organisms, defined as groups of similar cells that act as a functional unit?","o":["Organs","Tissues","Organ systems","Organelles"],"c":1,"e":"The text states the most basic level is that of tissues (for example nerve tissue), which are groups of similar cells that act as a functional unit, before being grouped into organs.","tr":2,"ci":"Unit 3 — Cells §3.8. Levels of Biological Organization","av":1,"pv":1},
  {"i":"biol-g9-0156","g":9,"u":"Reproduction","d":"easy","t":"definition","q":"According to the text, which characteristic BEST distinguishes living things from non-living matter?","o":["The ability to reproduce and form their own kind","The ability to move from place to place","The ability to store food","The ability to absorb water"],"c":0,"e":"The text states the ability of organisms to reproduce to form their own kind is the one characteristic that best distinguishes living things from non-living matter.","tr":2,"ci":"Unit 4 — Reproduction §4.1 Introduction to reproduction","av":1,"pv":1},

  {"i":"biol-g9-0158","g":9,"u":"Reproduction","d":"medium","t":"conceptual","q":"According to the text, among which group is asexual reproduction ABSENT?","o":["Vertebrates","Bacteria","Fungi","Many invertebrates"],"c":0,"e":"The text states asexual reproduction appears in bacteria, unicellular eukaryotes, many invertebrates, fungi and plants, but is absent among vertebrates.","tr":2,"ci":"Unit 4 — Reproduction §4.2 Asexual reproduction","av":1,"pv":1},
  {"i":"biol-g9-0159","g":9,"u":"Reproduction","d":"hard","t":"conceptual","q":"Which of the following is listed in the text as a DISADVANTAGE of asexual reproduction?","o":["Little variation is created, so adaptation to a changing environment is unlikely","No mate is needed to produce offspring","All good characteristics of the parent are passed on","Offspring grow in the same favourable environment as the parent"],"c":0,"e":"The text lists little variation (so evolution is unlikely), no disease resistance if the parent lacks it, and competition from lack of dispersal as disadvantages; the other options are listed as advantages.","tr":2,"ci":"Unit 4 — Reproduction §4.2 Asexual reproduction","av":1,"pv":1},
  {"i":"biol-g9-0160","g":9,"u":"Reproduction","d":"easy","t":"conceptual","q":"In binary fission, the body of the unicellular parent divides by which process into two approximately equal parts?","o":["Mitosis","Meiosis","Sporulation","Fertilization"],"c":0,"e":"The text states that in binary fission the body of the unicellular parent divides by mitosis into two approximately equal parts.","tr":2,"ci":"Unit 4 — Reproduction §4.3.1 Fission","av":1,"pv":1},

  {"i":"biol-g9-0162","g":9,"u":"Reproduction","d":"medium","t":"application","q":"The text uses Spirogyra, a filamentous green-alga, as an example of which type of asexual reproduction?","o":["Fragmentation","Budding","Binary fission","Parthenogenesis"],"c":0,"e":"The text states Spirogyra, the filamentous green-alga, undergoes fragmentation, resulting in many filaments that each grow into a matured filament.","tr":2,"ci":"Unit 4 — Reproduction §4.3.2 Fragmentation","av":1,"pv":1},
  {"i":"biol-g9-0163","g":9,"u":"Reproduction","d":"medium","t":"conceptual","q":"According to the text, how do the two daughter cells produced in budding compare to each other?","o":["They are unequal in size","They are exactly equal in size","They are always genetically different","They each contain two nuclei"],"c":0,"e":"The text states that in budding the organism divides into two unequal parts, distinguishing it from fission which produces approximately equal parts.","tr":2,"ci":"Unit 4 — Reproduction §4.3.3 Budding","av":1,"pv":1},

  {"i":"biol-g9-0168","g":9,"u":"Reproduction","d":"hard","t":"conceptual","q":"In females, according to the text, which hormone is responsible for the secondary sex characteristics and is released from the ovary after stimulation by FSH?","o":["Estrogen","Testosterone","LH","Progesterone"],"c":0,"e":"The text states FSH causes a hormone called estrogen to be released from the ovary, and estrogen is responsible for the secondary sex characteristics of females.","tr":2,"ci":"Unit 4 — Reproduction §4.5 Primary and secondary sexual characteristics","av":1,"pv":1},

  {"i":"math-g9-0001","g":9,"u":"Further on Sets","d":"easy","t":"calculation","q":"According to the note in §1'.2, if a finite set A has n elements, the number of subsets of A is 2^n. How many subsets does the set A = {1, 3, 5} have?","o":["6","7","8","9"],"c":2,"e":"A has n = 3 elements, so the number of subsets is 2^3 = 8 (Exercise 1'.5 #4 confirms this).","tr":2,"ci":"Unit 1' — FURTHER ON SETS §1'.2 Notion of Set","av":1,"pv":1},
  {"i":"math-g9-0002","g":9,"u":"Further on Sets","d":"easy","t":"calculation","q":"The note in §1'.2 states the number of proper subsets of a set with n elements is 2^n − 1. How many proper subsets does D = {a, b} have?","o":["2","3","4","1"],"c":1,"e":"D has n = 2 elements, so the number of proper subsets is 2^2 − 1 = 4 − 1 = 3.","tr":2,"ci":"Unit 1' — FURTHER ON SETS §1'.2 Notion of Set","av":1,"pv":1},
  {"i":"math-g9-0003","g":9,"u":"Further on Sets","d":"easy","t":"calculation","q":"Let A = {0, 1, 3, 5, 7} and B = {1, 2, 3, 4, 6, 7}. Using Definition 1'.8, what is A ∩ B?","o":["{1, 3, 7}","{1, 3, 5, 7}","{0, 1, 3, 5, 7}","{2, 4, 6}"],"c":0,"e":"The intersection contains elements in both A and B: 1, 3, and 7 are common, so A ∩ B = {1, 3, 7} (Example 1).","tr":2,"ci":"Unit 1' — FURTHER ON SETS §1'.3 Operations on Sets","av":1,"pv":1},
  {"i":"math-g9-0004","g":9,"u":"Further on Sets","d":"easy","t":"application","q":"Let A and B be finite sets with n(A) = 20, n(B) = 28, and n(A ∪ B) = 36. Using the formula in §1'.4, find n(A ∩ B).","o":["10","12","14","16"],"c":1,"e":"n(A ∩ B) = n(A) + n(B) − n(A ∪ B) = 20 + 28 − 36 = 12 (Example 8).","tr":2,"ci":"Unit 1' — FURTHER ON SETS §1'.4 Application of Operations on Sets","av":1,"pv":1},

  {"i":"math-g9-0007","g":9,"u":"Further on Sets","d":"medium","t":"calculation","q":"Let A = {2, 4, 6} and B = {1, 3}. Using Definition 1'.12, how many ordered pairs are in A × B?","o":["5","6","8","9"],"c":1,"e":"A × B = {(2,1),(2,3),(4,1),(4,3),(6,1),(6,3)}, which has n(A)·n(B) = 3·2 = 6 ordered pairs (Example 7).","tr":2,"ci":"Unit 1' — FURTHER ON SETS §1'.3 Operations on Sets","av":1,"pv":1},
  {"i":"math-g9-0008","g":9,"u":"Further on Sets","d":"medium","t":"calculation","q":"Let U be one-digit numbers, A the one-digit even numbers, B the positive primes less than 10. From Example 4, A ∩ B = {2}, A\\B = {0,4,6,8}, B\\A = {3,5,7}. What is U\\(A ∪ B)?","o":["{0, 9}","{1, 9}","{1}","{0, 1, 9}"],"c":1,"e":"A ∪ B = {0,2,3,4,5,6,7,8}. One-digit numbers U = {0,1,...,9}, so U\\(A ∪ B) = {1, 9} (Example 4).","tr":2,"ci":"Unit 1' — FURTHER ON SETS §1'.3 Operations on Sets","av":1,"pv":1},
  {"i":"math-g9-0009","g":9,"u":"Further on Sets","d":"medium","t":"application","q":"In a group of 60 people, 42 drink tea and 27 drink coffee, and every person drinks at least one. Using the inclusion-exclusion formula, find the number who drink both.","o":["9","15","18","27"],"c":0,"e":"n(A∩B) = n(A) + n(B) − n(A∪B) = 42 + 27 − 60 = 9 (Review Exercise #5).","tr":2,"ci":"Unit 1' — FURTHER ON SETS §1'.4 Application of Operations on Sets","av":1,"pv":1},
  {"i":"math-g9-0010","g":9,"u":"Further on Sets","d":"medium","t":"application","q":"In a survey of 200 students, 90 are in Nature club, 31 in Mini-media club, and 21 in both. How many are members of either club?","o":["100","121","79","142"],"c":0,"e":"n(either) = n(Nature) + n(Mini-media) − n(both) = 90 + 31 − 21 = 100 (Exercise 1'.10).","tr":2,"ci":"Unit 1' — FURTHER ON SETS §1'.4 Application of Operations on Sets","av":1,"pv":1},
  {"i":"math-g9-0011","g":9,"u":"Further on Sets","d":"medium","t":"definition","q":"Per Definition 1'.2 and the note that follows, two finite sets A and B are equivalent if and only if:","o":["they have exactly the same elements","n(A) = n(B)","A is a subset of B","A ∩ B = ∅"],"c":1,"e":"Two finite sets are equivalent when there is a one-to-one correspondence, which holds if and only if they have an equal number of elements: n(A) = n(B).","tr":2,"ci":"Unit 1' — FURTHER ON SETS §1'.2 Notion of Set","av":1,"pv":1},
  {"i":"math-g9-0012","g":9,"u":"Further on Sets","d":"hard","t":"calculation","q":"Let U = {1, 2, 3, …, 14}, A = {2, 3, 5, 7, 11}, B = {2, 4, 8, 9, 10, 11}. Compute (A ∪ B)'.","o":["{1, 6, 12, 13, 14}","{1, 4, 6, 12, 13, 14}","{6, 12, 13, 14}","{1, 6, 13, 14}"],"c":0,"e":"A ∪ B = {2,3,4,5,7,8,9,10,11}. Its complement in U = {1,6,12,13,14}. (Review Exercise #7; note the textbook's option A omits a digit, but the correct complement is {1,6,12,13,14}.)","tr":2,"ci":"Unit 1' — FURTHER ON SETS §1'.3 Operations on Sets","av":1,"pv":1},
  {"i":"math-g9-0013","g":9,"u":"Further on Sets","d":"hard","t":"calculation","q":"Using Theorem 1.1, which expression equals (A ∩ B)' for any two sets A and B?","o":["A' ∩ B'","A' ∪ B'","A ∪ B","A − B"],"c":1,"e":"Theorem 1.1 states De Morgan's law (A ∩ B)' = A' ∪ B' (and (A ∪ B)' = A' ∩ B').","tr":2,"ci":"Unit 1' — FURTHER ON SETS §1'.3 Operations on Sets","av":1,"pv":1},
  {"i":"math-g9-0014","g":9,"u":"Further on Sets","d":"hard","t":"calculation","q":"If A × B = {(4,1),(4,4),(2,1),(2,4),(3,1),(3,4)}, then using the method of Example 8, what is set B?","o":["{4, 2, 3}","{1, 4}","{1, 2, 3, 4}","{4, 4}"],"c":1,"e":"B is the set of all second components of the ordered pairs: 1 and 4, so B = {1, 4} (Example 8).","tr":2,"ci":"Unit 1' — FURTHER ON SETS §1'.3 Operations on Sets","av":1,"pv":1},
  {"i":"math-g9-0015","g":9,"u":"Further on Sets","d":"hard","t":"calculation","q":"Review Exercise #1: If B ⊆ A, A ∩ B' = {1, 4, 5}, and A ∪ B = {1, 2, 3, 4, 5, 6}, find set B.","o":["{1, 4, 5}","{2, 3, 6}","{1, 2, 3, 4, 5, 6}","{ }"],"c":1,"e":"Since B ⊆ A, A ∪ B = A = {1,2,3,4,5,6}. A ∩ B' = A − B = {1,4,5} are the elements of A not in B, so B = A − {1,4,5} = {2, 3, 6}.","tr":2,"ci":"Unit 1' — FURTHER ON SETS §1'.2 Notion of Set","av":1,"pv":1},
  {"i":"math-g9-0016","g":9,"u":"Further on Sets","d":"hard","t":"application","q":"For the Cartesian product, if n(A) = 6 and n(B) = 4, then n(A × B) equals (Exercise 1'.9 #5):","o":["10","24","12","2"],"c":1,"e":"The number of ordered pairs in A × B is n(A) · n(B) = 6 · 4 = 24.","tr":2,"ci":"Unit 1' — FURTHER ON SETS §1'.3 Operations on Sets","av":1,"pv":1},
  {"i":"math-g9-0055","g":9,"u":"The Number System","d":"easy","t":"calculation","q":"When the positive integer 38 is divided by 4, what are the quotient q and remainder r so that 38 = 4q + r with 0 ≤ r < 4?","o":["q = 9, r = 2","q = 8, r = 6","q = 9, r = 4","q = 7, r = 10"],"c":0,"e":"By Euclid's division lemma, 38 = 4×9 + 2, giving quotient 9 and remainder 2, with 0 ≤ 2 < 4.","tr":2,"ci":"Unit 1 — THE NUMBER SYSTEM §1.1 Revision on Natural Numbers and Integers","av":1,"pv":1},
  {"i":"math-g9-0056","g":9,"u":"The Number System","d":"easy","t":"conceptual","q":"Using the divisibility tests in the text, by which of these is 2,334 divisible?","o":["2 and 3 (and hence 6)","4 and 8","5 and 10","9 only"],"c":0,"e":"Unit digit 4 is divisible by 2; digit sum 2+3+3+4=12 is divisible by 3; so it is divisible by 2, 3 and therefore 6 — but not by 4, 5, 8, 9 or 10.","tr":2,"ci":"Unit 1 — THE NUMBER SYSTEM §1.1 Revision on Natural Numbers and Integers","av":1,"pv":1},
  {"i":"math-g9-0057","g":9,"u":"The Number System","d":"medium","t":"calculation","q":"What is the prime factorization of 456?","o":["2³ × 3 × 19","2² × 3² × 19","2³ × 57","2 × 3 × 76"],"c":0,"e":"456÷2=228, 228÷2=114, 114÷2=57, 57÷3=19 (prime). Hence 456 = 2³ × 3 × 19.","tr":2,"ci":"Unit 1 — THE NUMBER SYSTEM §1.1 Revision on Natural Numbers and Integers","av":1,"pv":1},
  {"i":"math-g9-0058","g":9,"u":"The Number System","d":"medium","t":"calculation","q":"Using prime factorization, what is GCF(12, 18, 36)?","o":["6","12","3","2"],"c":0,"e":"12=2²×3, 18=2×3², 36=2²×3². The common primes 2 and 3 each to the least power give 2×3 = 6.","tr":2,"ci":"Unit 1 — THE NUMBER SYSTEM §1.1 Revision on Natural Numbers and Integers","av":1,"pv":1},
  {"i":"math-g9-0059","g":9,"u":"The Number System","d":"hard","t":"calculation","q":"Using the relation GCF(a,b)×LCM(a,b)=ab, what is GCF(16,24)×LCM(16,24)?","o":["384","48","8","96"],"c":0,"e":"By the identity, GCF(16,24)×LCM(16,24) = 16×24 = 384 (no need to compute GCF or LCM separately).","tr":2,"ci":"Unit 1 — THE NUMBER SYSTEM §1.1 Revision on Natural Numbers and Integers","av":1,"pv":1},
  {"i":"math-g9-0060","g":9,"u":"The Number System","d":"easy","t":"calculation","q":"Expressed as an improper fraction, the mixed number 3 1/4 equals:","o":["13/4","7/4","12/4","31/4"],"c":0,"e":"3 1/4 = (3×4 + 1)/4 = 13/4.","tr":2,"ci":"Unit 1 — THE NUMBER SYSTEM §1.2 Rational Numbers","av":1,"pv":1},
  {"i":"math-g9-0061","g":9,"u":"The Number System","d":"medium","t":"calculation","q":"Converted to a fraction in simplest form, the repeating decimal 2.12̄12̄ (i.e. 2.121212…) equals:","o":["70/33","212/99","70/99","21/10"],"c":0,"e":"Let d=2.1212…; 100d−d=212.12…−2.12…=210, so 99d=210, d=210/99=70/33.","tr":2,"ci":"Unit 1 — THE NUMBER SYSTEM §1.2 Rational Numbers","av":1,"pv":1},
  {"i":"math-g9-0062","g":9,"u":"The Number System","d":"easy","t":"calculation","q":"Written as a fraction in simplest form, the terminating decimal −0.18 equals:","o":["−9/50","−18/10","−9/25","−18/1000"],"c":0,"e":"−0.18 = −18/100, which simplifies (dividing by 2) to −9/50.","tr":2,"ci":"Unit 1 — THE NUMBER SYSTEM §1.2 Rational Numbers","av":1,"pv":1},
  {"i":"math-g9-0063","g":9,"u":"The Number System","d":"hard","t":"application","q":"A rope of 5 1/3 metres is cut into 4 pieces of equal length. What is the length of each piece?","o":["4/3 m","16/3 m","5/12 m","3/4 m"],"c":0,"e":"5 1/3 = 16/3 m; dividing by 4 gives (16/3)÷4 = 16/12 = 4/3 m per piece.","tr":2,"ci":"Unit 1 — THE NUMBER SYSTEM §1.2 Rational Numbers","av":1,"pv":1},
  {"i":"math-g9-0064","g":9,"u":"The Number System","d":"easy","t":"conceptual","q":"Which of the following numbers is irrational?","o":["0.010110111…","√25","22/7","√0.09"],"c":0,"e":"0.010110111… is neither terminating nor repeating, so it is irrational; √25=5, 22/7 is a fraction, and √0.09=0.3 are all rational.","tr":2,"ci":"Unit 1 — THE NUMBER SYSTEM §1.3 Irrational Numbers","av":1,"pv":1},
  {"i":"math-g9-0112","g":9,"u":"Solving Equations","d":"easy","t":"definition","q":"According to Definition 2.1, a linear equation in one variable has the form ax + b = 0. What condition must hold for a?","o":["a ≠ 0","a = 0","a > 1","a must be an integer"],"c":0,"e":"Definition 2.1 states the equation ax + b = 0 has a and b as real coefficients with a ≠ 0, and it has only one solution.","tr":2,"ci":"Unit 2 — SOLVING EQUATIONS §2.1 Revision of Linear Equation in One Variable","av":1,"pv":1},
  {"i":"math-g9-0113","g":9,"u":"Solving Equations","d":"easy","t":"calculation","q":"Solve for x: 2x − 7 = 3.","o":["x = 5","x = −2","x = 2","x = 10"],"c":0,"e":"Add 7 to both sides: 2x = 10, so x = 5 (Exercise 2.1 part c).","tr":2,"ci":"Unit 2 — SOLVING EQUATIONS §2.1 Revision of Linear Equation in One Variable","av":1,"pv":1},
  {"i":"math-g9-0114","g":9,"u":"Solving Equations","d":"medium","t":"calculation","q":"Solve for x: 5x − 8 = 2x − 2.","o":["x = 2","x = 3","x = −2","x = 10/7"],"c":0,"e":"5x − 2x = −2 + 8 gives 3x = 6, so x = 2 (Exercise 2.1 part e).","tr":2,"ci":"Unit 2 — SOLVING EQUATIONS §2.1 Revision of Linear Equation in One Variable","av":1,"pv":1},
  {"i":"math-g9-0115","g":9,"u":"Solving Equations","d":"hard","t":"application","q":"The leg of an isosceles triangle is 6 m more than its base. If the perimeter is 54 m, what is the base length?","o":["14 m","20 m","18 m","16 m"],"c":0,"e":"With base a and legs a+6: a + 2(a+6) = 54, so 3a = 42 and a = 14 m (Example 3).","tr":2,"ci":"Unit 2 — SOLVING EQUATIONS §2.1 Revision of Linear Equation in One Variable","av":1,"pv":1},
  {"i":"math-g9-0116","g":9,"u":"Solving Equations","d":"easy","t":"definition","q":"What three methods does the text give for solving systems of linear equations in two variables?","o":["Tables, substitution, and elimination","Graphing, matrices, and determinants","Substitution, factoring, and the quadratic formula","Tables, completing the square, and graphing"],"c":0,"e":"The text states the three methods are solving using tables, the substitution method, and the elimination (addition) method.","tr":2,"ci":"Unit 2 — SOLVING EQUATIONS §2.2 Systems of Linear Equations in Two Variables","av":1,"pv":1},
  {"i":"math-g9-0117","g":9,"u":"Solving Equations","d":"medium","t":"calculation","q":"Solve by substitution: −x + y = −5 and 2x − 5y = 1. What is the solution (x, y)?","o":["(8, 3)","(3, 8)","(8, −3)","(−8, 3)"],"c":0,"e":"From the first, y = x − 5. Then 2x − 5(x−5) = 1 gives −3x + 25 = 1, x = 8, y = 3 (Example 1).","tr":2,"ci":"Unit 2 — SOLVING EQUATIONS §2.2 Systems of Linear Equations in Two Variables","av":1,"pv":1},
  {"i":"math-g9-0118","g":9,"u":"Solving Equations","d":"medium","t":"calculation","q":"Solve by elimination: x + 2y = 1 and −x + y = 5. What is x?","o":["x = −3","x = 2","x = 3","x = −2"],"c":0,"e":"Adding eliminates x: 3y = 6, y = 2. Then −x + 2 = 5 gives x = −3 (Example 1, elimination).","tr":2,"ci":"Unit 2 — SOLVING EQUATIONS §2.2 Systems of Linear Equations in Two Variables","av":1,"pv":1},
  {"i":"math-g9-0119","g":9,"u":"Solving Equations","d":"medium","t":"calculation","q":"Solve by elimination: 3x + 5y = −11 and x − 2y = 11. What is y?","o":["y = −4","y = 4","y = 3","y = −3"],"c":0,"e":"Multiply the second by −3: −3x + 6y = −33. Add to the first: 11y = −44, so y = −4 (Example 3).","tr":2,"ci":"Unit 2 — SOLVING EQUATIONS §2.2 Systems of Linear Equations in Two Variables","av":1,"pv":1},
  {"i":"math-g9-0120","g":9,"u":"Solving Equations","d":"hard","t":"conceptual","q":"Using substitution, the system −x + 6y = 3 and 3x − 18y = 4 leads to the statement −9 = 4. What does this mean?","o":["There is no solution","There is exactly one solution","There are infinitely many solutions","x = 0 and y = 0"],"c":0,"e":"Substituting x = 6y − 3 gives −9 = 4, which is false, so the system has no solution (Example 3).","tr":2,"ci":"Unit 2 — SOLVING EQUATIONS §2.2 Systems of Linear Equations in Two Variables","av":1,"pv":1},
  {"i":"math-g9-0121","g":9,"u":"Solving Equations","d":"hard","t":"application","q":"Three pens and two books cost Birr 118, and one pen and two books cost Birr 106. What is the cost of one pen?","o":["Birr 6","Birr 50","Birr 12","Birr 56"],"c":0,"e":"Subtracting the equations: 2p = 12, so p = 6 (and b = 50) (Example 4).","tr":2,"ci":"Unit 2 — SOLVING EQUATIONS §2.2 Systems of Linear Equations in Two Variables","av":1,"pv":1},
  {"i":"math-g9-0122","g":9,"u":"Solving Equations","d":"easy","t":"calculation","q":"Solve the absolute value equation |x + 7| = 14.","o":["x = 7 or x = −21","x = 7 or x = 21","x = −7 or x = 21","x = 14 or x = −14"],"c":0,"e":"x + 7 = 14 gives x = 7; x + 7 = −14 gives x = −21 (Example 4).","tr":2,"ci":"Unit 2 — SOLVING EQUATIONS §2.3 Solving Non-linear Equations","av":1,"pv":1},
  {"i":"math-g9-0123","g":9,"u":"Solving Equations","d":"medium","t":"calculation","q":"Solve the absolute value equation 2|2x − 1| − 1 = 5.","o":["x = 2 or x = −1","x = 2 or x = 1","x = −2 or x = 1","x = 3 or x = −2"],"c":0,"e":"Isolate: |2x − 1| = 3. Then 2x − 1 = 3 gives x = 2; −(2x − 1) = 3 gives x = −1 (Example 5).","tr":2,"ci":"Unit 2 — SOLVING EQUATIONS §2.3 Solving Non-linear Equations","av":1,"pv":1},
  {"i":"math-g9-0124","g":9,"u":"Solving Equations","d":"medium","t":"calculation","q":"Solve by factorization: x² − 6x − 16 = 0.","o":["x = 8 or x = −2","x = −8 or x = 2","x = 8 or x = 2","x = 4 or x = −4"],"c":0,"e":"Find numbers with sum −6 and product −16: −8 and 2, so (x−8)(x+2)=0, giving x = 8 or x = −2 (Example 2).","tr":2,"ci":"Unit 2 — SOLVING EQUATIONS §2.3 Solving Non-linear Equations","av":1,"pv":1},
  {"i":"math-g9-0125","g":9,"u":"Solving Equations","d":"hard","t":"calculation","q":"Using completing the square, solve x² + 6x + 7 = 0.","o":["x = −3 ± √2","x = 3 ± √2","x = −3 ± √7","x = −6 ± √2"],"c":0,"e":"x² + 6x + 9 − 2 = 0 gives (x+3)² = 2, so x + 3 = ±√2 and x = −3 ± √2 (Example 3).","tr":2,"ci":"Unit 2 — SOLVING EQUATIONS §2.3 Solving Non-linear Equations","av":1,"pv":1},
  {"i":"math-g9-0126","g":9,"u":"Solving Equations","d":"hard","t":"calculation","q":"Use the quadratic formula to solve x² − 6x + 3 = 0.","o":["x = 3 ± √6","x = 3 ± √3","x = 6 ± √6","x = −3 ± √6"],"c":0,"e":"With a=1, b=−6, c=3: x = (6 ± √24)/2 = 3 ± √6 (Example 1, quadratic formula).","tr":2,"ci":"Unit 2 — SOLVING EQUATIONS §2.3 Solving Non-linear Equations","av":1,"pv":1},
  {"i":"math-g9-0127","g":9,"u":"Solving Equations","d":"medium","t":"conceptual","q":"For a quadratic equation, what does a discriminant value D = 0 indicate about the roots?","o":["The roots are real and equal (one real root)","The roots are real and distinct","There are no real roots","The roots are imaginary"],"c":0,"e":"The text states if D = 0 the roots are real and equal (coincident); the equation has exactly one real root.","tr":2,"ci":"Unit 2 — SOLVING EQUATIONS §2.3 Solving Non-linear Equations","av":1,"pv":1},
  {"i":"math-g9-0128","g":9,"u":"Solving Equations","d":"medium","t":"calculation","q":"Solve the exponential equation 2^(x+4) = 32.","o":["x = 1","x = 5","x = 4","x = −1"],"c":0,"e":"Write 32 = 2⁵, so x + 4 = 5 and x = 1 (Example 2 part b).","tr":2,"ci":"Unit 2 — SOLVING EQUATIONS §2.3 Solving Non-linear Equations","av":1,"pv":1},
  {"i":"math-g9-0129","g":9,"u":"Solving Equations","d":"hard","t":"calculation","q":"Solve the radical equation √(15 − 2x) = x.","o":["x = 3","x = −5","x = 3 or x = −5","x = 5"],"c":0,"e":"Squaring gives x² + 2x − 15 = 0, so x = 3 or x = −5; but the domain 0 ≤ x ≤ 7.5 rejects −5, leaving x = 3 (Example 1).","tr":2,"ci":"Unit 2 — SOLVING EQUATIONS §2.3 Solving Non-linear Equations","av":1,"pv":1},
  {"i":"math-g9-0130","g":9,"u":"Solving Equations","d":"hard","t":"application","q":"Circus tickets cost Birr 25 for children and Birr 50 for adults. With 2,000 attendees and Birr 70,000 revenue, how many children attended?","o":["1,200","800","1,000","1,400"],"c":0,"e":"From c + a = 2000 and 25c + 50a = 70000, substituting gives c = 1200 children (and 800 adults) (Example 1).","tr":2,"ci":"Unit 2 — SOLVING EQUATIONS §2.4 Some Applications of Solving Equations","av":1,"pv":1},

  {"i":"math-g9-0168","g":9,"u":"Solving Inequalities","d":"easy","t":"calculation","q":"Solve the linear inequality 3x − (x + 2) ≥ 0.","o":["x ≥ 1","x ≤ 1","x ≥ 2","x > 1"],"c":0,"e":"3x − x − 2 ≥ 0 gives 2x ≥ 2, so dividing by 2 yields x ≥ 1, i.e. [1, ∞).","tr":2,"ci":"Unit 3 — SOLVING INEQUALITIES §3.1 Revision on Linear Inequalities in One Variable","av":1,"pv":1},

  {"i":"math-g9-0170","g":9,"u":"Solving Inequalities","d":"medium","t":"calculation","q":"Solve x + 2 < −x + 6 and give the interval notation.","o":["(−∞, 2)","(2, ∞)","(−∞, 4)","(−4, ∞)"],"c":0,"e":"x + x < 6 − 2 gives 2x < 4, so x < 2, i.e. the interval (−∞, 2).","tr":2,"ci":"Unit 3 — SOLVING INEQUALITIES §3.1 Revision on Linear Inequalities in One Variable","av":1,"pv":1},
  {"i":"math-g9-0171","g":9,"u":"Solving Inequalities","d":"hard","t":"calculation","q":"Solve the inequality (−2/3)x + 1/2 ≤ 5/6 (worked example in the text). Which is the solution set?","o":["[−1/2, ∞)","(−∞, −1/2]","[1/2, ∞)","(−∞, 1/2]"],"c":0,"e":"Multiplying by 6: −4x + 3 ≤ 5, so −4x ≤ 2, and dividing by −4 reverses the sign giving x ≥ −1/2, i.e. [−1/2, ∞).","tr":2,"ci":"Unit 3 — SOLVING INEQUALITIES §3.1 Revision on Linear Inequalities in One Variable","av":1,"pv":1},
  {"i":"math-g9-0172","g":9,"u":"Solving Inequalities","d":"medium","t":"conceptual","q":"When representing a linear-inequality solution on a number line, how is a boundary point that is NOT included (e.g. for a strict inequality <) shown?","o":["An open circle","A solid filled-in circle","A dashed segment only","A square bracket on the dot"],"c":0,"e":"The text states included boundary points use a solid filled-in circle and excluded ones (strict inequalities) use an open circle.","tr":2,"ci":"Unit 3 — SOLVING INEQUALITIES §3.1 Revision on Linear Inequalities in One Variable","av":1,"pv":1},
  {"i":"math-g9-0173","g":9,"u":"Solving Inequalities","d":"medium","t":"conceptual","q":"In graphing a linear inequality in two variables, when is the boundary line drawn as a dashed (rather than solid) line?","o":["When the symbol is < or >","When the symbol is ≤ or ≥","Whenever the test point (0,0) fails","Only for vertical lines"],"c":0,"e":"The text says if the symbol is < or >, points on the line are NOT solutions, so the line is dashed; ≤ or ≥ gives a solid line.","tr":2,"ci":"Unit 3 — SOLVING INEQUALITIES §3.2 Systems of Linear Inequalities in Two Variables","av":1,"pv":1},
