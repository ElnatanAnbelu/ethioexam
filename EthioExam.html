  {"i":"math-g9-0175","g":9,"u":"Solving Inequalities","d":"hard","t":"calculation","q":"In the worked example, the first inequality 2x + 3y ≥ 12 is rewritten with y alone. Which form results?","o":["y ≥ −(2/3)x + 4","y ≤ −(2/3)x + 4","y ≥ −(3/2)x + 4","y ≥ (2/3)x − 4"],"c":0,"e":"3y ≥ −2x + 12, divide by 3 (positive, sign unchanged) to get y ≥ −(2/3)x + 4.","tr":2,"ci":"Unit 3 — SOLVING INEQUALITIES §3.2 Systems of Linear Inequalities in Two Variables","av":1,"pv":1},
  {"i":"math-g9-0176","g":9,"u":"Solving Inequalities","d":"medium","t":"application","q":"To decide which side of a boundary line to shade, the text says to choose a test point not on the line and substitute it. If the inequality is FALSE for the test point, you shade:","o":["The region opposite the test point","The region containing the test point","Both regions","Neither region"],"c":0,"e":"The text: if false for the test point, shade the opposite region; if true, shade the side containing the point.","tr":2,"ci":"Unit 3 — SOLVING INEQUALITIES §3.2 Systems of Linear Inequalities in Two Variables","av":1,"pv":1},
  {"i":"math-g9-0177","g":9,"u":"Solving Inequalities","d":"easy","t":"definition","q":"For a positive number c, the solutions of |k| < c are exactly:","o":["−c < k < c","k > c or k < −c","k < c only","k > −c only"],"c":0,"e":"The stated theorem: the solutions of |k| < c are the numbers satisfying −c < k < c.","tr":2,"ci":"Unit 3 — SOLVING INEQUALITIES §3.3 Inequalities Involving Absolute Value","av":1,"pv":1},
  {"i":"math-g9-0178","g":9,"u":"Solving Inequalities","d":"medium","t":"calculation","q":"Solve |x + 2| < 4 (worked example). The solution in interval notation is:","o":["(−6, 2)","[−6, 2]","(−∞, −6) ∪ (2, ∞)","(−2, 6)"],"c":0,"e":"−4 < x + 2 < 4 gives −6 < x < 2, i.e. (−6, 2).","tr":2,"ci":"Unit 3 — SOLVING INEQUALITIES §3.3 Inequalities Involving Absolute Value","av":1,"pv":1},
  {"i":"math-g9-0179","g":9,"u":"Solving Inequalities","d":"hard","t":"calculation","q":"Solve |3x − 2| ≥ 7.","o":["x ≥ 3 or x ≤ −5/3","−5/3 ≤ x ≤ 3","x ≥ 3 or x ≤ 5/3","−3 ≤ x ≤ 5/3"],"c":0,"e":"|k| ≥ c gives k ≥ c or k ≤ −c: 3x − 2 ≥ 7 → x ≥ 3, or 3x − 2 ≤ −7 → 3x ≤ −5 → x ≤ −5/3.","tr":2,"ci":"Unit 3 — SOLVING INEQUALITIES §3.3 Inequalities Involving Absolute Value","av":1,"pv":1},
  {"i":"math-g9-0180","g":9,"u":"Solving Inequalities","d":"medium","t":"conceptual","q":"Solve |6x + 8| > −2.","o":["All real numbers","No solution","x > −8/6 only","x = −4/3 only"],"c":0,"e":"An absolute value is always greater than any negative number, so the solution is all real numbers.","tr":2,"ci":"Unit 3 — SOLVING INEQUALITIES §3.3 Inequalities Involving Absolute Value","av":1,"pv":1},
  {"i":"math-g9-0181","g":9,"u":"Solving Inequalities","d":"hard","t":"calculation","q":"Solve |−5x − 7| ≤ 0.","o":["x = −7/5","No solution","x ≤ −7/5","All real numbers"],"c":0,"e":"An absolute value is never < 0, so only equality counts: −5x − 7 = 0 gives x = −7/5, the single solution.","tr":2,"ci":"Unit 3 — SOLVING INEQUALITIES §3.3 Inequalities Involving Absolute Value","av":1,"pv":1},
  {"i":"math-g9-0182","g":9,"u":"Solving Inequalities","d":"impossible","t":"calculation","q":"Using the text's note that |x+2| ≤ 4 has solution [−6, 2], what is the solution of |x + 2| ≥ 4?","o":["(−∞, −6] ∪ [2, ∞)","[−6, 2]","(−∞, −6) ∪ (2, ∞)","(−6, 2)"],"c":0,"e":"|k| ≥ c gives k ≤ −c or k ≥ c with closed endpoints: x + 2 ≤ −4 → x ≤ −6, or x + 2 ≥ 4 → x ≥ 2, i.e. (−∞, −6] ∪ [2, ∞).","tr":2,"ci":"Unit 3 — SOLVING INEQUALITIES §3.3 Inequalities Involving Absolute Value","av":1,"pv":1},
  {"i":"math-g9-0183","g":9,"u":"Solving Inequalities","d":"easy","t":"calculation","q":"Solve (x − 3)(x − 1) < 0 using the product property.","o":["(1, 3)","(−∞, 1) ∪ (3, ∞)","(−3, −1)","(−1, 3)"],"c":0,"e":"A product is negative when one factor is positive and the other negative: x > 1 and x < 3, giving x ∈ (1, 3).","tr":2,"ci":"Unit 3 — SOLVING INEQUALITIES §3.4 Quadratic Inequalities","av":1,"pv":1},
  {"i":"math-g9-0184","g":9,"u":"Solving Inequalities","d":"medium","t":"calculation","q":"Solve x² − 4x > −3.","o":["x < 1 or x > 3","1 < x < 3","x < −1 or x > 3","−3 < x < 1"],"c":0,"e":"Add 3: x² − 4x + 3 > 0 → (x − 3)(x − 1) > 0, positive when both factors >0 (x>3) or both <0 (x<1). So x < 1 or x > 3.","tr":2,"ci":"Unit 3 — SOLVING INEQUALITIES §3.4 Quadratic Inequalities","av":1,"pv":1},
  {"i":"math-g9-0185","g":9,"u":"Solving Inequalities","d":"hard","t":"calculation","q":"Solve x² − x ≥ 12.","o":["(−∞, −3] ∪ [4, ∞)","[−3, 4]","(−∞, −4] ∪ [3, ∞)","[−4, 3]"],"c":0,"e":"x² − x − 12 ≥ 0 → (x − 4)(x + 3) ≥ 0, true when x ≥ 4 or x ≤ −3, i.e. (−∞, −3] ∪ [4, ∞).","tr":2,"ci":"Unit 3 — SOLVING INEQUALITIES §3.4 Quadratic Inequalities","av":1,"pv":1},
  {"i":"math-g9-0186","g":9,"u":"Solving Inequalities","d":"medium","t":"calculation","q":"Using a sign chart, solve x² + 5x + 6 ≥ 0.","o":["x ≤ −3 or x ≥ −2","−3 ≤ x ≤ −2","x ≤ −2 or x ≥ −3","−2 ≤ x ≤ 3"],"c":0,"e":"Factor: (x + 3)(x + 2) ≥ 0. The product is non-negative when x ≤ −3 or x ≥ −2, i.e. (−∞, −3] ∪ [−2, ∞).","tr":2,"ci":"Unit 3 — SOLVING INEQUALITIES §3.4 Quadratic Inequalities","av":1,"pv":1},
  {"i":"math-g9-0187","g":9,"u":"Solving Inequalities","d":"medium","t":"application","q":"Kebede saved Birr 6,000 and adds Birr 1,000 each month, wanting more than Birr 80,000. Solving 6,000 + 1,000m > 80,000 gives:","o":["m > 74","m > 80","m ≥ 74","m > 86"],"c":0,"e":"1,000m > 74,000 so m > 74; he needs more than 74 months (over 6 years).","tr":2,"ci":"Unit 3 — SOLVING INEQUALITIES §3.5 Applications on Equations","av":1,"pv":1},
  {"i":"math-g9-0217","g":9,"u":"Introduction to Trigonometry","d":"easy","t":"definition","q":"According to the textbook, in a right-angled triangle the side opposite the 90° angle is called the:","o":["base","perpendicular side","hypotenuse","adjacent side"],"c":2,"e":"The text states the opposite side to the right angle (90°) is called the hypotenuse, and it is always the longest side.","tr":2,"ci":"Unit 4 — INTRODUCTION TO TRIGONOMETRY §4.1 Revision on Right-angled Triangles","av":1,"pv":1},
  {"i":"math-g12-0853","g":12,"u":"Sequences and Series","d":"easy","t":"definition","q":"In an arithmetic sequence, the fixed number added to each term to get the next term is called the:","o":["common ratio","common difference","arithmetic mean","general term"],"c":1,"e":"By Definition 1.2, each term except the first is obtained by adding a fixed number to the preceding term; this fixed number is the common difference.","tr":2,"ci":"Unit 1 — Sequences and Series §1.2 Arithmetic and Geometric Sequences","av":1},
  {"i":"math-g12-0854","g":12,"u":"Sequences and Series","d":"easy","t":"calculation","q":"For the geometric sequence 3, 6, 12, 24, 48, …, what is the 6th term?","o":["72","96","108","144"],"c":1,"e":"The common ratio is 2, so the 6th term = 48 × 2 = 96, matching the worked example in the text.","tr":2,"ci":"Unit 1 — Sequences and Series §1.2 Arithmetic and Geometric Sequences","av":1},
  {"i":"math-g12-0855","g":12,"u":"Sequences and Series","d":"medium","t":"calculation","q":"In the arithmetic sequence 1, 4, 7, 10, …, what is the 31st term?","o":["88","91","94","97"],"c":1,"e":"Using A_n = A_1 + (n−1)d with A_1 = 1, d = 3: A_31 = 1 + 30(3) = 91.","tr":2,"ci":"Unit 1 — Sequences and Series §1.2 Arithmetic and Geometric Sequences","av":1},
  {"i":"math-g12-0856","g":12,"u":"Sequences and Series","d":"medium","t":"calculation","q":"Four arithmetic means are inserted between 4 and 29. What is the common difference of the resulting sequence?","o":["4","5","6","7"],"c":1,"e":"With 4 and 29 as the 1st and 6th terms, 29 = 4 + 5d gives 5d = 25, so d = 5 (the textbook's worked example).","tr":2,"ci":"Unit 1 — Sequences and Series §1.2 Arithmetic and Geometric Sequences","av":1},
  {"i":"math-g12-0857","g":12,"u":"Sequences and Series","d":"medium","t":"calculation","q":"For the geometric sequence 2, 6, 18, 54, …, what is the 5th term?","o":["108","162","216","486"],"c":1,"e":"With G_1 = 2 and r = 3, G_n = G_1 r^(n−1), so G_5 = 2 × 3^4 = 2 × 81 = 162.","tr":2,"ci":"Unit 1 — Sequences and Series §1.2 Arithmetic and Geometric Sequences","av":1},
  {"i":"math-g12-0858","g":12,"u":"Sequences and Series","d":"easy","t":"calculation","q":"In the arithmetic sequence 10, 6, 2, −2, …, what is the 5th term?","o":["−4","−6","−8","0"],"c":1,"e":"The common difference is −4, so the 5th term = −2 + (−4) = −6, as in the worked example with A_1 = 10, d = −4.","tr":2,"ci":"Unit 1 — Sequences and Series §1.2 Arithmetic and Geometric Sequences","av":1},
  {"i":"math-g12-0859","g":12,"u":"Sequences and Series","d":"medium","t":"calculation","q":"If 1, x, 8 form an arithmetic sequence, what is x?","o":["3.5","4","4.5","5"],"c":2,"e":"For an arithmetic sequence the middle term is the arithmetic mean: x = (1 + 8)/2 = 4.5, as shown in the text.","tr":2,"ci":"Unit 1 — Sequences and Series §1.2 Arithmetic and Geometric Sequences","av":1},
  {"i":"math-g12-0860","g":12,"u":"Sequences and Series","d":"medium","t":"calculation","q":"The geometric mean between 4 and 9 (positive value) is:","o":["6","6.5","13","36"],"c":0,"e":"The geometric mean of two numbers is the square root of their product: √(4 × 9) = √36 = 6.","tr":2,"ci":"Unit 1 — Sequences and Series §1.2 Arithmetic and Geometric Sequences","av":1},
  {"i":"math-g12-0861","g":12,"u":"Sequences and Series","d":"easy","t":"calculation","q":"Evaluate the sum 2 + 2² + 2³ + 2⁴ + 2⁵ + 2⁶.","o":["120","124","126","128"],"c":2,"e":"This geometric sum with a = 2, r = 2, n = 6 equals 2(2^6 − 1)/(2 − 1) = 2(63) = 126.","tr":2,"ci":"Unit 1 — Sequences and Series §1.3 The Sigma Notation and Partial Sums","av":1},
  {"i":"math-g12-0862","g":12,"u":"Sequences and Series","d":"medium","t":"calculation","q":"Using the property the textbook applies, the sum of 2^k for k = 0 to 6 (i.e. 1 + 2 + 4 + … + 64) equals:","o":["63","126","127","128"],"c":2,"e":"The text computes 2^0 + … + 2^5 = 63; adding 2^6 = 64 gives 127, also = 2^7 − 1.","tr":2,"ci":"Unit 1 — Sequences and Series §1.3 The Sigma Notation and Partial Sums","av":1},
  {"i":"math-g12-0863","g":12,"u":"Sequences and Series","d":"medium","t":"calculation","q":"Evaluate the sum of 3k for k = 2 to 5.","o":["39","42","45","48"],"c":1,"e":"3k for k = 2,3,4,5 gives 6 + 9 + 12 + 15 = 42; equivalently 3(2+3+4+5) = 3(14) = 42.","tr":2,"ci":"Unit 1 — Sequences and Series §1.3 The Sigma Notation and Partial Sums","av":1},
  {"i":"math-g12-0864","g":12,"u":"Sequences and Series","d":"medium","t":"calculation","q":"Using S_n = n/2[2A_1 + (n−1)d], the sum of the first 6 terms of 3, 5, 7, 9, … is:","o":["44","46","48","50"],"c":2,"e":"With A_1 = 3, d = 2, n = 6: S_6 = 6/2[2(3) + 5(2)] = 3(16) = 48.","tr":2,"ci":"Unit 1 — Sequences and Series §1.3 The Sigma Notation and Partial Sums","av":1},
  {"i":"math-g12-0865","g":12,"u":"Sequences and Series","d":"hard","t":"calculation","q":"For the geometric sequence 5, 25, 125, …, the sum of the first 4 terms is:","o":["620","680","780","930"],"c":2,"e":"With G_1 = 5, r = 5, n = 4: S_n = G_1(r^n − 1)/(r − 1) = 5(625 − 1)/4 = 5(624)/4 = 780.","tr":2,"ci":"Unit 1 — Sequences and Series §1.3 The Sigma Notation and Partial Sums","av":1},
  {"i":"math-g12-0866","g":12,"u":"Sequences and Series","d":"hard","t":"calculation","q":"Using the arithmetic sum formula, the sum of the first 20 positive odd numbers (1, 3, 5, …) is:","o":["360","380","400","420"],"c":2,"e":"With A_1 = 1, d = 2, n = 20: S_20 = 20/2[2(1) + 19(2)] = 10(40) = 400.","tr":2,"ci":"Unit 1 — Sequences and Series §1.3 The Sigma Notation and Partial Sums","av":1},
  {"i":"math-g12-0867","g":12,"u":"Sequences and Series","d":"easy","t":"conceptual","q":"For an infinite geometric sequence G_n = r^n, when |r| < 1 and n → ∞, the terms G_n approach:","o":["0 (converge)","1 (converge)","∞ (diverge)","−∞ (diverge)"],"c":0,"e":"The text states that when |r| < 1, as n → ∞, G_n → 0, so the sequence converges to 0.","tr":2,"ci":"Unit 1 — Sequences and Series §1.4 Infinite Series","av":1},
  {"i":"math-g12-0868","g":12,"u":"Sequences and Series","d":"medium","t":"calculation","q":"Using S = G_1/(1 − r), the sum to infinity of the geometric series 12 + 6 + 3 + … is:","o":["18","20","24","36"],"c":2,"e":"With G_1 = 12 and r = 1/2 (|r| < 1): S = 12/(1 − 1/2) = 12/0.5 = 24.","tr":2,"ci":"Unit 1 — Sequences and Series §1.4 Infinite Series","av":1},
  {"i":"math-g12-0869","g":12,"u":"Sequences and Series","d":"hard","t":"calculation","q":"The sum to infinity of the series 1/3 + 1/9 + 1/27 + … equals:","o":["1/3","1/2","2/3","1"],"c":1,"e":"This is geometric with G_1 = 1/3 and r = 1/3 (|r| < 1): S = (1/3)/(1 − 1/3) = (1/3)/(2/3) = 1/2.","tr":2,"ci":"Unit 1 — Sequences and Series §1.4 Infinite Series","av":1},
  {"i":"math-g12-0870","g":12,"u":"Sequences and Series","d":"hard","t":"application","q":"A man starts at 5200 ETB per month with an automatic increase of 320 ETB each subsequent month. What is his salary in the tenth month?","o":["7760 ETB","8080 ETB","8400 ETB","8720 ETB"],"c":1,"e":"This is arithmetic with A_1 = 5200, d = 320: A_10 = 5200 + 9(320) = 5200 + 2880 = 8080 ETB.","tr":2,"ci":"Unit 1 — Sequences and Series §1.5 Application of Arithmetic Sequences and Geometric Sequences","av":1},
  {"i":"math-g12-0871","g":12,"u":"Sequences and Series","d":"impossible","t":"application","q":"For the same man (5200 ETB initial monthly salary, +320 ETB increase each month), what are his total earnings during the first year (12 months)?","o":["62,400 ETB","79,200 ETB","83,520 ETB","104,160 ETB"],"c":2,"e":"Total = S_12 = 12/2[2(5200) + 11(320)] = 6[10400 + 3520] = 6(13920) = 83,520 ETB.","tr":2,"ci":"Unit 1 — Sequences and Series §1.5 Application of Arithmetic Sequences and Geometric Sequences","av":1},
  {"i":"math-g12-0872","g":12,"u":"Introduction to Calculus","d":"easy","t":"definition","q":"According to the textbook, the average rate of change of a function y = f(x) over the interval [a, b] is geometrically equal to the slope of which line?","o":["The tangent line at x = a","The secant line through (a, f(a)) and (b, f(b))","The normal line at x = b","A horizontal line through the midpoint"],"c":1,"e":"The text states the average rate of change of f on [a, b] is the slope of the secant line through (a, f(a)) and (b, f(b)).","tr":2,"ci":"Unit 2 — Introduction to Calculus §2.1 Introduction to Derivatives","av":1},
  {"i":"math-g12-0873","g":12,"u":"Introduction to Calculus","d":"easy","t":"calculation","q":"Using the textbook's formula, find the rate of change between the points (2, 3) and (3, 1).","o":["-2","2","-1","1"],"c":0,"e":"Rate of change = (change in y)/(change in x) = (1 - 3)/(3 - 2) = -2/1 = -2, matching the worked Example in the text.","tr":2,"ci":"Unit 2 — Introduction to Calculus §2.1 Introduction to Derivatives","av":1},
  {"i":"math-g12-0874","g":12,"u":"Introduction to Calculus","d":"easy","t":"calculation","q":"Apply the power rule (Theorem 2.1) to find the derivative of f(x) = x^9.","o":["9x^10","9x^8","8x^9","x^8"],"c":1,"e":"By the power rule, d/dx(x^n) = n·x^(n-1), so the derivative of x^9 is 9x^8.","tr":2,"ci":"Unit 2 — Introduction to Calculus §2.1 Introduction to Derivatives","av":1},
  {"i":"math-g12-0875","g":12,"u":"Introduction to Calculus","d":"medium","t":"calculation","q":"For f(x) = 2x³ + 3x + 5 on the interval [1, 3], compute the average rate of change (slope of the secant line).","o":["29","34","23","27"],"c":0,"e":"f(3) = 54 + 9 + 5 = 68 and f(1) = 2 + 3 + 5 = 10; average rate of change = (68 - 10)/(3 - 1) = 58/2 = 29.","tr":2,"ci":"Unit 2 — Introduction to Calculus §2.1 Introduction to Derivatives","av":1},
  {"i":"math-g12-0876","g":12,"u":"Introduction to Calculus","d":"medium","t":"calculation","q":"Using the textbook's limit method (h approaching 0), find the instantaneous rate of change of f(x) = 6 - 3x² at x = 1.","o":["-6","6","-3","3"],"c":0,"e":"The instantaneous rate of change equals the derivative; f'(x) = -6x, so at x = 1 it is -6(1) = -6 (the same value the h-approaching-0 limit gives).","tr":2,"ci":"Unit 2 — Introduction to Calculus §2.1 Introduction to Derivatives","av":1},
  {"i":"math-g12-0877","g":12,"u":"Introduction to Calculus","d":"hard","t":"calculation","q":"Using the product rule (Theorem 2.4), f'(x) for f(x) = (x² - 6)(x - 4), what is f'(0)?","o":["-6","-8","6","0"],"c":0,"e":"f'(x) = 2x(x - 4) + (x² - 6)(1) = 3x² - 8x - 6; evaluating at x = 0 gives -6.","tr":2,"ci":"Unit 2 — Introduction to Calculus §2.1 Introduction to Derivatives","av":1},
  {"i":"math-g12-0878","g":12,"u":"Introduction to Calculus","d":"hard","t":"calculation","q":"Using the quotient rule (Theorem 2.5), find the derivative of f(x) = (2x + 1)/(3x - 1).","o":["-5/(3x - 1)²","5/(3x - 1)²","-1/(3x - 1)²","12/(3x - 1)²"],"c":0,"e":"f'(x) = [2(3x - 1) - (2x + 1)(3)]/(3x - 1)² = (6x - 2 - 6x - 3)/(3x - 1)² = -5/(3x - 1)².","tr":2,"ci":"Unit 2 — Introduction to Calculus §2.1 Introduction to Derivatives","av":1},
  {"i":"math-g12-0879","g":12,"u":"Introduction to Calculus","d":"medium","t":"calculation","q":"Using the rule for derivatives of polynomial functions, find f'(x) for f(x) = 3x⁸ + 2x⁵ - x³.","o":["24x⁷ + 10x⁴ - 3x²","24x⁷ + 10x⁴ - x²","3x⁷ + 2x⁴ - x²","8x⁷ + 5x⁴ - 3x²"],"c":0,"e":"Differentiating term by term with the power rule: 8·3x⁷ + 5·2x⁴ - 3x² = 24x⁷ + 10x⁴ - 3x².","tr":2,"ci":"Unit 2 — Introduction to Calculus §2.1 Introduction to Derivatives","av":1},
  {"i":"math-g12-0880","g":12,"u":"Introduction to Calculus","d":"medium","t":"calculation","q":"If f(x) = x³ - x², compute f'(2) using the sum/difference and power rules.","o":["8","10","6","4"],"c":0,"e":"f'(x) = 3x² - 2x, so f'(2) = 3(4) - 2(2) = 12 - 4 = 8.","tr":2,"ci":"Unit 2 — Introduction to Calculus §2.1 Introduction to Derivatives","av":1},
  {"i":"math-g12-0881","g":12,"u":"Introduction to Calculus","d":"hard","t":"application","q":"Using the textbook formula y = f'(a)(x - a) + f(a), the equation of the tangent line to f(x) = x³ - 2 at the point (1, -1) is y = 3x - 4. What is the y-value of this tangent line when x = 2?","o":["2","4","-1","6"],"c":0,"e":"f'(x) = 3x² so f'(1) = 3; tangent: y = 3(x - 1) + (-1) = 3x - 4. At x = 2, y = 3(2) - 4 = 2.","tr":2,"ci":"Unit 2 — Introduction to Calculus §2.1 Introduction to Derivatives","av":1},
  {"i":"math-g12-0882","g":12,"u":"Introduction to Calculus","d":"medium","t":"calculation","q":"The slope of the normal line at a point of tangency is -1/f'(a). For f(x) = x² at x = 3, what is the slope of the normal line?","o":["-1/6","6","-6","1/6"],"c":0,"e":"f'(x) = 2x so f'(3) = 6; the normal slope is the negative reciprocal, -1/6.","tr":2,"ci":"Unit 2 — Introduction to Calculus §2.1 Introduction to Derivatives","av":1},
  {"i":"math-g12-0883","g":12,"u":"Introduction to Calculus","d":"medium","t":"application","q":"If the radius of a circle increases at 1.5 cm/sec, the textbook finds dA/dt using A = πr². What is dA/dt at the instant the diameter is 12 cm?","o":["18π cm²/sec","9π cm²/sec","36π cm²/sec","12π cm²/sec"],"c":0,"e":"dA/dt = 2πr·dr/dt; diameter 12 means r = 6, so dA/dt = 2π(6)(1.5) = 18π cm²/sec.","tr":2,"ci":"Unit 2 — Introduction to Calculus §2.2 Application of Derivative","av":1},
  {"i":"math-g12-0884","g":12,"u":"Introduction to Calculus","d":"hard","t":"application","q":"For the profit function P(x) = x - 0.00001x² (birr), the textbook sets marginal profit (the derivative) to zero. What sales volume x gives maximum profit?","o":["50,000 units","25,000 units","100,000 units","20,000 units"],"c":0,"e":"Marginal profit = 1 - 0.00002x; setting it to 0 gives x = 1/0.00002 = 50,000 units, confirmed as a maximum by the first derivative test.","tr":2,"ci":"Unit 2 — Introduction to Calculus §2.2 Application of Derivative","av":1},
  {"i":"math-g12-0885","g":12,"u":"Introduction to Calculus","d":"hard","t":"application","q":"An equilateral triangle's side increases at 2 cm/sec. Using A = (√3/4)s², what is the rate at which the area increases when the side is 4 cm?","o":["4√3 cm²/sec","2√3 cm²/sec","8√3 cm²/sec","16√3 cm²/sec"],"c":0,"e":"dA/dt = (√3/4)(2s)(ds/dt) = (√3/2)s·ds/dt = (√3/2)(4)(2) = 4√3 cm²/sec.","tr":2,"ci":"Unit 2 — Introduction to Calculus §2.2 Application of Derivative","av":1},
  {"i":"math-g12-0886","g":12,"u":"Introduction to Calculus","d":"easy","t":"conceptual","q":"In the textbook's business applications, to confirm that a critical value of the profit function gives a maximum (not a minimum), which test is used?","o":["The first derivative test (sign chart)","The integral test","The secant line test","The midpoint test"],"c":0,"e":"The text uses the first derivative test: it checks whether the sign of P'(x) changes from positive to negative at the critical value, indicating a maximum.","tr":2,"ci":"Unit 2 — Introduction to Calculus §2.2 Application of Derivative","av":1},
  {"i":"math-g12-0887","g":12,"u":"Introduction to Calculus","d":"easy","t":"definition","q":"According to the textbook, integration is described as which of the following?","o":["The reverse operation of differentiation (anti-differentiation)","Finding the slope of a tangent line","Doubling the x-coordinate of a point","Computing the average rate of change"],"c":0,"e":"The text states integration (anti-differentiation) is the reverse operation of differentiation; F(x) is the anti-derivative of f(x).","tr":2,"ci":"Unit 2 — Introduction to Calculus §2.3 Introduction to Integrals","av":1},
  {"i":"math-g12-0888","g":12,"u":"Introduction to Calculus","d":"medium","t":"calculation","q":"Using the textbook's power rule for integrals ∫x^n dx = x^(n+1)/(n+1) + c, find ∫x⁵ dx.","o":["x⁶/6 + c","5x⁴ + c","x⁶/5 + c","6x⁶ + c"],"c":0,"e":"Add 1 to the exponent and divide: ∫x⁵ dx = x⁶/6 + c.","tr":2,"ci":"Unit 2 — Introduction to Calculus §2.3 Introduction to Integrals","av":1},
  {"i":"math-g12-0889","g":12,"u":"Introduction to Calculus","d":"hard","t":"calculation","q":"Using the anti-derivative F(x) = x³/3 + x and the rule ∫f(x)dx = F(b) - F(a), evaluate the area under y = x² + 1 over [-1, 2].","o":["6","9","3","5"],"c":0,"e":"F(2) - F(-1) = (8/3 + 2) - (-1/3 - 1) = 14/3 - (-4/3) = 18/3 = 6, matching the worked example.","tr":2,"ci":"Unit 2 — Introduction to Calculus §2.3 Introduction to Integrals","av":1},
  {"i":"math-g12-0890","g":12,"u":"Introduction to Calculus","d":"medium","t":"calculation","q":"Using the Fundamental Theorem of Calculus (Definition 2.13), evaluate the definite integral of (3x² - 2x) from 1 to 3.","o":["18","20","26","12"],"c":0,"e":"An anti-derivative is x³ - x²; (27 - 9) - (1 - 1) = 18 - 0 = 18.","tr":2,"ci":"Unit 2 — Introduction to Calculus §2.3 Introduction to Integrals","av":1},
  {"i":"math-g12-0891","g":12,"u":"Introduction to Calculus","d":"easy","t":"application","q":"The velocity of an object is v(x) = 3x (miles per hour). Using geometry, the textbook finds the distance traveled during the first 3 hours as the area of a triangle. What is that area?","o":["13.5 mi","9 mi","27 mi","4.5 mi"],"c":0,"e":"The region is a triangle with base 3 and height v(3) = 9, so area = (1/2)(3)(9) = 13.5 mi.","tr":2,"ci":"Unit 2 — Introduction to Calculus §2.3 Introduction to Integrals","av":1},
  {"i":"math-g12-0892","g":12,"u":"Statistics","d":"easy","t":"calculation","q":"A supermarket recorded daily sales (in Birr 100) of 115, 134, 120, 111, 122, 103, 80, 155, 122, 104, 110, 98. Using the textbook definition, what is the range of this data?","o":["75","80","65","55"],"c":0,"e":"Range = L − S = 155 − 80 = 75 (Example 1, §3.1.1).","tr":2,"ci":"Unit 3 — Statistics §3.1 Measures of Absolute Dispersions","av":1},
  {"i":"math-g12-0893","g":12,"u":"Statistics","d":"easy","t":"definition","q":"According to Definition 3.5, the quartile deviation (QD) is defined as:","o":["(Q3 − Q1)/2","Q3 − Q1","(Q3 + Q1)/2","Q3 + Q1"],"c":0,"e":"Definition 3.5 states QD = (Q3 − Q1)/2, half the difference between upper and lower quartiles.","tr":2,"ci":"Unit 3 — Statistics §3.1 Measures of Absolute Dispersions","av":1},
  {"i":"math-g12-0894","g":12,"u":"Statistics","d":"medium","t":"calculation","q":"Find the variance of the data set 5, 10, 4, 7, 9 using the method taught (divide squared deviations by n).","o":["5.2","6.5","4.0","26"],"c":0,"e":"Mean = 35/5 = 7; squared deviations 4, 9, 9, 0, 4 sum to 26; variance = 26/5 = 5.2.","tr":2,"ci":"Unit 3 — Statistics §3.1 Measures of Absolute Dispersions","av":1},
  {"i":"math-g12-0895","g":12,"u":"Statistics","d":"medium","t":"calculation","q":"For the data 2, 4, 6, 8, 10, the variance is computed as 8. What is the standard deviation (to 2 decimal places)?","o":["2.83","4.00","3.16","8.00"],"c":0,"e":"Standard deviation is the positive square root of variance: √8 ≈ 2.83 (Definition 3.7).","tr":2,"ci":"Unit 3 — Statistics §3.1 Measures of Absolute Dispersions","av":1},
  {"i":"math-g12-0896","g":12,"u":"Statistics","d":"medium","t":"calculation","q":"Find the mean deviation about the mean of the data 50, 80, 80, 110, 110, 110, 140, 160.","o":["26.25","25","210","105"],"c":0,"e":"Mean = 840/8 = 105; sum of absolute deviations = 210; MD = 210/8 = 26.25 (Example 1).","tr":2,"ci":"Unit 3 — Statistics §3.1 Measures of Absolute Dispersions","av":1},
  {"i":"math-g12-0897","g":12,"u":"Statistics","d":"easy","t":"calculation","q":"For a grouped distribution, the upper class boundary of the highest class is 24.5 and the lower class boundary of the lowest class is 4.5. What is the range?","o":["20","29","19","24.5"],"c":0,"e":"Grouped range = Bu(H) − BL(L) = 24.5 − 4.5 = 20 (Definition 3.2, Example 2).","tr":2,"ci":"Unit 3 — Statistics §3.1 Measures of Absolute Dispersions","av":1},
  {"i":"math-g12-0898","g":12,"u":"Statistics","d":"medium","t":"calculation","q":"For the ordered data 10, 12, 14, 16, 18, 20, 22 (n = 7), the first quartile is the 2nd item and the third quartile is the 6th item. What is the inter-quartile range?","o":["8","4","12","6"],"c":0,"e":"Q1 = 12 (2nd item), Q3 = 20 (6th item); IQR = Q3 − Q1 = 20 − 12 = 8 (Definition 3.3).","tr":2,"ci":"Unit 3 — Statistics §3.1 Measures of Absolute Dispersions","av":1},
  {"i":"math-g12-0899","g":12,"u":"Statistics","d":"hard","t":"calculation","q":"A discrete frequency distribution has the absolute deviations from the mean weighted by frequency summing to Σf|x−x̄| = 282.4 with Σf = 46. What is the mean deviation about the mean (to 1 decimal)?","o":["6.1","5.8","12.2","282.4"],"c":0,"e":"MD(x̄) = Σf|x−x̄| / Σf = 282.4/46 ≈ 6.1 (Example 4).","tr":2,"ci":"Unit 3 — Statistics §3.1 Measures of Absolute Dispersions","av":1},
  {"i":"math-g12-0900","g":12,"u":"Statistics","d":"hard","t":"calculation","q":"For grouped time data the first quartile class gives Q1 = 15.25 minutes and the third quartile class gives Q3 = 20 minutes. What is the quartile deviation?","o":["2.375 minutes","4.75 minutes","2.5 minutes","9.5 minutes"],"c":0,"e":"QD = (Q3 − Q1)/2 = (20 − 15.25)/2 = 4.75/2 = 2.375 minutes (Example 1, grouped QD).","tr":2,"ci":"Unit 3 — Statistics §3.1 Measures of Absolute Dispersions","av":1},
  {"i":"math-g12-0901","g":12,"u":"Statistics","d":"impossible","t":"conceptual","q":"A set of 9 raw values has mean deviation about the mean equal to 7.0 and standard deviation 9.0. Using only methods in this grade, what is the exact variance of the original data?","o":["81","49","64","Cannot be determined from this information alone"],"c":0,"e":"Variance is the square of standard deviation: σ² = 9² = 81; the mean deviation value is irrelevant to this computation.","tr":2,"ci":"Unit 3 — Statistics §3.1 Measures of Absolute Dispersions","av":1},
  {"i":"math-g12-0902","g":12,"u":"Statistics","d":"easy","t":"definition","q":"According to Definition 3.13, the coefficient of variation (CV) is given by:","o":["(σ / x̄) × 100","(x̄ / σ) × 100","σ / x̄","(Q3 − Q1)/(Q3 + Q1)"],"c":0,"e":"CV = (σ/x̄) × 100, a unit-less ratio of standard deviation to mean (Definition 3.13).","tr":2,"ci":"Unit 3 — Statistics §3.2 Relative Dispersions and Their Interpretations","av":1},
  {"i":"math-g12-0903","g":12,"u":"Statistics","d":"easy","t":"calculation","q":"A data set has largest value L = 31 and smallest value S = 22. Using Definition 3.8, the coefficient of range (to 2 decimals) is:","o":["0.17","0.35","0.09","1.41"],"c":0,"e":"CR = (L − S)/(L + S) = (31 − 22)/(31 + 22) = 9/53 ≈ 0.17 (Example 2a).","tr":2,"ci":"Unit 3 — Statistics §3.2 Relative Dispersions and Their Interpretations","av":1},
  {"i":"math-g12-0904","g":12,"u":"Statistics","d":"medium","t":"calculation","q":"For a grouped distribution the lowest class is 0–10 and the highest class is 50–60. Using the textbook treatment (upper limit of highest class and lower limit of lowest class), the coefficient of range is:","o":["1","0.6","0.5","0.83"],"c":0,"e":"CR = (60 − 0)/(60 + 0) = 60/60 = 1 (Example 2c).","tr":2,"ci":"Unit 3 — Statistics §3.2 Relative Dispersions and Their Interpretations","av":1},
  {"i":"math-g12-0905","g":12,"u":"Statistics","d":"medium","t":"calculation","q":"A data set has Q1 = 15 and Q3 = 21. Using Definition 3.9, what is the coefficient of quartile deviation (to 2 decimals)?","o":["0.17","0.33","6","0.29"],"c":0,"e":"CQD = (Q3 − Q1)/(Q3 + Q1) = (21 − 15)/(21 + 15) = 6/36 ≈ 0.17 (Example 2).","tr":2,"ci":"Unit 3 — Statistics §3.2 Relative Dispersions and Their Interpretations","av":1},
  {"i":"math-g12-0906","g":12,"u":"Statistics","d":"hard","t":"calculation","q":"Nine students' marks have mean 40, variance 232/9 ≈ 25.78 and standard deviation ≈ 5.08. What is the coefficient of variation (to 1 decimal)?","o":["12.7","6.4","25.8","20.3"],"c":0,"e":"CV = (σ/x̄) × 100 = (5.08/40) × 100 ≈ 12.7 (Example 1, §3.2.4).","tr":2,"ci":"Unit 3 — Statistics §3.2 Relative Dispersions and Their Interpretations","av":1},
  {"i":"math-g12-0907","g":12,"u":"Statistics","d":"medium","t":"calculation","q":"A distribution has mean deviation about the mean of 0.9167 and mean of 2. Using Definition 3.10, the coefficient of mean deviation (from the mean) is approximately:","o":["0.46","0.92","1.83","2.18"],"c":0,"e":"CMD = MD/x̄ = 0.9167/2 ≈ 0.46 (Example 1, §3.2.3).","tr":2,"ci":"Unit 3 — Statistics §3.2 Relative Dispersions and Their Interpretations","av":1},
  {"i":"math-g12-0908","g":12,"u":"Statistics","d":"medium","t":"conceptual","q":"For a distribution, if Mean < Median < Mode, the distribution is described as:","o":["Negatively skewed (skewed to the left)","Positively skewed (skewed to the right)","Symmetrical","Bimodal"],"c":0,"e":"When the mean is smallest and median lies between mean and mode, the distribution is negatively skewed (§3.3.1 generalization a).","tr":2,"ci":"Unit 3 — Statistics §3.3 Use of Frequency Curves","av":1},
  {"i":"math-g12-0909","g":12,"u":"Statistics","d":"hard","t":"calculation","q":"A distribution has mean = 108, median = 110 and standard deviation = 5.7. Using Karl Pearson's coefficient of skewness, the value (to 2 decimals) and skewness are:","o":["−1.05, negatively skewed","1.05, positively skewed","0, symmetrical","−0.35, negatively skewed"],"c":0,"e":"Pearson's coefficient = 3(mean − median)/SD = 3(108 − 110)/5.7 ≈ −1.05; negative means negatively skewed (Example 1, §3.3.2).","tr":2,"ci":"Unit 3 — Statistics §3.3 Use of Frequency Curves","av":1},
  {"i":"math-g12-0910","g":12,"u":"Statistics","d":"hard","t":"calculation","q":"For a data set Q1 = 11, Q2 (median) = 14, Q3 = 17. Using Bowley's coefficient of skewness, what is its value and what does it indicate?","o":["0, symmetrical","6, positively skewed","−6, negatively skewed","0.5, positively skewed"],"c":0,"e":"Bowley's coefficient = (Q3 + Q1 − 2Q2)/(Q3 − Q1) = (17 + 11 − 28)/(17 − 11) = 0/6 = 0, so symmetrical (Example 2).","tr":2,"ci":"Unit 3 — Statistics §3.3 Use of Frequency Curves","av":1},
  {"i":"math-g12-0911","g":12,"u":"Statistics","d":"easy","t":"calculation","q":"In a class of 110 students you need a sample of 10 using systematic sampling. What is the sampling interval k?","o":["11","10","100","12"],"c":0,"e":"k = N/n = 110/10 = 11 (Example 3, §3.4).","tr":2,"ci":"Unit 3 — Statistics §3.4 Sampling Techniques","av":1},
  {"i":"math-g12-0912","g":12,"u":"Introduction to Linear Programming","d":"easy","t":"calculation","q":"A non-horizontal line is written in the form y = mx + c. If a line passes through (0, 4) and has slope 2, what is its equation in this form?","o":["y = 2x + 4","y = 4x + 2","y = 2x - 4","y = -2x + 4"],"c":0,"e":"In y = mx + c, m is the slope and (0, c) is the y-intercept. With slope m = 2 and y-intercept (0, 4), the equation is y = 2x + 4.","tr":2,"ci":"Unit 4 — Introduction to Linear Programming §4.1 Revision on Linear Graphs","av":1},
  {"i":"math-g12-0913","g":12,"u":"Introduction to Linear Programming","d":"medium","t":"calculation","q":"Following the method of §4.1, rewrite the line 3x + y = 6 in the form y = mx + c. What are the slope and y-intercept?","o":["slope 3, y-intercept (0, 6)","slope -3, y-intercept (0, 6)","slope -3, y-intercept (0, -6)","slope 3, y-intercept (0, -6)"],"c":1,"e":"Solving 3x + y = 6 for y gives y = -3x + 6, so m = -3 and the y-intercept is (0, 6).","tr":2,"ci":"Unit 4 — Introduction to Linear Programming §4.1 Revision on Linear Graphs","av":1},
  {"i":"math-g12-0914","g":12,"u":"Introduction to Linear Programming","d":"easy","t":"conceptual","q":"According to the rules for solving inequalities given in §4.2, what happens to the inequality sign when both sides are multiplied or divided by a negative number?","o":["It stays the same","It is reversed","It becomes an equality","It becomes a strict inequality"],"c":1,"e":"§4.2 Rule 2 states that when both sides of an inequality are multiplied (or divided) by a negative number, the sign of the inequality is reversed.","tr":2,"ci":"Unit 4 — Introduction to Linear Programming §4.2 Graphical Solutions of System of Linear Inequalities","av":1},
  {"i":"math-g12-0915","g":12,"u":"Introduction to Linear Programming","d":"medium","t":"calculation","q":"In §4.2, a taxi charges a flat rate of Birr 1.75 plus Birr 0.75 per km. If Selam has at most Birr 10 to spend, what is the maximum distance she could travel (as given in the text)?","o":["10 km","12 km","11 km","13 km"],"c":2,"e":"The cost is 1.75 + 0.75d ≤ 10, so 0.75d ≤ 8.25, giving d ≤ 11. Selam would travel a maximum distance of 11 km.","tr":2,"ci":"Unit 4 — Introduction to Linear Programming §4.2 Graphical Solutions of System of Linear Inequalities","av":1},
  {"i":"math-g12-0916","g":12,"u":"Introduction to Linear Programming","d":"medium","t":"calculation","q":"As in §4.2's worked example on consecutive odd natural numbers, find all pairs of consecutive odd natural numbers both larger than 20 whose sum is less than 80. What is the LARGEST such pair?","o":["(37, 39)","(39, 41)","(35, 37)","(41, 43)"],"c":0,"e":"Writing the odd numbers as 2n+1 and 2n+3, both > 20 gives n ≥ 10 and sum (2n+1)+(2n+3) < 80 gives n < 19, so n = 10..18 and the largest pair is (37, 39).","tr":2,"ci":"Unit 4 — Introduction to Linear Programming §4.2 Graphical Solutions of System of Linear Inequalities","av":1},
  {"i":"math-g12-0917","g":12,"u":"Introduction to Linear Programming","d":"hard","t":"calculation","q":"Following the §4.2 word-problem style: to get an 'A' a student needs an average of at least 85 over five exams (each out of 100). Semira's first four marks are 87, 82, 74 and 80. What is the minimum mark she needs on the fifth exam, expressed as an inequality bound?","o":["x ≥ 92","x ≥ 100","x ≥ 102","x ≥ 85"],"c":2,"e":"Require (87+82+74+80+x)/5 ≥ 85, i.e. 323 + x ≥ 425, so x ≥ 102. (Since exams are out of 100, this shows an 'A' is actually unattainable here, but the inequality bound is x ≥ 102.)","tr":2,"ci":"Unit 4 — Introduction to Linear Programming §4.2 Graphical Solutions of System of Linear Inequalities","av":1},
  {"i":"math-g12-0918","g":12,"u":"Introduction to Linear Programming","d":"medium","t":"conceptual","q":"In §4.2, when graphing a linear inequality of the form y < mx + c, how should the boundary line y = mx + c be drawn, and why?","o":["Solid, because the line points are included","Broken (dashed), because the line points are not included","Solid, because it is a strict inequality","Broken, because the region lies above the line"],"c":1,"e":"For strict inequalities (< or >) the points on the line are not part of the solution region, so the boundary is drawn as a broken/dotted line.","tr":2,"ci":"Unit 4 — Introduction to Linear Programming §4.2 Graphical Solutions of System of Linear Inequalities","av":1},
  {"i":"math-g12-0919","g":12,"u":"Introduction to Linear Programming","d":"easy","t":"definition","q":"In §4.2, what is the name given to the region on one side of a line in the xy-plane?","o":["Feasible region","Half-plane","Vertex","Boundary set"],"c":1,"e":"Definition 4.1 in §4.2 defines a half-plane as the region on a side of a line in the xy-plane.","tr":2,"ci":"Unit 4 — Introduction to Linear Programming §4.2 Graphical Solutions of System of Linear Inequalities","av":1},
  {"i":"math-g12-0920","g":12,"u":"Introduction to Linear Programming","d":"easy","t":"definition","q":"In §4.3, the linear function that must be maximized or minimized in a linear programming problem is called the:","o":["Constraint","Feasible region","Objective function","Vertex"],"c":2,"e":"§4.3 defines the objective function as the linear function (e.g. Z = ax + by) which has to be maximized or minimized.","tr":2,"ci":"Unit 4 — Introduction to Linear Programming §4.3 Maximum and Minimum Values","av":1},
  {"i":"math-g12-0921","g":12,"u":"Introduction to Linear Programming","d":"hard","t":"calculation","q":"In §4.3's furniture-dealer LPP, the objective is Z = 300x + 100y with corner points (0,0), (20,0), (10,50) and (0,60). What is the maximum profit and where does it occur?","o":["Birr 6,000 at (20, 0)","Birr 8,000 at (10, 50)","Birr 6,000 at (0, 60)","Birr 8,000 at (0, 60)"],"c":1,"e":"Z = 300x + 100y: (0,0)→0, (20,0)→6000, (10,50)→3000+5000=8000, (0,60)→6000. Maximum Birr 8,000 at (10, 50), i.e. 10 tables and 50 chairs.","tr":2,"ci":"Unit 4 — Introduction to Linear Programming §4.3 Maximum and Minimum Values","av":1},
  {"i":"math-g12-0922","g":12,"u":"Introduction to Linear Programming","d":"medium","t":"calculation","q":"In §4.3, maximize Z = 3x + 2y over the feasible region with corner points (0,0), (1,0), (2,1) and (0,2). What is the maximum value of Z?","o":["6","7","8","5"],"c":2,"e":"Z = 3x + 2y: (0,0)→0, (1,0)→3, (2,1)→6+2=8, (0,2)→4. Maximum is 8, occurring at (2, 1).","tr":2,"ci":"Unit 4 — Introduction to Linear Programming §4.3 Maximum and Minimum Values","av":1},
  {"i":"math-g12-0923","g":12,"u":"Introduction to Linear Programming","d":"medium","t":"calculation","q":"In §4.3, maximize Z = x + y over the feasible region with corner points (0,0), (1,0), (0,2) and (2,1). What is the maximum value of Z?","o":["2","3","4","1"],"c":1,"e":"Z = x + y: (0,0)→0, (1,0)→1, (0,2)→2, (2,1)→3. The maximum value is 3, occurring at (2, 1).","tr":2,"ci":"Unit 4 — Introduction to Linear Programming §4.3 Maximum and Minimum Values","av":1},
  {"i":"math-g12-0924","g":12,"u":"Introduction to Linear Programming","d":"hard","t":"calculation","q":"In §4.3, minimize Z = 2x + 4y with corner points (0,10), (2,4) and (10,0). What is the minimum value, and is the optimal solution unique?","o":["20, and it is unique at (2,4)","40, and it is unique at (0,10)","20, and it is NOT unique (whole segment (2,4)-(10,0))","34, and it is unique at (10,0)"],"c":2,"e":"Z = 2x + 4y: (0,10)→40, (2,4)→4+16=20, (10,0)→20. Both (2,4) and (10,0) give 20, so every point on the segment between them is optimal — the solution is not unique.","tr":2,"ci":"Unit 4 — Introduction to Linear Programming §4.3 Maximum and Minimum Values","av":1},
  {"i":"math-g12-0925","g":12,"u":"Introduction to Linear Programming","d":"medium","t":"conceptual","q":"According to Theorem 4.2 in §4.3, if the feasible region R is bounded, then the objective function Z = ax + by has:","o":["Only a maximum value, which occurs in the interior","Both a maximum and a minimum value, each at a corner point","No guaranteed optimal value","A minimum only, at the origin"],"c":1,"e":"Theorem 4.2 states that if R is bounded, Z has both a maximum and a minimum value on R, and each occurs at a corner point (vertex) of R.","tr":2,"ci":"Unit 4 — Introduction to Linear Programming §4.3 Maximum and Minimum Values","av":1},
  {"i":"math-g12-0926","g":12,"u":"Introduction to Linear Programming","d":"medium","t":"conceptual","q":"According to the Remark in §4.3, if the feasible region R is UNBOUNDED, which statement about the optimal value of Z = ax + by is correct?","o":["Z always has both a maximum and a minimum","A maximum or minimum may not exist, but if it exists it occurs at a corner point","Z can never have any optimal value","The optimal value occurs at the centre of the region"],"c":1,"e":"The §4.3 Remark states that if R is unbounded a maximum or minimum may not exist; however, if it does exist, it must occur at a corner point of R (by Theorem 4.1).","tr":2,"ci":"Unit 4 — Introduction to Linear Programming §4.3 Maximum and Minimum Values","av":1},
  {"i":"math-g12-0927","g":12,"u":"Introduction to Linear Programming","d":"hard","t":"application","q":"In §4.4's manufacturing example, Model A profit is Birr 8,000 and Model B is Birr 12,000, with corner points (0,0), (20,0), (12,6), (0,10). What production plan maximizes profit and what is the maximum?","o":["20 of A, 0 of B; Birr 160,000","12 of A, 6 of B; Birr 168,000","0 of A, 10 of B; Birr 120,000","12 of A, 6 of B; Birr 144,000"],"c":1,"e":"Z = 8000x + 12000y: (20,0)→160000, (12,6)→96000+72000=168000, (0,10)→120000. Maximum Birr 168,000 at 12 of Model A and 6 of Model B.","tr":2,"ci":"Unit 4 — Introduction to Linear Programming §4.4 Applications","av":1},
  {"i":"math-g12-0928","g":12,"u":"Introduction to Linear Programming","d":"hard","t":"application","q":"In §4.4's Marathon car example, profit is Birr 20,000 per M13 and Birr 10,000 per M14, with corner points O(0,0), A(0,250), B(100,200), C(140,150), D(200,0). What is the maximum monthly profit?","o":["Birr 4,000,000 at (100, 200)","Birr 2,500,000 at (0, 250)","Birr 4,300,000 at (140, 150)","Birr 4,000,000 at (200, 0)"],"c":2,"e":"Z = 20000x + 10000y: B(100,200)→4,000,000; C(140,150)→2,800,000+1,500,000=4,300,000; D(200,0)→4,000,000. Maximum Birr 4,300,000 at C(140,150).","tr":2,"ci":"Unit 4 — Introduction to Linear Programming §4.4 Applications","av":1},
  {"i":"math-g12-0929","g":12,"u":"Introduction to Linear Programming","d":"medium","t":"application","q":"In §4.4's allocation example, the undesirable drug C is minimized as C = 3x + y over proposed optimal points (0,42), (4,22) and (15,0). What is the minimum intake of drug C?","o":["42 units at (0, 42)","34 units at (4, 22)","45 units at (15, 0)","22 units at (4, 22)"],"c":1,"e":"C = 3x + y: (0,42)→42, (4,22)→12+22=34, (15,0)→45. The minimum is 34 units, attained at 4 g of M and 22 g of N.","tr":2,"ci":"Unit 4 — Introduction to Linear Programming §4.4 Applications","av":1},
  {"i":"math-g12-0930","g":12,"u":"Introduction to Linear Programming","d":"hard","t":"application","q":"In §4.4's transportation example, the cost is evaluated at corner points (0,4)→1620, (0,5)→1550, (3,5)→1580, (5,3)→1740, (5,0)→1950, (4,0)→1940. What is the minimum transportation cost?","o":["Birr 1,620 at (0, 4)","Birr 1,550 at (0, 5)","Birr 1,950 at (5, 0)","Birr 1,740 at (5, 3)"],"c":1,"e":"From the corner-point table the smallest value is 1550, occurring at (0, 5). Hence the minimum transportation cost is Birr 1,550.","tr":2,"ci":"Unit 4 — Introduction to Linear Programming §4.4 Applications","av":1},

/* ===== Compact-bank hydration =====
   Each compact row {i,g,u,d,t,q,o[4],c,e} -> the full object the app uses.
   Defensive: malformed rows (missing fields / o.length!=4 / c out of 0..3 /
   off-taxonomy unit) are skipped, never thrown. */
const SUBJ_TAXO_KEY = { Physics:"Physics", Chemistry:"Chemistry", Biology:"Biology", Mathematics:"Mathematics" };
function hydrateRow(row, subject){
  if(!row || typeof row!=="object") return null;
  const { i, g, u, d, t, q, o, c, e } = row;
  if(typeof i!=="string" || !i) return null;
  if(![9,10,11,12].includes(g)) return null;
  if(typeof u!=="string" || !u) return null;
  if(typeof q!=="string" || !q) return null;
  if(!Array.isArray(o) || o.length!==4) return null;
  if(o.some(x=>typeof x!=="string" || !x.length)) return null;
  if(!(Number.isInteger(c) && c>=0 && c<=3)) return null;
  if(typeof e!=="string") return null;
  const tax = UNIT_TAXONOMY[subject];
  if(!tax || !tax[g] || !tax[g].includes(u)) return null;
  // Trust tier is DERIVED IN CODE from the item's own fields:
  //  Tier 1 = real past-paper; Tier 2 = practice independently (adversarially) verified
  //  and not in a structural-risk slice; Tier 3 = everything else (unverified).
  const provenance = row.pp ? "pastpaper" : "practice";
  const ocr = !!row.oc, coverageGap = !!row.cg, advVerified = !!row.av;
  const tier = provenance==="pastpaper" ? 1 : ((advVerified && !ocr && !coverageGap) ? 2 : 3);
  return {
    id:i, subject:subject, grade:g, unit:u,
    difficulty:(typeof d==="string"&&d)?d:"medium",
    type:(typeof t==="string"&&t)?t:"conceptual",
    question:q, options:{ A:o[0], B:o[1], C:o[2], D:o[3] },
    correct:["A","B","C","D"][c], explanation:e,
    provenance, tier, cite:(typeof row.ci==="string"?row.ci:null),
    paper:(typeof row.pa==="string"?row.pa:null),
    answerSource:(provenance==="pastpaper" ? (row.as==="o"?"official":"unofficial") : null),
    adversariallyVerified:advVerified, provisional:!!row.pv, ocr, coverageGap,
    source:(provenance==="pastpaper"?"pastpaper":"textbook")
  };
}
function hydrateBank(arr, subject){
  const out=[];
  if(!Array.isArray(arr)) return out;
  for(const row of arr){ const h=hydrateRow(row, subject); if(h) out.push(h); }
  return out;
}

// Inline bank = trustworthy tiers only (past exams + verified practice). Kept small so it
// always transfers/loads. The larger Tier-3 (unverified) bank lives in qb-unverified.js and
// is fetched on demand the first time the user opts in to see unverified questions.
const CURATED_BANK = [].concat(
  hydrateBank(typeof window.QB_PHYSICS!=="undefined"?window.QB_PHYSICS:[], "Physics"),
  hydrateBank(typeof window.QB_CHEMISTRY!=="undefined"?window.QB_CHEMISTRY:[], "Chemistry"),
  hydrateBank(typeof window.QB_BIOLOGY!=="undefined"?window.QB_BIOLOGY:[], "Biology"),
  hydrateBank(typeof window.QB_MATH!=="undefined"?window.QB_MATH:[], "Mathematics")
);
let UNVERIFIED_LOADED=false; let _unvLoading=null;
function loadUnverified(){
  if(UNVERIFIED_LOADED) return Promise.resolve(true);
  if(_unvLoading) return _unvLoading;
  // Fetch as JSON (allowed by connect-src 'self'); keeps the strict script-src CSP intact.
  _unvLoading = fetch("qb-unverified.json?v=7").then(function(r){ return r.ok ? r.json() : null; }).then(function(U){
    if(!U) return false;
    ["Physics","Chemistry","Biology","Mathematics"].forEach(function(subj){
      (U[subj]||[]).forEach(function(row){ const h=hydrateRow(row,subj); if(h) CURATED_BANK.push(h); });
    });
    UNVERIFIED_LOADED=true; return true;
  }).catch(function(){ return false; });
  return _unvLoading;
}

/* ============================ STORAGE (defensive) ============================ */
function safeGet(key){ try{ return localStorage.getItem(key); }catch(e){ return null; } }
function safeSet(key,val){ try{ localStorage.setItem(key,val); return true; }catch(e){ return false; } }
function safeRemove(key){ try{ localStorage.removeItem(key); }catch(e){} }

let PROGRESS = { subjects:{}, streak:{ count:0, best:0, lastDay:null } };
let progressCorrupt = false;

function loadProgress(){
  const raw = safeGet(STORAGE.PROGRESS);
  if(raw==null) return;
  try{
    const p = JSON.parse(raw);
    if(!p || typeof p!=="object") throw new Error("bad");
    const out = { subjects:{}, streak:{ count:0, best:0, lastDay:null } };
    if(p.subjects && typeof p.subjects==="object"){
      for(const sid of Object.keys(p.subjects)){
        const s = p.subjects[sid];
        if(!s || typeof s!=="object") continue;
        const units = {};
        if(s.units && typeof s.units==="object"){
          for(const uid of Object.keys(s.units)){
            const u = s.units[uid];
            if(u && typeof u==="object" && Number.isFinite(u.answered) && Number.isFinite(u.correct)){
              units[uid] = { answered:Math.max(0,u.answered|0), correct:Math.max(0,u.correct|0) };
            }
          }
        }
        out.subjects[sid] = { units };
      }
    }
    if(p.streak && typeof p.streak==="object"){
      out.streak.count = Number.isFinite(p.streak.count)?Math.max(0,p.streak.count|0):0;
      out.streak.best = Number.isFinite(p.streak.best)?Math.max(0,p.streak.best|0):0;
      out.streak.lastDay = (typeof p.streak.lastDay==="string")?p.streak.lastDay:null;
    }
    PROGRESS = out;
  }catch(e){
    progressCorrupt = true;
    safeRemove(STORAGE.PROGRESS);
    PROGRESS = { subjects:{}, streak:{ count:0, best:0, lastDay:null } };
  }
}
function saveProgress(){ return safeSet(STORAGE.PROGRESS, JSON.stringify(PROGRESS)); }

function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
function bumpDayStreak(){
  const t = todayStr();
  const s = PROGRESS.streak;
  if(s.lastDay===t) return;
  if(s.lastDay){
    const prev = new Date(s.lastDay); const now = new Date(t);
    const diff = Math.round((now-prev)/86400000);
    s.count = (diff===1) ? s.count+1 : 1;
  } else { s.count = 1; }
  s.lastDay = t;
  if(s.count>s.best) s.best = s.count;
}

function recordAnswer(subjectId, unit, isCorrect){
  if(!PROGRESS.subjects[subjectId]) PROGRESS.subjects[subjectId] = { units:{} };
  const su = PROGRESS.subjects[subjectId].units;
  if(!su[unit]) su[unit] = { answered:0, correct:0 };
  su[unit].answered++;
  if(isCorrect) su[unit].correct++;
}
function subjectStats(subjectId){
  const s = PROGRESS.subjects[subjectId];
  let answered=0, correct=0;
  if(s){ for(const u of Object.values(s.units)){ answered+=u.answered; correct+=u.correct; } }
  return { answered, correct, accuracy: answered? Math.round(correct/answered*100):0 };
}
function overallStats(){
  let answered=0, correct=0;
  for(const sid of Object.keys(PROGRESS.subjects)){
    const st = subjectStats(sid); answered+=st.answered; correct+=st.correct;
  }
  return { answered, correct, accuracy: answered? Math.round(correct/answered*100):0 };
}

let themePref = "system";
let mq = null;
function resolveTheme(){
  if(themePref==="light"||themePref==="dark") return themePref;
  return (mq && mq.matches) ? "dark" : "light";
}
function applyTheme(){ document.documentElement.dataset.theme = resolveTheme(); }
function initTheme(){
  try{ mq = window.matchMedia("(prefers-color-scheme: dark)"); }catch(e){ mq=null; }
  const stored = safeGet(STORAGE.THEME);
  themePref = (stored==="light"||stored==="dark"||stored==="system") ? stored : "system";
  applyTheme();
  if(mq){
    const handler = ()=>{ if(themePref==="system") applyTheme(); };
    if(mq.addEventListener) mq.addEventListener("change",handler);
    else if(mq.addListener) mq.addListener(handler);
  }
}
function setTheme(pref){ themePref=pref; safeSet(STORAGE.THEME,pref); applyTheme(); }

const FS_KEY = "fontsize";

function applyFontSize(size){
  const v = FS_ORDER.indexOf(size)>=0 ? size : "md";

/* ============================ DOM HELPERS ============================ */
const $ = id=>document.getElementById(id);
const app = $("app");
function el(tag, attrs, children){
  const n = document.createElement(tag);
  if(attrs){ for(const k of Object.keys(attrs)){
    const v = attrs[k];
    if(v==null||v===false) continue;
    if(k==="class") n.className=v;
    else if(k==="text") n.textContent=v;
    else if(k==="html") n.innerHTML=v; // ONLY trusted literals (icons)
    else if(k.startsWith("on")&&typeof v==="function") n.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="dataset"){ for(const dk of Object.keys(v)) n.dataset[dk]=v[dk]; }
    else if(v===true) n.setAttribute(k,"");
    else n.setAttribute(k,v);
  }}
  if(children!=null){
    const arr = Array.isArray(children)?children:[children];
    for(const c of arr){ if(c==null) continue; n.append(typeof c==="string"?document.createTextNode(c):c); }
  }
  return n;
}
function clear(node){ while(node.firstChild) node.removeChild(node.firstChild); }

/* ============================ BANK QUERIES ============================ */
function isValidQ(q){
  return q && typeof q==="object" && typeof q.question==="string" && q.options && typeof q.options==="object" &&
    typeof q.options.A==="string" && typeof q.options.B==="string" && typeof q.options.C==="string" && typeof q.options.D==="string" &&
    ["A","B","C","D"].includes(q.correct) && typeof q.explanation==="string";
}
// DEFAULT honest view = trustworthy tiers only (1 = past exam, 2 = verified practice).
// Tier 3 (unverified practice) is revealed only when the user opts in via STATE.showUnverified.
function bankFor(subjectId){
  const showUnv = typeof STATE!=="undefined" && STATE.showUnverified;
  return CURATED_BANK.filter(q=>q && q.subject===subjectId && isValidQ(q) && (showUnv || q.tier<=2));
}
// Full bank ignoring the tier toggle — for honest per-subject availability counts.
function bankForAll(subjectId){ return CURATED_BANK.filter(q=>q && q.subject===subjectId && isValidQ(q)); }
function unitsFor(subjectId){
  const sub = SUBJECT_BY_ID[subjectId];
  if(sub && sub.source==="ai") return AI_UNITS[subjectId] || [];
  const seen = []; const set = new Set();
  for(const q of bankFor(subjectId)){ if(q.unit && !set.has(q.unit)){ set.add(q.unit); seen.push(q.unit); } }
  return seen;
}
// Live per-(grade,unit) question counts for a curated subject, keyed "g|unit".
function unitCounts(subjectId){
  const counts = {};
  for(const q of bankFor(subjectId)){ const k=q.grade+"|"+q.unit; counts[k]=(counts[k]||0)+1; }
  return counts;
}
// Grade a curated unit belongs to, inferred from its questions (units are grade-unique here).
function impliedGradeOf(subjectId, unit){
  for(const q of bankFor(subjectId)){ if(q.unit===unit) return q.grade; }
  return null;
}
function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
// grade: a number (9-12) or "all"/null. The grade filter only applies for "All units";
// a specific unit already constrains the grade, so grade is ignored when unit is set.
function pickCurated(subjectId, unit, difficulty, cap, grade){
  let pool = bankFor(subjectId);
  if(unit && unit!=="__all__"){ pool = pool.filter(q=>q.unit===unit); }
  else if(grade && grade!=="all"){ const g=+grade; pool = pool.filter(q=>q.grade===g); }
  if(difficulty) pool = pool.filter(q=>q.difficulty===difficulty);
  pool = shuffle(pool);
  if(cap && pool.length>cap) pool = pool.slice(0,cap);
  return pool;
}
// Grade emphasis for curated timed mocks — mirrors real ESSLCE/EUEE weighting.
// Quotas round to whole counts that sum to N; a thin grade donates its shortfall
// to the others (G11/G12 favored). Within a grade, the draw stays random across
// units/difficulties via shuffle. AI-subject mocks never call this.
const MOCK_GRADE_WEIGHTS = {9:0.10, 10:0.20, 11:0.35, 12:0.35};
function pickCuratedMock(subjectId, count){
  const pool = bankFor(subjectId);
  const available = pool.length;
  const target = Math.min(count, available);
  if(target<=0) return { questions: [], short: count>0, available: 0 };

  // Bucket the bank by grade, each bucket shuffled for a random within-grade spread.
  const grades = [9,10,11,12];
  const byGrade = {};
  for(const g of grades) byGrade[g] = [];
  for(const q of pool){ if(byGrade[q.grade]) byGrade[q.grade].push(q); else (byGrade.__other||(byGrade.__other=[])).push(q); }
  for(const g of grades) byGrade[g] = shuffle(byGrade[g]);
  if(byGrade.__other) byGrade.__other = shuffle(byGrade.__other);

  // Initial integer quotas from the weights (floor), then hand out the rounding
  // remainder to the largest fractional parts (so the quotas sum to `target`).
  const quota = {};
  let assigned = 0;
  const frac = [];
  for(const g of grades){
    const ideal = target * MOCK_GRADE_WEIGHTS[g];
    quota[g] = Math.floor(ideal);
    assigned += quota[g];
    frac.push({ g, f: ideal - quota[g] });
  }
  frac.sort((a,b)=>b.f-a.f);
  for(let i=0; assigned<target && i<frac.length; i++){ quota[frac[i].g]++; assigned++; }

  // Clamp each quota to what the grade actually has; pool the shortfall and
  // redistribute it to grades that still have spare questions, G12→G11→G10→G9.
  let shortfall = 0;
  for(const g of grades){
    const have = byGrade[g].length;
    if(quota[g] > have){ shortfall += quota[g] - have; quota[g] = have; }
  }
  const refillOrder = [12,11,10,9];
  for(const g of refillOrder){
    if(shortfall<=0) break;
    const spare = byGrade[g].length - quota[g];
    if(spare>0){ const take = Math.min(spare, shortfall); quota[g]+=take; shortfall-=take; }
  }

  // Draw each grade's quota; if anything is still missing (e.g. unexpected grades
  // in the bank), top up from leftovers so we always return exactly `target`.
  const picked = [];
  for(const g of grades){ for(let i=0;i<quota[g];i++) picked.push(byGrade[g][i]); }
  if(picked.length < target){
    const chosen = new Set(picked);
    const leftovers = shuffle(pool.filter(q=>!chosen.has(q)));
    for(let i=0; picked.length<target && i<leftovers.length; i++) picked.push(leftovers[i]);
  }

  return { questions: shuffle(picked).slice(0,target), short: available<count, available };
}

/* ============================ AI GENERATION ============================ */
function stripFences(t){
  let s = String(t).trim();
  s = s.replace(/^```(?:json)?\s*/i,"").replace(/\s*```$/,"");
  return s.trim();
}
// HTTP status -> error kind. Works for both Gemini and Groq (both use 401/403 for bad key, 429 for rate limit, 404 for missing model).
function classifyHttp(status){
  if(status===401||status===403) return "key";
  if(status===404) return "model";
  if(status===429) return "rate";
  return "generic";
}
// Provider-neutral error copy — reads correctly for Groq or Gemini.
const AI_ERR = {
  nokey:"Add a free AI key in Settings to unlock unlimited AI questions.",
  network:"Couldn't reach the AI provider. Check your internet connection and try again.",
  parse:"The AI sent something we couldn't read. Try again, or use the curated questions.",
  key:"That key didn't work. Check it in Settings and try again.",
  model:"AI questions are temporarily unavailable. The curated bank still works offline.",
  rate:"Too many requests right now. Wait a moment and try again.",
  generic:"Something went wrong generating questions. The curated bank still works offline.",
};
function aiBadgeKind(subjectId){
  return SUBJECT_BY_ID[subjectId].source==="ai" ? "ai" : "verify";
}
function buildPrompt(subjectId, unit, difficulty, count){
  const unitTxt = (unit && unit!=="__all__") ? unit : "any high-weight unit for this subject";
  const diffDesc = {
    easy:"single-step recall or one-line substitution",
    medium:"two-step reasoning or one standard formula applied once",
    hard:"multi-step, combining two concepts or careful algebra",
    impossible:"olympiad-adjacent multi-concept synthesis with careful traps, still one defensible answer",
  }[difficulty] || "standard";
  return [
    "You are an expert item-writer for the Ethiopian Grade 12 (ESSLCE/EUEE) national exam.",
    "Write "+count+" multiple-choice question(s) for the subject \""+subjectId+"\", unit: "+unitTxt+".",
    "Difficulty tier: "+difficulty+" ("+diffDesc+").",
    "Context: Ethiopian Grade 12 Natural Science / aptitude curriculum.",
    "Each question must have EXACTLY four options keyed A, B, C, D, all non-empty and distinct, with EXACTLY one correct answer, and a worked 1-2 sentence explanation of why it is correct.",
    "Return STRICT JSON ONLY, no markdown, no code fences, no prose. Output a JSON object with a \"questions\" array of objects with this exact shape:",
    '{"questions":[{"question":"...","options":{"A":"...","B":"...","C":"...","D":"..."},"correct":"A","explanation":"..."}]}',
    "Return exactly "+count+" object(s) in the \"questions\" array.",
  ].join("\n");
}
// Normalize any AI JSON (bare array, {questions:[...]} wrapper, or a single object) into validated, schema-shaped questions.
function normalizeAIItems(parsed, subjectId, unit, difficulty){
  let items = Array.isArray(parsed)
    ? parsed
    : (parsed && Array.isArray(parsed.questions) ? parsed.questions
      : (parsed && typeof parsed==="object" ? [parsed] : []));
  const out = [];
  for(const it of items){
    if(isValidQ(it)){
      out.push({
        id:"ai-"+subjectId+"-"+Date.now()+"-"+out.length,
        subject:subjectId, grade:12, unit:(unit&&unit!=="__all__")?unit:(it.unit||"General"),
        difficulty, type:(typeof it.type==="string"?it.type:"conceptual"),
        question:String(it.question), options:{A:String(it.options.A),B:String(it.options.B),C:String(it.options.C),D:String(it.options.D)},
        correct:it.correct, explanation:String(it.explanation), source:"ai",
      });
    }
  }
  return out;
}
function parseError(){ const e=new Error("parse"); e.kind="parse"; return e; }

// GEMINI branch — unchanged behavior: key in ?key= query param, strict-JSON prompt, parse + validate.
async function geminiGenerate(subjectId, unit, difficulty, count){
  const key = getKey("gemini");
  if(!key){ const e=new Error("nokey"); e.kind="nokey"; throw e; }
  const body = {
    contents:[{ parts:[{ text: buildPrompt(subjectId,unit,difficulty,count) }] }],
    generationConfig:{ temperature:0.8, responseMimeType:"application/json" },
  };
  let resp;
  try{
    resp = await fetch(CONFIG.GEMINI_ENDPOINT+"?key="+encodeURIComponent(key), {
      method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify(body),
    });
  }catch(netErr){ const e=new Error("network"); e.kind="network"; throw e; }
  if(!resp.ok){ const e=new Error("http"); e.kind=classifyHttp(resp.status); throw e; }
  let data;
  try{ data = await resp.json(); }catch(e2){ throw parseError(); }
  let text = "";
  try{ text = data.candidates[0].content.parts.map(p=>p.text||"").join(""); }catch(e3){ text=""; }
  if(!text){ throw parseError(); }
  let parsed;
  try{ parsed = JSON.parse(stripFences(text)); }
  catch(e4){ throw parseError(); }
  const out = normalizeAIItems(parsed, subjectId, unit, difficulty);
  if(out.length===0){ throw parseError(); }
  return out;
}

// GROQ branch — OpenAI-compatible chat completions. Key in Authorization: Bearer header (NEVER in URL).
async function groqGenerate(subjectId, unit, difficulty, count){
  const key = getKey("groq");
  if(!key){ const e=new Error("nokey"); e.kind="nokey"; throw e; }
  const body = {
    model: CONFIG.GROQ_MODEL,
    messages: [
      { role:"system", content:"You are an exam question generator. Respond with STRICT JSON only, no markdown, no code fences." },
      { role:"user", content: buildPrompt(subjectId,unit,difficulty,count) },
    ],
    temperature: 0.7,
    response_format: { type: "json_object" },
  };
  let resp;
  try{
    resp = await fetch(CONFIG.GROQ_ENDPOINT, {
      method:"POST",
      headers:{ "Authorization":"Bearer "+key, "Content-Type":"application/json" },
      body:JSON.stringify(body),
    });
  }catch(netErr){ const e=new Error("network"); e.kind="network"; throw e; }
  if(!resp.ok){ const e=new Error("http"); e.kind=classifyHttp(resp.status); throw e; }
  let data;
  try{ data = await resp.json(); }catch(e2){ throw parseError(); }
  let text = "";
  try{ text = data.choices[0].message.content || ""; }catch(e3){ text=""; }
  if(!text){ throw parseError(); }
  let parsed;
  try{ parsed = JSON.parse(stripFences(text)); }
  catch(e4){ throw parseError(); }
  const out = normalizeAIItems(parsed, subjectId, unit, difficulty);
  if(out.length===0){ throw parseError(); }
  return out;
}

// Provider-aware entry point.
async function aiGenerate(subjectId, unit, difficulty, count){
  return getProvider()==="gemini"
    ? geminiGenerate(subjectId, unit, difficulty, count)
    : groqGenerate(subjectId, unit, difficulty, count);
}
// generate single with one retry
async function aiOneWithRetry(subjectId, unit, difficulty){
  try{ const r = await aiGenerate(subjectId,unit,difficulty,1); return r[0]; }
  catch(e1){
    if(e1.kind==="nokey"||e1.kind==="network"||e1.kind==="key"||e1.kind==="model"||e1.kind==="rate") throw e1;
    try{ const r = await aiGenerate(subjectId,unit,difficulty,1); return r[0]; }
    catch(e2){ throw e2; }
  }
}

/* ============================ TOASTS ============================ */
function toast(msg, type){
  const wrap = $("toastWrap");
  const t = el("div",{ class:"toast"+(type==="error"?" error":""), role: type==="error"?"alert":"status" });
  t.append(el("span",{text:msg}));
  const close = el("button",{ class:"t-close","aria-label":"Dismiss", html:ICONS.close, onclick:()=>dismiss() });
  close.querySelector("svg").setAttribute("width","16"); close.querySelector("svg").setAttribute("height","16");
  t.append(close);
  wrap.append(t);
  let done=false;
  function dismiss(){ if(done) return; done=true; t.remove(); }
  setTimeout(dismiss, CONFIG.TOAST_MS);
}

/* ============================ NAV ============================ */
function showView(name){
  STATE.view = name;
  clear(app);
  let section;
  switch(name){
    case "home": section = renderHome(); break;
    case "units": section = renderUnits(); break;
    case "setup": section = renderSetup(); break;
    case "practice": section = renderPractice(); break;
    case "mock": section = renderMock(); break;
    case "summary": section = renderSummary(); break;
    case "review": section = renderReview(); break;
    case "dashboard": section = renderDashboard(); break;
    default: section = renderHome();
  }
  app.append(section);
  focusH1(section);
  window.scrollTo(0,0);
}
