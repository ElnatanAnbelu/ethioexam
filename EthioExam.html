     'unsafe-inline' is unavoidable for a single-file inline app and is safe here given the textContent rendering. -->

<style>
/* ============================ DESIGN TOKENS ============================ */
:root{
  /* Subject accents — same hue both themes (Design 1: vibrant & student-friendly) */
  --subject-physics:#3b82f6; --subject-chemistry:#10b981; --subject-biology:#f97316;
  --subject-math:#ec4899; --subject-english:#8b5cf6; --subject-sat:#f59e0b;
  --subject-physics-on:#FFF; --subject-chemistry-on:#FFF; --subject-biology-on:#FFF;
  --subject-math-on:#FFF; --subject-english-on:#FFF; --subject-sat-on:#FFF;
  /* Per-subject full-bleed gradients (Design 1 .s-* cards) */
  --subject-physics-grad:linear-gradient(140deg,#3b82f6,#2563eb);
  --subject-chemistry-grad:linear-gradient(140deg,#10b981,#059669);
  --subject-biology-grad:linear-gradient(140deg,#fb923c,#ea580c);
  --subject-math-grad:linear-gradient(140deg,#f472b6,#db2777);
  --subject-english-grad:linear-gradient(140deg,#a78bfa,#7c3aed);
  --subject-sat-grad:linear-gradient(140deg,#fbbf24,#d97706);

  /* Typography */
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif,"Apple Color Emoji","Segoe UI Emoji";
  --font-mono:ui-monospace,"SF Mono","SFMono-Regular",Menlo,Consolas,"Liberation Mono",monospace;
  --fs-display:2.25rem; --fs-h1:1.75rem; --fs-h2:1.375rem; --fs-h3:1.125rem;
  --fs-body:1rem; --fs-body-lg:1.0625rem; --fs-small:0.875rem; --fs-micro:0.75rem;
  --lh-tight:1.18; --lh-heading:1.28; --lh-body:1.58;
  --fw-regular:400; --fw-medium:500; --fw-semibold:600; --fw-bold:700;
  --ls-tight:-0.014em; --ls-tighter:-0.02em; --ls-normal:0; --ls-wide:0.045em;

  /* Spacing */
  --sp-0:0; --sp-1:0.25rem; --sp-2:0.5rem; --sp-3:0.75rem; --sp-4:1rem; --sp-5:1.25rem;
  --sp-6:1.5rem; --sp-8:2rem; --sp-10:2.5rem; --sp-12:3rem; --sp-16:4rem;
  --page-pad-mobile:var(--sp-4); --page-pad-laptop:var(--sp-8);
  --content-max:720px; --grid-max:960px;

  /* Radius (Design 1: big rounded corners) */
  --r-xs:8px; --r-sm:12px; --r-md:16px; --r-lg:22px; --r-xl:30px; --r-pill:999px;

  /* Font-size control: multiplies the base size set on <body> */
  --fs:1;

  /* Motion */
  --t-xfast:90ms; --t-fast:120ms; --t-base:200ms; --t-slow:320ms;
  --ease:cubic-bezier(.4,0,.2,1); --ease-out:cubic-bezier(.16,1,.3,1); --ease-spring:cubic-bezier(.34,1.4,.5,1);

  /* Z */
  --z-base:0; --z-sticky:100; --z-toast:800; --z-overlay:900; --z-modal:1000;
}
:root[data-theme="light"]{
  --bg:#F7F8FA; --bg-subtle:#EEF1F5; --surface:#FFFFFF; --surface-raised:#FFFFFF;
  --surface-hover:#F2F4F7; --border:#E3E7EC; --border-strong:#CBD2DA;
  --text-primary:#14181F; --text-secondary:#424B57; --text-muted:#6B7480; --text-disabled:#A4ACB6;
  --primary:#5b3df5; --primary-hover:#4a2fd6; --primary-soft:#ede9ff; --primary-on:#FFFFFF;
  --success:#1E9E5A; --success-soft:#E2F5EA; --success-border:#9BD9B6; --success-on:#FFFFFF;
  --danger:#D63B43; --danger-soft:#FBE6E7; --danger-border:#F0AAAD; --danger-on:#FFFFFF;
  --warning:#C77A12; --warning-soft:#FBEFD9; --warning-on:#FFFFFF;
  --subject-physics-soft:#E7EEFE; --subject-chemistry-soft:#DCF6EE; --subject-biology-soft:#FDEBDC;
  --subject-math-soft:#FCE3F0; --subject-english-soft:#EEE8FE; --subject-sat-soft:#FCF0D8;
  --shadow-sm:0 4px 14px -6px rgba(54,33,140,.22);
  --shadow-md:0 8px 22px -10px rgba(54,33,140,.24),0 2px 8px -4px rgba(54,33,140,.14);
  --shadow-lg:0 10px 30px -12px rgba(54,33,140,.28),0 4px 12px -6px rgba(54,33,140,.16);
  --shadow-xl:0 22px 50px -16px rgba(54,33,140,.34),0 6px 16px -8px rgba(54,33,140,.2);
  --overlay:rgba(27,21,48,.45); --focus-ring:#5b3df5;
}
:root[data-theme="dark"]{
  --bg:#15101f; --bg-subtle:#1b1529; --surface:#211a31; --surface-raised:#2a2240;
  --surface-hover:#2e2647; --border:#322a47; --border-strong:#473c63;
  --text-primary:#f3f0ff; --text-secondary:#cbc3e6; --text-muted:#b3aace; --text-disabled:#776e94;
  --primary:#a78bfa; --primary-hover:#c4b3ff; --primary-soft:#2c2347; --primary-on:#15101f;
  --success:#3CCB7F; --success-soft:#10301f; --success-border:#2C6B47; --success-on:#06140C;
  --danger:#FF6B72; --danger-soft:#3a1717; --danger-border:#7A2E33; --danger-on:#1A0708;
  --warning:#F0B445; --warning-soft:#332512; --warning-on:#1A1304;
  --subject-physics-soft:#1b243f; --subject-chemistry-soft:#10312a; --subject-biology-soft:#33220f;
  --subject-math-soft:#33162a; --subject-english-soft:#241b40; --subject-sat-soft:#332612;
  --shadow-sm:0 6px 18px -8px rgba(0,0,0,.6); --shadow-md:0 10px 26px -12px rgba(0,0,0,.66),0 4px 12px -6px rgba(0,0,0,.5);
  --shadow-lg:0 12px 34px -14px rgba(0,0,0,.7),0 4px 12px -6px rgba(0,0,0,.55); --shadow-xl:0 22px 60px -18px rgba(0,0,0,.78),0 6px 16px -8px rgba(0,0,0,.6);
  --overlay:rgba(0,0,0,.62); --focus-ring:#c4b3ff;
}

/* ============================ BASE ============================ */
*,*::before,*::after{box-sizing:border-box;}
/* Font-size control — rotates document.documentElement[data-fs] */
html[data-fs="sm"]{--fs:.92} html[data-fs="md"]{--fs:1} html[data-fs="lg"]{--fs:1.14}
html{font-size:calc(16px*var(--fs));-webkit-text-size-adjust:100%;}
body{
  margin:0; font-family:var(--font-sans); background:var(--bg); color:var(--text-primary);
  font-size:var(--fs-body); line-height:var(--lh-body); -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale; min-height:100vh;
}
h1,h2,h3,p{margin:0;}
button{font-family:inherit; font-size:inherit; cursor:pointer; color:inherit;}
input{font-family:inherit;}
:where(button,a,input,[role="button"],[role="radio"],[role="switch"],[tabindex]):focus-visible{
  outline:none; box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--focus-ring); border-radius:inherit;
}
[tabindex="-1"]:focus{outline:none;}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
[hidden]{display:none !important;}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}
.tnum{font-variant-numeric:tabular-nums;}

#app{max-width:var(--grid-max);margin:0 auto;padding:calc(var(--page-pad-mobile) + env(safe-area-inset-top)) var(--page-pad-mobile) calc(var(--sp-16) + env(safe-area-inset-bottom));}
.screen{}
section[role="region"]{max-width:var(--content-max);margin:0 auto;}
section#screen-home{max-width:var(--grid-max);}
/* Soft entrance on each view (a fresh section is mounted per navigation) */
#app>section{animation:viewIn var(--t-slow) var(--ease-out) both;}
@keyframes viewIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* ============================ GLOBAL CHROME ============================ */
.chrome-controls{
  position:fixed; top:max(var(--sp-3),env(safe-area-inset-top)); right:var(--sp-4); z-index:var(--z-sticky);
  display:flex; align-items:center; gap:var(--sp-2);
}
.gear-btn{
  width:44px; height:44px; min-width:44px; border-radius:var(--r-pill); background:var(--surface); border:1px solid var(--border);
  box-shadow:var(--shadow-sm); color:var(--text-muted); display:flex; align-items:center; justify-content:center;
  transition:background var(--t-fast) var(--ease),color var(--t-fast) var(--ease),box-shadow var(--t-base) var(--ease),transform var(--t-xfast) var(--ease);
}
@media(hover:hover){.gear-btn:hover{color:var(--text-secondary);box-shadow:var(--shadow-md);}}
.gear-btn:active{background:var(--surface-hover);transform:scale(.9);}
.gear-btn .fs-glyph{font-weight:800;font-size:1rem;line-height:1;}
.gear-btn .fs-glyph sup{font-size:.62em;}
/* theme toggle icon swap, driven by data-theme */
.gear-btn .ic-moon{display:none;}
:root[data-theme="dark"] #themeToggleBtn .ic-sun{display:none;}
:root[data-theme="dark"] #themeToggleBtn .ic-moon{display:block;}
.back-row{display:flex;align-items:center;gap:var(--sp-1);margin-bottom:var(--sp-4);}
.back-btn{
  width:44px;height:44px;border-radius:var(--r-pill);background:transparent;border:none;color:var(--text-secondary);
  display:flex;align-items:center;justify-content:center;margin-left:-10px;
}
.back-btn:active{background:var(--surface-hover);}
.back-label{font-size:var(--fs-small);color:var(--text-secondary);font-weight:var(--fw-medium);}

.overline{font-size:var(--fs-micro);font-weight:var(--fw-semibold);text-transform:uppercase;letter-spacing:var(--ls-wide);color:var(--text-muted);}
.h1{font-size:var(--fs-h1);font-weight:var(--fw-bold);line-height:var(--lh-heading);color:var(--text-primary);letter-spacing:var(--ls-tighter);text-wrap:balance;}
.subtitle{font-size:var(--fs-small);color:var(--text-muted);margin-top:var(--sp-1);}

/* ============================ HOME ============================ */
.home-head{display:flex;flex-direction:column;margin:calc(var(--sp-2) + 52px) 0 var(--sp-5);padding-right:var(--sp-1);}
.home-title{font-size:var(--fs-h1);font-weight:var(--fw-bold);color:var(--text-primary);letter-spacing:var(--ls-tighter);line-height:var(--lh-heading);text-wrap:balance;}
.progress-strip{
  width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  box-shadow:var(--shadow-md);padding:var(--sp-4);display:flex;gap:var(--sp-2);text-align:left;
  margin-bottom:var(--sp-2);transition:background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease),box-shadow var(--t-base) var(--ease),transform var(--t-fast) var(--ease);
}
@media(hover:hover){.progress-strip:hover{border-color:var(--border-strong);box-shadow:var(--shadow-md);}}
.progress-strip:active{background:var(--surface-hover);transform:scale(.992);}
.stat-tile{border-radius:var(--r-md);padding:var(--sp-1) var(--sp-2);flex:1;min-width:0;}
.stat-value{font-size:var(--fs-h2);font-weight:var(--fw-bold);font-family:var(--font-mono);color:var(--text-primary);font-variant-numeric:tabular-nums;line-height:var(--lh-tight);}
.stat-value.muted{color:var(--text-muted);}
.stat-label{font-size:var(--fs-small);color:var(--text-muted);font-weight:var(--fw-medium);margin-top:var(--sp-1);}
.view-progress-btn{background:none;border:none;color:var(--primary);font-size:var(--fs-small);font-weight:var(--fw-semibold);padding:var(--sp-2);margin-bottom:var(--sp-2);}
.home-encourage{font-size:var(--fs-small);color:var(--text-muted);margin:var(--sp-1) 0 var(--sp-4);}
.subject-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--sp-4);list-style:none;padding:0;margin:0 0 var(--sp-6);}
.subject-card{
  position:relative;overflow:hidden;
  width:100%;border:none;border-radius:var(--r-xl);color:#fff;
  background:var(--primary);box-shadow:var(--shadow-lg);padding:var(--sp-5);text-align:left;min-height:132px;
  display:flex;flex-direction:column;justify-content:space-between;gap:var(--sp-3);
  transition:transform var(--t-base) var(--ease-spring),box-shadow var(--t-base) var(--ease),filter var(--t-fast) var(--ease);
}
/* Full-bleed per-subject gradients (Design 1 .s-* cards) */
.subject-card[data-subject="physics"]{background:var(--subject-physics-grad);}
.subject-card[data-subject="chemistry"]{background:var(--subject-chemistry-grad);}
.subject-card[data-subject="biology"]{background:var(--subject-biology-grad);}
.subject-card[data-subject="math"]{background:var(--subject-math-grad);}
.subject-card[data-subject="english"]{background:var(--subject-english-grad);}
.subject-card[data-subject="sat"]{background:var(--subject-sat-grad);}
.subject-card .card-blob{position:absolute;right:-30px;bottom:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.13);pointer-events:none;}
.subject-card:active{transform:scale(.95);transition-duration:var(--t-xfast);}
@media(hover:hover){.subject-card:hover{box-shadow:var(--shadow-xl);transform:translateY(-3px);filter:saturate(1.05);}}
.icon-chip{position:relative;z-index:1;width:48px;height:48px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;background:rgba(255,255,255,.22);transition:transform var(--t-base) var(--ease-spring);}
@media(hover:hover){.subject-card:hover .icon-chip{transform:scale(1.08) rotate(-3deg);}}
.subject-card>div{position:relative;z-index:1;}
.card-titlerow{display:flex;align-items:center;gap:var(--sp-2);flex-wrap:wrap;}
.card-title{font-size:var(--fs-h2);font-weight:var(--fw-bold);color:#fff;line-height:var(--lh-heading);letter-spacing:var(--ls-tight);}
.card-stat-a{font-size:var(--fs-small);color:rgba(255,255,255,.96);font-weight:var(--fw-semibold);}
.card-stat-b{font-size:var(--fs-small);color:rgba(255,255,255,.85);}
.card-notstarted{font-size:var(--fs-small);color:rgba(255,255,255,.85);}
/* AI badge on a gradient card → translucent white pill */
.subject-card .badge-ai{background:rgba(255,255,255,.92);color:#1b1530;}
.home-footer{font-size:var(--fs-small);color:var(--text-muted);text-align:center;}

/* ============================ BADGE ============================ */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:var(--fs-micro);font-weight:var(--fw-bold);letter-spacing:.2px;padding:4px 11px;border-radius:var(--r-pill);line-height:1.4;white-space:nowrap;}
.badge-ai{background:var(--primary-soft);color:var(--primary);}
.badge-verify{background:var(--warning-soft);color:var(--warning);}
.badge-curated{background:var(--success-soft);color:var(--success);}

/* ============================ UNIT PICKER ============================ */
.title-dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:var(--sp-2);vertical-align:middle;}
.unit-list{display:flex;flex-direction:column;gap:var(--sp-2);margin-top:var(--sp-4);}
@media(min-width:768px){.unit-list{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3);}}
.unit-pill{
  width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);min-height:56px;
  padding:var(--sp-3) var(--sp-4);display:flex;align-items:center;justify-content:space-between;gap:var(--sp-3);text-align:left;
  box-shadow:var(--shadow-sm);
  transition:background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease),box-shadow var(--t-base) var(--ease),transform var(--t-xfast) var(--ease);
}
@media(hover:hover){.unit-pill:hover{border-color:var(--primary);background:var(--surface-hover);box-shadow:var(--shadow-md);}}
.unit-pill:active{background:var(--surface-hover);transform:scale(.98);}
.unit-pill .ulabel{font-size:var(--fs-body);font-weight:var(--fw-medium);color:var(--text-primary);}
.unit-pill .acc-chip{font-size:var(--fs-micro);font-weight:var(--fw-bold);color:var(--primary);background:var(--primary-soft);padding:4px 10px;border-radius:var(--r-pill);flex-shrink:0;}
.unit-all{background:var(--primary-soft);border-color:transparent;grid-column:1/-1;}
.unit-all .ulabel{color:var(--primary);font-weight:var(--fw-semibold);}
.unit-all .usub{font-size:var(--fs-micro);color:var(--primary);opacity:.85;}
.unit-all .check{color:var(--primary);}
.unit-group{display:flex;flex-direction:column;gap:var(--sp-2);}
@media(min-width:768px){.unit-list>.unit-all{grid-column:1/-1;}.unit-group{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3);}}
.unit-group-head{display:flex;align-items:baseline;justify-content:space-between;gap:var(--sp-2);margin-top:var(--sp-3);padding:0 var(--sp-1);}
@media(min-width:768px){.unit-group-head{grid-column:1/-1;}}
.ugh-grade{font-size:var(--fs-small);font-weight:var(--fw-semibold);color:var(--text-secondary);letter-spacing:.02em;}
.ugh-count{font-size:var(--fs-micro);color:var(--text-muted);}
.unit-pill .unit-meta{display:flex;align-items:center;gap:var(--sp-2);flex-shrink:0;}
.unit-pill .qcount{font-size:var(--fs-micro);font-weight:var(--fw-bold);color:var(--primary);background:var(--primary-soft);padding:4px 10px;border-radius:var(--r-pill);}
.unit-pill.unit-empty{opacity:.45;cursor:not-allowed;}
.unit-pill.unit-empty:active{transform:none;background:var(--surface);}
.unit-pill .qcount-zero{color:var(--text-muted);background:transparent;border:1px dashed var(--border);}
.grade-row{flex-wrap:wrap;}
.grade-chip{min-width:48px;justify-content:center;}
.grade-lock{display:flex;align-items:center;gap:var(--sp-2);min-height:44px;padding:var(--sp-2) var(--sp-3);background:var(--bg-subtle);border-radius:var(--r-sm);font-size:var(--fs-body);font-weight:var(--fw-semibold);color:var(--text-primary);}
.grade-lock-note{font-size:var(--fs-micro);font-weight:var(--fw-regular);color:var(--text-muted);}
.info-banner{
  background:var(--primary-soft);border-radius:var(--r-md);padding:var(--sp-3) var(--sp-4);
  font-size:var(--fs-small);color:var(--text-secondary);margin-top:var(--sp-3);display:flex;gap:var(--sp-3);align-items:flex-start;
}
.info-banner .ib-btn{background:none;border:none;color:var(--primary);font-weight:var(--fw-semibold);font-size:var(--fs-small);white-space:nowrap;padding:var(--sp-1) var(--sp-2);margin-left:auto;}

/* ============================ SETUP ============================ */
.setup-section{margin-top:var(--sp-6);}
.setup-section .overline{margin-bottom:var(--sp-3);display:block;}
.diff-row{display:flex;gap:var(--sp-2);flex-wrap:wrap;}
.diff-chip{
  min-height:44px;padding:var(--sp-2) var(--sp-4);border-radius:var(--r-pill);border:1px solid var(--border);
  background:var(--surface);font-size:var(--fs-small);font-weight:var(--fw-medium);color:var(--text-secondary);
  display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:72px;
  transition:background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease),color var(--t-fast) var(--ease),transform var(--t-xfast) var(--ease);
}
.diff-chip[aria-checked="true"]{background:var(--primary-soft);border-color:var(--primary);color:var(--primary);font-weight:var(--fw-semibold);}
.diff-chip:active{transform:scale(.97);}
.diff-dots{display:flex;gap:3px;}
.diff-dots i{width:4px;height:4px;border-radius:50%;background:var(--text-muted);display:block;opacity:.4;}
.diff-chip[aria-checked="true"] .diff-dots i.on{background:var(--primary);opacity:1;}
.diff-dots i.on{opacity:1;}
.mode-toggle{display:flex;background:var(--bg-subtle);border-radius:var(--r-pill);padding:4px;max-width:420px;gap:0;}
.mode-seg{
  flex:1;min-height:44px;border:none;background:transparent;border-radius:var(--r-pill);
  font-size:var(--fs-body);font-weight:var(--fw-medium);color:var(--text-muted);transition:background var(--t-base) var(--ease),color var(--t-base) var(--ease),box-shadow var(--t-base) var(--ease);
}
.mode-seg[aria-checked="true"]{background:var(--surface);box-shadow:var(--shadow-sm);color:var(--text-primary);font-weight:var(--fw-semibold);}
.helper{font-size:var(--fs-small);color:var(--text-muted);margin-top:var(--sp-3);}
.switch-row{display:flex;align-items:center;gap:var(--sp-3);min-height:44px;}
.switch{
  width:52px;height:32px;border-radius:var(--r-pill);background:var(--border);border:none;position:relative;flex-shrink:0;
  transition:background var(--t-base) var(--ease);padding:0;
}
.switch .knob{position:absolute;top:4px;left:4px;width:24px;height:24px;border-radius:50%;background:var(--surface);box-shadow:var(--shadow-sm);transition:transform var(--t-base) var(--ease-spring);}
.switch[aria-checked="true"]{background:var(--primary);}
.switch[aria-checked="true"] .knob{transform:translateX(20px);background:#fff;}
.switch[aria-disabled="true"]{background:var(--bg-subtle);cursor:default;}
.switch-label{font-size:var(--fs-body);font-weight:var(--fw-medium);color:var(--text-primary);display:flex;align-items:center;gap:var(--sp-2);flex-wrap:wrap;}
.btn-primary{
  width:100%;min-height:52px;border-radius:var(--r-md);background:var(--primary);color:var(--primary-on);
  border:none;font-size:var(--fs-body);font-weight:var(--fw-bold);letter-spacing:.2px;box-shadow:var(--shadow-md);transition:background var(--t-fast) var(--ease),transform var(--t-xfast) var(--ease),box-shadow var(--t-base) var(--ease);
}

.btn-primary:active{transform:scale(.97);background:var(--primary-hover);box-shadow:var(--shadow-sm);}
.btn-primary:disabled{background:var(--bg-subtle);color:var(--text-disabled);cursor:default;transform:none;box-shadow:none;}
.btn-secondary{
  width:100%;min-height:48px;border-radius:var(--r-md);background:var(--surface);color:var(--text-primary);
  border:1px solid var(--border);font-size:var(--fs-body);font-weight:var(--fw-medium);
  transition:background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease),transform var(--t-xfast) var(--ease);
}
@media(hover:hover){.btn-secondary:hover{border-color:var(--border-strong);background:var(--surface-hover);}}
.btn-secondary:active{background:var(--surface-hover);transform:scale(.99);}
.btn-danger-outline{
  width:100%;min-height:48px;border-radius:var(--r-sm);background:transparent;color:var(--danger);

}
.setup-actions{margin-top:var(--sp-8);position:sticky;bottom:0;padding:var(--sp-3) 0 max(var(--sp-3),env(safe-area-inset-bottom));background:linear-gradient(to top,var(--bg) 60%,transparent);}
.inline-note{font-size:var(--fs-small);color:var(--warning);margin-top:var(--sp-2);}

  .setup-actions{position:static;background:none;}
  .setup-actions .btn-primary{max-width:320px;}
}

/* ============================ SESSION ============================ */
.session-header{
  position:sticky;top:0;z-index:var(--z-sticky);background:var(--surface);border-bottom:1px solid var(--border);
  margin:calc(-1*(var(--page-pad-mobile) + env(safe-area-inset-top))) calc(-1*var(--page-pad-mobile)) var(--sp-4);
  padding:calc(var(--sp-2) + env(safe-area-inset-top)) var(--page-pad-mobile) var(--sp-2);display:flex;align-items:center;gap:var(--sp-3);
}
.session-header .sh-center{flex:1;min-width:0;}
.qcount{font-size:var(--fs-small);color:var(--text-muted);margin-bottom:4px;}
.pbar{height:8px;border-radius:var(--r-pill);background:var(--bg-subtle);overflow:hidden;}
.pbar .fill{height:100%;border-radius:var(--r-pill);background:var(--primary);transition:width var(--t-slow) var(--ease-out);}
.sh-stats{display:flex;align-items:center;gap:var(--sp-3);font-size:var(--fs-small);flex-shrink:0;}
.sh-score{color:var(--text-secondary);font-weight:var(--fw-medium);display:flex;align-items:center;gap:4px;}
.sh-score .mono{color:var(--text-primary);}
.sh-streak{display:flex;align-items:center;gap:3px;color:var(--warning);font-weight:var(--fw-semibold);}
.sh-streak .mono{font-weight:var(--fw-bold);}
.icon-btn{width:44px;height:44px;border-radius:var(--r-pill);background:transparent;border:none;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.icon-btn:active{background:var(--surface-hover);}
.icon-btn[aria-pressed="true"]{color:var(--warning);}

.qcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--shadow-lg);padding:var(--sp-6);animation:qcardIn var(--t-slow) var(--ease-spring) both;}
@keyframes qcardIn{from{opacity:0;transform:translateY(10px) scale(.97);}to{opacity:1;transform:none;}}
.qmeta{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-3);margin-bottom:var(--sp-4);}
.qmeta .unit{font-size:var(--fs-small);color:var(--text-muted);display:flex;align-items:center;gap:var(--sp-2);min-width:0;}
.qmeta .unit .dot{width:8px;height:8px;border-radius:3px;flex-shrink:0;}
.qmeta .unit span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.qtext{font-size:var(--fs-body-lg);font-weight:var(--fw-medium);color:var(--text-primary);line-height:var(--lh-body);letter-spacing:-0.005em;margin-bottom:var(--sp-5);white-space:pre-wrap;}
.options{display:flex;flex-direction:column;gap:var(--sp-3);}
.opt{
  width:100%;min-height:56px;padding:var(--sp-3) var(--sp-4);border-radius:var(--r-md);border:2px solid var(--border);
  background:var(--surface);text-align:left;display:flex;align-items:center;gap:var(--sp-3);
  transition:background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease),box-shadow var(--t-fast) var(--ease),transform var(--t-fast) var(--ease);
}
@media(hover:hover){.opt:not([aria-disabled="true"]):hover{border-color:var(--border-strong);background:var(--surface-hover);}}
.opt:active:not([aria-disabled="true"]){background:var(--surface-hover);transform:scale(.99);}
.opt .ltoken{width:28px;height:28px;border-radius:var(--r-xs);background:var(--bg-subtle);color:var(--text-muted);font-family:var(--font-mono);font-weight:var(--fw-semibold);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:var(--fs-small);}
.opt .otext{font-size:var(--fs-body);font-weight:var(--fw-medium);color:var(--text-secondary);line-height:var(--lh-body);flex:1;white-space:pre-wrap;}
.opt .ricon{width:20px;height:20px;flex-shrink:0;display:none;}
.opt .otag{font-size:var(--fs-micro);font-weight:var(--fw-semibold);flex-shrink:0;white-space:nowrap;}
.opt[aria-pressed="true"]{border-color:var(--primary);box-shadow:inset 0 0 0 2px var(--primary);background:var(--primary-soft);}
.opt[aria-pressed="true"] .ltoken{background:var(--primary);color:var(--primary-on);}
.opt[aria-pressed="true"] .otext{color:var(--text-primary);}
.opt.correct{border-color:var(--success);background:var(--success-soft);animation:optSettle var(--t-base) var(--ease-out);}
@keyframes optSettle{from{background:var(--surface);border-color:var(--border);}to{}}
.opt.correct .ltoken{background:var(--success);color:var(--success-on);}
.opt.correct .otext{color:var(--text-primary);}
.opt.correct .ricon{display:block;color:var(--success);}
.opt.correct .otag{color:var(--success);}
.opt.incorrect{border-color:var(--danger);background:var(--danger-soft);animation:optShake .42s var(--ease);}
@keyframes optShake{10%,90%{transform:translateX(-2px);}30%,70%{transform:translateX(4px);}50%{transform:translateX(-5px);}}
@media(prefers-reduced-motion:reduce){.opt.incorrect{animation:optSettle var(--t-base) var(--ease-out);}}
.opt.incorrect .ltoken{background:var(--danger);color:var(--danger-on);}
.opt.incorrect .ricon{display:block;color:var(--danger);}
.opt.incorrect .otag{color:var(--danger);}
.opt.dimmed{opacity:.6;}
.opt[aria-disabled="true"]{cursor:default;}
.opt.pop{animation:pop var(--t-base) var(--ease-spring);}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.02);}100%{transform:scale(1);}}
.prehint{font-size:var(--fs-small);color:var(--text-muted);margin-top:var(--sp-4);}
.explain{margin-top:var(--sp-5);background:var(--success-soft);border:1px solid var(--success-border);border-left:4px solid var(--success);border-radius:var(--r-md);padding:var(--sp-4);animation:reveal var(--t-slow) var(--ease-out) both;}
.explain.wrong{background:var(--danger-soft);border-color:var(--danger-border);border-left-color:var(--danger);}
@keyframes reveal{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.explain .why{font-size:var(--fs-micro);font-weight:var(--fw-semibold);text-transform:uppercase;letter-spacing:var(--ls-wide);color:var(--text-muted);margin-bottom:var(--sp-2);}
.explain .ai-note{font-size:var(--fs-small);color:var(--warning);margin-bottom:var(--sp-2);font-weight:var(--fw-medium);}
.explain .body{font-size:var(--fs-body);color:var(--text-secondary);line-height:var(--lh-body);white-space:pre-wrap;}
.next-zone{margin-top:var(--sp-5);}

/* skeleton */
.skel{background:var(--bg-subtle);border-radius:var(--r-sm);animation:shimmer 1.2s var(--ease) infinite;}
@keyframes shimmer{0%,100%{opacity:1;}50%{opacity:.5;}}
.skel-line{height:14px;margin-bottom:var(--sp-3);}
.skel-opt{height:56px;margin-bottom:var(--sp-3);}
.gen-status{text-align:center;color:var(--text-muted);font-size:var(--fs-small);margin-top:var(--sp-4);display:flex;align-items:center;justify-content:center;gap:var(--sp-2);}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* inline error */
.inline-error{background:var(--danger-soft);border:1px solid var(--danger-border);border-radius:var(--r-md);padding:var(--sp-4);display:flex;flex-direction:column;gap:var(--sp-3);}
.inline-error .ie-head{display:flex;gap:var(--sp-2);align-items:center;font-weight:var(--fw-semibold);color:var(--text-primary);}
.inline-error .ie-body{font-size:var(--fs-small);color:var(--text-secondary);}
.inline-error .ie-actions{display:flex;gap:var(--sp-2);flex-wrap:wrap;}
.inline-error .ie-actions button{flex:1;min-width:120px;}
.empty-block{text-align:center;padding:var(--sp-8) var(--sp-4);color:var(--text-secondary);}
.empty-block .eb-icon{color:var(--text-muted);margin-bottom:var(--sp-3);}
.empty-block .eb-head{font-size:var(--fs-h3);font-weight:var(--fw-semibold);color:var(--text-primary);margin-bottom:var(--sp-2);}
.empty-block .eb-body{font-size:var(--fs-small);color:var(--text-muted);margin-bottom:var(--sp-5);}

/* ============================ MOCK ============================ */
.timer-wrap{flex:1;text-align:center;}
.timer{font-family:var(--font-mono);font-size:var(--fs-h1);font-weight:var(--fw-bold);font-variant-numeric:tabular-nums;color:var(--text-primary);line-height:1;}
.timer.low{color:var(--warning);}
.timer-bar{height:4px;border-radius:var(--r-pill);background:var(--bg-subtle);margin-top:6px;overflow:hidden;}
.timer-bar .fill{height:100%;background:var(--primary);transition:width 1s linear;}
.timer.low ~ .timer-bar .fill,.timer-bar .fill.low{background:var(--warning);}
.navigator{display:flex;flex-wrap:wrap;gap:var(--sp-2);margin-top:var(--sp-4);}
.nav-cell{
  width:40px;height:40px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);
  font-size:var(--fs-small);font-weight:var(--fw-medium);color:var(--text-secondary);position:relative;
  display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);
  transition:background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease),transform var(--t-xfast) var(--ease);
}
.nav-cell:active{transform:scale(.94);}
@media(hover:hover){.nav-cell:hover{border-color:var(--border-strong);}}
.nav-cell.answered{background:var(--primary-soft);color:var(--primary);border-color:transparent;}
.nav-cell.current{box-shadow:inset 0 0 0 2px var(--primary);}
.nav-cell.flagged::after{content:"";position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;background:var(--warning);}
.mock-nav-btns{display:flex;gap:var(--sp-3);margin-top:var(--sp-5);}
.mock-nav-btns .btn-secondary,.mock-nav-btns .btn-primary{width:auto;flex:1;}
.questions-toggle{width:100%;margin-top:var(--sp-4);}
.gen-screen{text-align:center;padding:var(--sp-12) var(--sp-4);}
.gen-screen .gs-bar{height:10px;border-radius:var(--r-pill);background:var(--bg-subtle);overflow:hidden;margin:var(--sp-5) 0 var(--sp-3);}
.gen-screen .gs-bar .fill{height:100%;background:var(--primary);border-radius:var(--r-pill);transition:width var(--t-base) var(--ease);}
.gen-screen .gs-head{font-size:var(--fs-h3);font-weight:var(--fw-semibold);color:var(--text-primary);}
.gen-screen .gs-sub{font-size:var(--fs-small);color:var(--text-muted);margin:var(--sp-3) 0 var(--sp-6);}

/* ============================ SUMMARY / REVIEW ============================ */
.summary-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--shadow-lg);padding:var(--sp-8);text-align:center;max-width:560px;margin:0 auto;}
.summary-head{font-size:var(--fs-h2);font-weight:var(--fw-bold);color:var(--text-primary);margin-bottom:var(--sp-5);letter-spacing:var(--ls-tight);}
.summary-score{font-size:var(--fs-display);font-weight:var(--fw-bold);font-family:var(--font-mono);font-variant-numeric:tabular-nums;color:var(--text-primary);line-height:var(--lh-tight);letter-spacing:var(--ls-tight);animation:scoreIn var(--t-slow) var(--ease-spring) both;}
@keyframes scoreIn{from{opacity:0;transform:scale(.94);}to{opacity:1;transform:none;}}
.summary-acc{font-size:var(--fs-h3);color:var(--text-muted);margin-top:var(--sp-1);}
.tiles-row{display:flex;gap:var(--sp-3);margin:var(--sp-6) 0;flex-wrap:wrap;}
.tiles-row .stat-tile{background:var(--bg-subtle);text-align:center;min-width:96px;}
.weak-callout{background:var(--warning-soft);border-radius:var(--r-md);padding:var(--sp-4);text-align:left;margin-bottom:var(--sp-5);}
.weak-callout p{font-size:var(--fs-small);color:var(--text-secondary);margin-bottom:var(--sp-3);}
.summary-actions{display:flex;flex-direction:column;gap:var(--sp-3);}

.summary-band{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);padding:var(--sp-5);margin-bottom:var(--sp-5);}
.summary-band .sb-score{font-size:var(--fs-h1);font-weight:var(--fw-bold);font-family:var(--font-mono);color:var(--text-primary);}
.summary-band .tiles-row{margin:var(--sp-4) 0 0;}
.filter-row{display:flex;gap:var(--sp-2);overflow-x:auto;margin-bottom:var(--sp-4);padding-bottom:var(--sp-1);}
.filter-chip{min-height:40px;padding:var(--sp-2) var(--sp-4);border-radius:var(--r-pill);border:1px solid var(--border);background:var(--surface);font-size:var(--fs-small);font-weight:var(--fw-medium);color:var(--text-secondary);white-space:nowrap;flex-shrink:0;transition:background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease),color var(--t-fast) var(--ease),transform var(--t-xfast) var(--ease);}
.filter-chip:active{transform:scale(.96);}
.filter-chip[aria-checked="true"]{background:var(--primary-soft);border-color:var(--primary);color:var(--primary);font-weight:var(--fw-semibold);}
.review-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:var(--sp-5);margin-bottom:var(--sp-4);}
.review-item .ri-head{display:flex;align-items:center;gap:var(--sp-2);margin-bottom:var(--sp-3);flex-wrap:wrap;}
.review-item .ri-q{font-weight:var(--fw-semibold);color:var(--text-secondary);font-size:var(--fs-small);}
.result-tag{font-size:var(--fs-micro);font-weight:var(--fw-semibold);padding:2px 8px;border-radius:var(--r-xs);letter-spacing:var(--ls-wide);}
.result-tag.correct{background:var(--success-soft);color:var(--success);}
.result-tag.incorrect{background:var(--danger-soft);color:var(--danger);}
.result-tag.skipped{background:var(--bg-subtle);color:var(--text-muted);}
.review-item .ri-qtext{font-size:var(--fs-body);color:var(--text-primary);line-height:var(--lh-body);margin-bottom:var(--sp-4);white-space:pre-wrap;}
.ropts{display:flex;flex-direction:column;gap:var(--sp-2);margin-bottom:var(--sp-4);}
.ropt{padding:var(--sp-2) var(--sp-3);border-radius:var(--r-sm);border:1px solid var(--border);display:flex;align-items:center;gap:var(--sp-2);font-size:var(--fs-small);}
.ropt .ltoken{width:24px;height:24px;font-size:var(--fs-micro);}
.ropt.correct{border-color:var(--success);background:var(--success-soft);}
.ropt.incorrect{border-color:var(--danger);background:var(--danger-soft);}
.ropt .otag{margin-left:auto;font-size:var(--fs-micro);font-weight:var(--fw-semibold);}
.ropt.correct .otag{color:var(--success);}
.ropt.incorrect .otag{color:var(--danger);}
.review-actions{display:flex;flex-direction:column;gap:var(--sp-3);margin-top:var(--sp-6);}

/* ============================ DASHBOARD ============================ */
.overview-tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--sp-3);margin:var(--sp-5) 0;}
@media(min-width:768px){.overview-tiles{grid-template-columns:repeat(4,1fr);}}
.overview-tiles .stat-tile{background:var(--surface);border:1px solid var(--border);}
.subj-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:var(--sp-3);overflow:hidden;transition:border-color var(--t-base) var(--ease);}
@media(hover:hover){.subj-row:hover{border-color:var(--border-strong);}}
.subj-row-head{width:100%;background:transparent;border:none;padding:var(--sp-4);display:flex;align-items:center;gap:var(--sp-3);text-align:left;transition:background var(--t-fast) var(--ease);}
@media(hover:hover){.subj-row-head:hover{background:var(--surface-hover);}}
.subj-row-head:active{background:var(--surface-hover);}
.subj-row-head .dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.subj-row-head .sname{font-weight:var(--fw-semibold);color:var(--text-primary);font-size:var(--fs-body);flex-shrink:0;letter-spacing:var(--ls-tight);}

@keyframes barGrow{from{transform:scaleX(0);}to{transform:scaleX(1);}}
.subj-trail{font-size:var(--fs-small);color:var(--text-muted);white-space:nowrap;font-variant-numeric:tabular-nums;}
.subj-units{padding:0 var(--sp-4) var(--sp-4);display:flex;flex-direction:column;gap:var(--sp-3);}
.unit-stat{display:flex;align-items:center;gap:var(--sp-3);}
.unit-stat .uname{font-size:var(--fs-small);color:var(--text-secondary);flex-shrink:0;max-width:40%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:var(--sp-1);}
.unit-stat .warn-dot{width:6px;height:6px;border-radius:50%;background:var(--warning);flex-shrink:0;}
.unit-stat .mini-bar{flex:1;height:8px;border-radius:var(--r-pill);background:var(--bg-subtle);overflow:hidden;}
.unit-stat .mini-bar.weak{background:var(--warning-soft);}
.unit-stat .mini-bar .fill{height:100%;border-radius:var(--r-pill);animation:barGrow var(--t-slow) var(--ease-out) both;transform-origin:left center;}
.unit-stat .ut{font-size:var(--fs-micro);color:var(--text-muted);white-space:nowrap;font-variant-numeric:tabular-nums;}
.unit-stat .upract{background:none;border:none;color:var(--primary);font-size:var(--fs-micro);font-weight:var(--fw-semibold);padding:var(--sp-1);}
.untouched-bar{flex:1;height:10px;border-radius:var(--r-pill);background:var(--bg-subtle);}

/* ============================ MODAL / TOAST ============================ */
.scrim{position:fixed;inset:0;background:var(--overlay);z-index:var(--z-overlay);animation:fade var(--t-base) var(--ease);display:flex;align-items:center;justify-content:center;padding:var(--sp-4);}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
.dialog{background:var(--surface-raised);border-radius:var(--r-lg);box-shadow:var(--shadow-xl);max-width:420px;width:100%;padding:var(--sp-6);animation:dialogin var(--t-base) var(--ease-out);}

.dialog .d-title{font-size:var(--fs-h3);font-weight:var(--fw-semibold);color:var(--text-primary);margin-bottom:var(--sp-3);}
.dialog .d-body{font-size:var(--fs-body);color:var(--text-secondary);margin-bottom:var(--sp-6);}
.dialog .d-actions{display:flex;gap:var(--sp-3);justify-content:flex-end;}
.dialog .d-actions button{flex:1;min-height:48px;border-radius:var(--r-sm);font-weight:var(--fw-semibold);font-size:var(--fs-body);transition:background var(--t-fast) var(--ease),transform var(--t-xfast) var(--ease);}
.dialog .d-actions button:active{transform:scale(.98);}
.dialog .d-cancel{background:var(--surface);border:1px solid var(--border);color:var(--text-primary);}
.dialog .d-cancel:active{background:var(--surface-hover);}
.dialog .d-confirm{background:var(--primary);color:var(--primary-on);border:none;}
.dialog .d-confirm.danger{background:var(--danger);color:var(--danger-on);}
@media(min-width:768px){.dialog .d-actions button{flex:none;min-width:120px;}}

/* settings sheet */
.sheet-scrim{position:fixed;inset:0;background:var(--overlay);z-index:var(--z-overlay);animation:fade var(--t-base) var(--ease);display:flex;align-items:flex-end;justify-content:center;}
@media(min-width:768px){.sheet-scrim{align-items:center;padding:var(--sp-4);}}
.sheet{background:var(--surface-raised);border-radius:var(--r-lg) var(--r-lg) 0 0;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:var(--sp-5);padding-bottom:max(var(--sp-6),env(safe-area-inset-bottom));animation:sheetup var(--t-base) var(--ease-out);}
@media(min-width:768px){.sheet{border-radius:var(--r-lg);max-width:480px;animation:dialogin var(--t-base) var(--ease-out);}}
@keyframes sheetup{from{transform:translateY(100%);}to{transform:none;}}
.sheet-handle{width:36px;height:4px;border-radius:var(--r-pill);background:var(--border-strong);margin:0 auto var(--sp-4);}
@media(min-width:768px){.sheet-handle{display:none;}}
.sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-5);}
.sheet-head .s-title{font-size:var(--fs-h2);font-weight:var(--fw-bold);color:var(--text-primary);}
.set-section{padding:var(--sp-5) 0;border-top:1px solid var(--border);}
.set-section:first-of-type{border-top:none;padding-top:0;}
.set-label{font-size:var(--fs-body);font-weight:var(--fw-semibold);color:var(--text-primary);margin-bottom:var(--sp-3);}
.seg3{display:flex;background:var(--bg-subtle);border-radius:var(--r-pill);padding:4px;}
.seg3 button{flex:1;min-height:44px;border:none;background:transparent;border-radius:var(--r-pill);font-size:var(--fs-small);font-weight:var(--fw-medium);color:var(--text-muted);}
.seg3 button[aria-checked="true"]{background:var(--surface);box-shadow:var(--shadow-sm);color:var(--text-primary);font-weight:var(--fw-semibold);}
.key-helper{font-size:var(--fs-small);color:var(--text-muted);margin-bottom:var(--sp-3);line-height:var(--lh-body);}
.key-inputrow{display:flex;gap:var(--sp-2);}
.key-input{flex:1;min-height:48px;padding:0 var(--sp-3);border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);color:var(--text-primary);font-family:var(--font-mono);font-size:var(--fs-body);}
.key-toggle{min-height:48px;padding:0 var(--sp-3);border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);font-size:var(--fs-small);font-weight:var(--fw-medium);}
.key-saved-row{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-3);padding:var(--sp-3);background:var(--bg-subtle);border-radius:var(--r-sm);font-family:var(--font-mono);font-size:var(--fs-small);color:var(--text-secondary);}
.key-remove{background:none;border:none;color:var(--danger);font-size:var(--fs-small);font-weight:var(--fw-semibold);font-family:var(--font-sans);}
.key-getline{font-size:var(--fs-small);color:var(--text-muted);margin-top:var(--sp-3);user-select:text;-webkit-user-select:text;}
.set-error{font-size:var(--fs-small);color:var(--danger);margin-top:var(--sp-2);}
.about-line{font-size:var(--fs-small);color:var(--text-muted);}
.set-save-btn{margin-top:var(--sp-3);}
.backup-row{display:flex;gap:var(--sp-2);flex-wrap:wrap;}
.backup-row .btn-secondary,.backup-row .btn-primary{width:auto;flex:1;min-width:140px;}
.backup-area{width:100%;min-height:120px;margin-top:var(--sp-3);padding:var(--sp-3);border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);color:var(--text-primary);font-family:var(--font-mono);font-size:var(--fs-small);line-height:var(--lh-body);resize:vertical;white-space:pre;-webkit-user-select:text;user-select:text;}
.backup-area:focus{outline:2px solid var(--primary);outline-offset:1px;}
.backup-note{font-size:var(--fs-small);color:var(--text-muted);margin-top:var(--sp-3);line-height:var(--lh-body);}
.backup-sublabel{font-size:var(--fs-small);font-weight:var(--fw-medium);color:var(--text-secondary);margin-top:var(--sp-4);margin-bottom:var(--sp-2);}
.backup-file{display:block;width:100%;font-size:var(--fs-small);color:var(--text-secondary);margin-top:var(--sp-2);}
.backup-file::-webkit-file-upload-button,.backup-file::file-selector-button{min-height:40px;padding:0 var(--sp-3);margin-right:var(--sp-3);border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);color:var(--text-primary);font-size:var(--fs-small);font-weight:var(--fw-medium);font-family:var(--font-sans);}

.toast-wrap{position:fixed;bottom:var(--sp-5);left:50%;transform:translateX(-50%);z-index:var(--z-toast);display:flex;flex-direction:column;gap:var(--sp-2);align-items:center;width:calc(100% - var(--sp-8));max-width:360px;pointer-events:none;}
@media(min-width:768px){.toast-wrap{left:auto;right:var(--sp-6);transform:none;align-items:flex-end;}}
.toast{background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--shadow-lg);padding:var(--sp-3) var(--sp-4);font-size:var(--fs-small);color:var(--text-primary);display:flex;align-items:center;gap:var(--sp-3);animation:toastin var(--t-base) var(--ease-out);pointer-events:auto;width:100%;}
@keyframes toastin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.toast .t-close{background:none;border:none;color:var(--text-muted);margin-left:auto;width:24px;height:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.toast.error{border-color:var(--danger-border);}

@media(min-width:768px){
  #app{padding:calc(var(--page-pad-laptop) + env(safe-area-inset-top)) var(--page-pad-laptop) var(--page-pad-laptop);}
  .session-header{margin:calc(-1*(var(--page-pad-laptop) + env(safe-area-inset-top))) calc(-1*var(--page-pad-laptop)) var(--sp-4);padding:calc(var(--sp-2) + env(safe-area-inset-top)) var(--page-pad-laptop) var(--sp-2);}
  .subject-grid{grid-template-columns:repeat(3,1fr);gap:var(--sp-5);}
  /* Laptop/iPad: consistent, proportional card shape (phone 2-col layout untouched). */
  .subject-card{aspect-ratio:3/2;min-height:0;}
  .progress-strip{gap:var(--sp-4);}
  .setup-actions .btn-primary{margin-left:0;}
}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important;scroll-behavior:auto !important;}
  .spinner{border-top-color:var(--border);}
  /* Force entrance-animated elements to their resolved (visible) state, since their animations are disabled above */
  #app>section,.qcard,.explain,.summary-score,.subj-bar .fill,.unit-stat .mini-bar .fill{opacity:1 !important;transform:none !important;}
}

  {"i":"phys-g9-0193","g":9,"u":"Force, Work, Energy and Power","d":"hard","t":"calculation","q":"A water pump lifts 600 kg of water through a vertical height of 10 m in 4 seconds. Taking g = 10 m/s², what is the power developed?","o":["6000 W","15000 W","60000 W","1500 W"],"c":1,"e":"P = Ep/t = mgh/t = (600 × 10 × 10)/4 = 60000/4 = 15000 W, using the method of Example 4.11.","tr":2,"ci":"Unit 4 — Force, Work, Energy and Power §4.6 Power","av":1,"pv":1},
  {"i":"phys-g9-0234","g":9,"u":"Simple Machines","d":"easy","t":"definition","q":"According to the text, a simple machine is best defined as a device that:","o":["creates new energy to help us do work","requires a single force to do mechanical work","changes one form of energy into another form","always lessens the total work that must be done"],"c":1,"e":"The text states 'A simple machine is a device that requires a single force to do mechanical work,' and clarifies machines do not create energy nor lessen the work done.","tr":2,"ci":"Unit 5 — Simple Machines §5.1 Simple Machines and their Purposes","av":1,"pv":1},
  {"i":"phys-g9-0235","g":9,"u":"Simple Machines","d":"easy","t":"conceptual","q":"In the example given in the text, why is an inclined plane (such as a ramp) used to move a heavy box to a higher floor?","o":["It reduces the total work needed to zero","A small effort is used to move the box over a longer distance","It changes the box's mass to make it lighter","It removes friction completely from the motion"],"c":1,"e":"The text says the box travels a longer distance up the ramp than if thrown straight up; the inclined plane is a force multiplier where a smaller force acts over a greater distance.","tr":2,"ci":"Unit 5 — Simple Machines §5.1 Simple Machines and their Purposes","av":1,"pv":1},
  {"i":"phys-g9-0236","g":9,"u":"Simple Machines","d":"medium","t":"conceptual","q":"The text states a bicycle is called a speed (distance) multiplier because:","o":["the load lifted is greater than the effort applied","a small distance moved on the pedal is multiplied so the wheels cover a long distance in the same time","it changes the direction of the rider's force","it stores energy to release later as a larger force"],"c":1,"e":"The text: 'the small distance moved by a person on a pedal is multiplied by the wheels of the bicycle and a long distance is covered during the same time.'","tr":2,"ci":"Unit 5 — Simple Machines §5.1 Simple Machines and their Purposes","av":1,"pv":1},
  {"i":"phys-g9-0237","g":9,"u":"Simple Machines","d":"easy","t":"definition","q":"A machine made up of a combination of simple machines is called:","o":["a force multiplier","a compound machine","a direction changer","an ideal machine"],"c":1,"e":"The text: 'A machine made up of a combination of simple machines is called a compound machine,' giving the bicycle and wire cutter as examples.","tr":2,"ci":"Unit 5 — Simple Machines §5.4 Classification of Simple Machines","av":1,"pv":1},
  {"i":"phys-g9-0238","g":9,"u":"Simple Machines","d":"medium","t":"conceptual","q":"According to the text's classification, which group does the wedge belong to?","o":["Levers","Inclined planes","Pulleys","Wheel and axle"],"c":1,"e":"The text groups simple machines into two: (1) Inclined planes — including ramp, wedge and screw, and (2) Levers — including lever, wheel & axle and pulley.","tr":2,"ci":"Unit 5 — Simple Machines §5.4 Classification of Simple Machines","av":1,"pv":1},
  {"i":"phys-g9-0239","g":9,"u":"Simple Machines","d":"easy","t":"definition","q":"The text lists the six types of simple machines as inclined plane, wedge, screw, lever, wheel and axle, and:","o":["spring","pulley","gear","crank"],"c":1,"e":"The unit summary lists the six types: inclined plane, wedge, screw, lever, wheel and axle, and pulley.","tr":2,"ci":"Unit 5 — Simple Machines §5.4 Classification of Simple Machines","av":1,"pv":1},
  {"i":"phys-g9-0240","g":9,"u":"Simple Machines","d":"easy","t":"calculation","q":"A hammer produces an output force 15 times greater than the input force you apply. What is its mechanical advantage?","o":["1.5","15","0.067","30"],"c":1,"e":"M.A = output force / input force = load/effort = 15. Mechanical advantage has no units; it is simply the ratio.","tr":2,"ci":"Unit 5 — Simple Machines §5.5 Mechanical Advantage, Velocity Ratio and Efficiency of Simple Machine","av":1,"pv":1},
  {"i":"phys-g9-0241","g":9,"u":"Simple Machines","d":"medium","t":"calculation","q":"A simple machine delivers a work output of 80 J for every 400 J of work input. What is its efficiency?","o":["5%","20%","32%","50%"],"c":1,"e":"η = work output / work input = 80 J / 400 J = 0.2 = 20% (Example 5.1 in the text).","tr":2,"ci":"Unit 5 — Simple Machines §5.5 Mechanical Advantage, Velocity Ratio and Efficiency of Simple Machine","av":1,"pv":1},
  {"i":"phys-g9-0242","g":9,"u":"Simple Machines","d":"medium","t":"calculation","q":"Using the relation η = M.A/V.R, what is the efficiency of a machine with M.A = 3 and V.R = 6?","o":["18","2","0.5","1.5"],"c":2,"e":"η = M.A/V.R = 3/6 = 0.5 = 50% (Exercise 5.10 in the text).","tr":2,"ci":"Unit 5 — Simple Machines §5.5 Mechanical Advantage, Velocity Ratio and Efficiency of Simple Machine","av":1,"pv":1},
  {"i":"phys-g9-0243","g":9,"u":"Simple Machines","d":"hard","t":"calculation","q":"A load of 200 N is lifted by a force of 80 N on a lever. The load is 10 cm from the fulcrum and the effort 40 cm from the fulcrum. What is the efficiency of the lever?","o":["40%","62.5%","80%","100%"],"c":1,"e":"V.R = dE/dL = 40/10 = 4; M.A = L/E = 200/80 = 2.5; η = M.A/V.R = 2.5/4 = 0.625 = 62.5% (Example 5.2).","tr":2,"ci":"Unit 5 — Simple Machines §5.5 Mechanical Advantage, Velocity Ratio and Efficiency of Simple Machine","av":1,"pv":1},
